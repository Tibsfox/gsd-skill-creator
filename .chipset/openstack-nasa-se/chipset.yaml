# =============================================================================
# OpenStack NASA SE Edition -- ASIC Chipset Configuration
# =============================================================================
#
# ASIC Pattern: Application-Specific Integrated Circuit
# A single declarative YAML file that fully specifies the entire OpenStack
# operational environment -- which skills load, which agents activate, how
# they communicate, and how resources are budgeted. Every downstream phase
# (319+) reads this chipset to understand the operational environment.
#
# This chipset integrates:
#   - 19 skills (8 core OpenStack + 1 deployment engine + 6 operations + 3 documentation + 1 methodology)
#   - 31 agents across 3 crews (14 deployment + 8 operations + 9 documentation)
#   - 3 team topologies (map-reduce, router, pipeline)
#   - 9 communication loops with priority-based arbitration
#   - 3 activation profiles (scout/patrol/squadron)
#   - Routing rules with disambiguation for overlapping domains
#   - Token budget allocations within 30% ceiling
#   - Pre-deploy and post-deploy evaluation gates
#
# Created: 2026-02-22 as part of GSD OpenStack Cloud Platform (NASA SE Edition)
# =============================================================================

schema_version: "1.0"

# -----------------------------------------------------------------------------
# Chipset Metadata
# -----------------------------------------------------------------------------
chipset:
  name: openstack-nasa-se
  description: "Complete OpenStack deployment and operations platform with NASA SE methodology -- ASIC chipset integrating 19 skills, 3 crews, and 9 communication loops"
  version: "1.0.0"
  project: "gsd-openstack-cloud-platform"
  created: "2026-02-22"
  updated: "2026-02-22"

# =============================================================================
# Skills Registry (18 skills)
# =============================================================================
#
# Each skill entry defines:
#   name          - Unique identifier matching the skill directory name
#   source        - Path to the SKILL.md file on disk
#   token_budget  - Percentage of context window allocated to this skill
#   priority      - Loading priority (1-100, higher = loaded first in 6-stage pipeline)
#   team          - Primary team assignment
#   agents        - Agents that compose (load) this skill
#   phase_origin  - Phase that created this skill
#   enabled       - Whether the skill is active (default true)
#   dependencies  - Other skills this one depends on
#
# Budget rationale: 30% ceiling per GSD conventions. Deployment gets the
# largest share because deploying OpenStack is the primary mission.
# kolla-ansible has the highest priority (95) because it is the deployment
# engine used by all EXEC agents.
# =============================================================================

skills:
  # ---------------------------------------------------------------------------
  # Deployment Engine (1 skill) -- Priority 95
  # kolla-ansible is the deployment backbone. Every EXEC agent needs it.
  # ---------------------------------------------------------------------------
  - name: openstack-kolla-ansible
    source: "skills/openstack/kolla-ansible/SKILL.md"
    token_budget: "3%"
    priority: 95
    team: deployment
    agents:
      - exec-keystone
      - exec-compute
      - exec-network-storage
      - scout
    phase_origin: "313"
    enabled: true
    dependencies: []

  # ---------------------------------------------------------------------------
  # Core OpenStack Skills (8 skills) -- Priority 80-90
  # These are the individual OpenStack service skills providing
  # deploy/configure/operate/troubleshoot guidance for each service.
  # ---------------------------------------------------------------------------
  - name: openstack-keystone
    source: "skills/openstack/keystone/SKILL.md"
    token_budget: "2.5%"
    priority: 90
    team: deployment
    agents:
      - exec-keystone
      - craft-security
    phase_origin: "313"
    enabled: true
    dependencies: []

  - name: openstack-nova
    source: "skills/openstack/nova/SKILL.md"
    token_budget: "2.5%"
    priority: 85
    team: deployment
    agents:
      - exec-compute
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone
      - openstack-glance

  - name: openstack-neutron
    source: "skills/openstack/neutron/SKILL.md"
    token_budget: "2.5%"
    priority: 85
    team: deployment
    agents:
      - exec-network-storage
      - craft-network
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone

  - name: openstack-cinder
    source: "skills/openstack/cinder/SKILL.md"
    token_budget: "2%"
    priority: 80
    team: deployment
    agents:
      - exec-network-storage
      - craft-storage
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone

  - name: openstack-glance
    source: "skills/openstack/glance/SKILL.md"
    token_budget: "1.5%"
    priority: 80
    team: deployment
    agents:
      - exec-compute
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone

  - name: openstack-swift
    source: "skills/openstack/swift/SKILL.md"
    token_budget: "1.5%"
    priority: 60
    team: deployment
    agents:
      - craft-storage
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone

  - name: openstack-heat
    source: "skills/openstack/heat/SKILL.md"
    token_budget: "1.5%"
    priority: 60
    team: deployment
    agents:
      - exec-compute
    phase_origin: "313"
    enabled: true
    dependencies:
      - openstack-keystone
