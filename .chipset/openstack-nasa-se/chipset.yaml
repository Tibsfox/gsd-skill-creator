    phase_origin: "314"
    enabled: true
    dependencies: []

  - name: openstack-backup
    source: "skills/openstack/backup/SKILL.md"
    token_budget: "1%"
    priority: 70
    team: operations
    agents:
      - craft-storage
    phase_origin: "314"
    enabled: true
    dependencies: []

  - name: openstack-security
    source: "skills/openstack/security/SKILL.md"
    token_budget: "1.5%"
    priority: 75
