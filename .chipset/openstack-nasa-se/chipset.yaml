# =============================================================================
# Communication Framework
# =============================================================================
#
# 9 communication loops handle all inter-agent messaging through the
# filesystem-based message bus. Priority determines processing order
# when multiple loops have pending messages.
#
# Loop hierarchy:
#   Priority 1: command    -- FLIGHT directives (highest priority)
#   Priority 2: execution  -- PLAN/EXEC/VERIFY task flow
#   Priority 2: user       -- CAPCOM human interface
#   Priority 2: health     -- SURGEON cloud status
#   Priority 2: cloud-ops  -- OpenStack API polling
#   Priority 3: specialist -- TOPO/CRAFT domain routing
#   Priority 3: budget     -- Token consumption tracking
#   Priority 4: doc-sync   -- Documentation drift detection
#   Priority 6: observation -- Skill-creator pattern capture (lowest priority)
#
# Arbitration and HALT configs are global -- they apply across all loops.
# =============================================================================

communication:
  bus_root: ".planning/bus"
  loops:
    - name: command
      config: ".planning/bus/command/loop.yaml"
      priority: 1
    - name: execution
      config: ".planning/bus/execution/loop.yaml"
      priority: 2
    - name: specialist
      config: ".planning/bus/specialist/loop.yaml"
      priority: 3
    - name: user
      config: ".planning/bus/user/loop.yaml"
      priority: 2
    - name: observation
      config: ".planning/bus/observation/loop.yaml"
      priority: 6
    - name: health
      config: ".planning/bus/health/loop.yaml"
      priority: 2
    - name: budget
      config: ".planning/bus/budget/loop.yaml"
      priority: 3
    - name: cloud-ops
      config: ".planning/bus/cloud-ops/loop.yaml"
      priority: 2
    - name: doc-sync
      config: ".planning/bus/doc-sync/loop.yaml"
      priority: 4
  arbitration: ".planning/bus/arbitration.yaml"
  halt: ".planning/bus/halt.yaml"

# =============================================================================
# Crew Configuration References
# =============================================================================
#
# External crew config files define detailed role hierarchies, activation
# profiles, and handoff procedures. The chipset references them by path.
# =============================================================================

crews:
  deployment: "configs/crews/deployment-crew.yaml"
  operations: "configs/crews/operations-crew.yaml"
  documentation: "configs/crews/documentation-crew.yaml"
  handoff: "configs/crews/crew-handoff.yaml"

# =============================================================================
# Evaluation Gates
# =============================================================================
#
# Pre-deploy gates must pass before any OpenStack deployment begins.
# Post-deploy gates must pass before crew handoff from deployment to operations.
# Action "block" prevents continuation; "warn" logs an advisory but allows it.
#
# Detailed gate implementations are defined in Plan 318-02.
# =============================================================================

evaluation:
  gates:
    pre_deploy:
      - check: hardware_inventory
        description: "Verify hardware meets minimum requirements"
        action: block
      - check: network_connectivity
        description: "Verify management and external network interfaces"
        action: block
      - check: resource_sufficiency
        description: "Verify 16GB+ RAM, 100GB+ disk"
        action: block
    post_deploy:
      - check: keystone_auth
        description: "Verify Keystone token issuance"
        action: block
      - check: nova_compute
        description: "Verify Nova hypervisor availability"
        action: block
      - check: neutron_network
        description: "Verify Neutron network operations"
        action: block
      - check: doc_verification
        description: "Verify documentation accuracy against running system"
        action: warn
