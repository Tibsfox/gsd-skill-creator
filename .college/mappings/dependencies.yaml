# Validation Notes (Hemlock's requirements):
# - Every prerequisite must be testable with specific demonstrations
# - Every "enables" relationship must show clear knowledge transfer
# - Every "enhances" relationship must show mutual reinforcement
# - Core strengths define the unique contribution each department makes

validation_framework:
  prerequisite_test: "Can demonstrate specific skills without guidance"
  enables_test: "Can apply knowledge from prerequisite in new domain"
  enhances_test: "Can see connections and apply insights bidirectionally"
  core_strength_test: "Can teach others the unique value this domain provides"
