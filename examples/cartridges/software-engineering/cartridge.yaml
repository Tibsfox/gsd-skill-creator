id: software-engineering
name: Software Engineering
version: 0.1.0
author: tibsfox
description: >-
  A full cartridge for software engineering as a theoretical and
  mathematical discipline — the computer-science foundations
  underneath daily programming work. Covers discrete mathematics,
  formal logic and proof, computability and complexity, automata
  and formal languages, type theory and type systems, lambda
  calculus and functional foundations, program semantics
  (operational, denotational, axiomatic), algorithms and data
  structures with correctness and complexity analysis, programming
  language theory (syntax, parsing, compilers), formal methods and
  machine-checked verification (Hoare logic, model checking, proof
  assistants), CS curriculum and learning pathways, and category
  theory for computer science. Theory-first, language-specific
  where it matters, education-aware throughout. Pairs with
  `software-development` (applied) and `software-management`
  (operational).
