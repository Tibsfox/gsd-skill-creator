<?xml version="1.0" encoding="UTF-8"?>
<!-- Annotation callout. Edit the rect, line, and text content in place. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" role="img" aria-labelledby="t d">
  <title id="t">Annotation callout</title>
  <desc id="d">A rectangular text-box callout with a leader line pointing to a target. Edit the text and reposition the rect and line in place.</desc>
  <defs>
    <marker id="cb-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#444"/>
    </marker>
  </defs>
  <rect x="20" y="10" width="120" height="40" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="80" y="35" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#111">Annotation text here</text>
  <line x1="140" y1="50" x2="180" y2="70" stroke="#444" stroke-width="1.2" marker-end="url(#cb-arrow)"/>
</svg>
