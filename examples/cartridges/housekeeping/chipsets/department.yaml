skills:
  repo-hygiene:
    domain: hygiene
    description: >-
      Keep the working tree tidy without destroying work. Audits
      untracked files, dotfile cruft, stray scratch directories,
      orphaned lockfiles, and `.bg-shell/` style runtime state.
      Surfaces findings as a HousekeepingSweep record and proposes
      archive-or-ignore actions — never bulk-deletes. Respects the
      rule that `.planning/` and runtime state directories stay
      untracked by design.
    triggers:
      - clean up repo
      - repo hygiene
      - tidy working tree
      - untracked audit
      - dotfile cleanup
      - stray files
      - housekeeping sweep
    agent_affinity:
      - housekeeping-capcom
      - steward

  gitignore-policy:
    domain: gitignore
    description: >-
      Own the `.gitignore` policy for the project. Enforces the
      hard rules — `.planning/` never in git, `.planning/patterns/`
      is gitignored, `.local/` stays untracked, runtime state
      (`.sweep-daemon-state.json`, daemon pids, session logs)
      stays local. Resolves `git check-ignore` conflicts,
      catalogs which paths should be tracked vs archived vs
      untracked, and writes a RetentionPolicy record for any
      rule it adds.
    triggers:
      - gitignore rule
      - what to gitignore
      - check-ignore
      - untracked policy
      - .planning gitignore
      - runtime state ignore
    agent_affinity:
      - housekeeping-capcom
      - steward
      - retention-auditor

  stale-file-detection:
    domain: stale
    description: >-
      Find files that look stale — not referenced by code, no git
      activity in N days, path matches a known-scratch pattern —
      and write a StaleFileReport. This skill never deletes. It
      produces evidence so a human can decide whether a stale
      artifact should be archived, promoted, or ignored. The
      report is content-addressed so the same scan re-run later
      can detect drift.
    triggers:
      - stale file
      - dead code scan
      - unreferenced file
      - age out
      - orphan audit
      - scratch file
    agent_affinity:
      - housekeeping-capcom
      - archivist
      - steward

  log-retention-and-archival:
    domain: logs
    description: >-
      Manage logs and session transcripts under the archive-only
      rule. Logs are never deleted — only moved to a colder tier.
      This skill rotates live logs, packs rotated segments into
      dated archive bundles, writes an ArchiveEntry per bundle,
      and verifies that the bundle is readable before the live
      log is recycled. Covers session transcripts, daemon logs,
      build logs, research output logs, and CI captures.
    triggers:
      - rotate logs
      - archive logs
      - log retention
      - session log archive
      - log bundle
      - transcript archive
    agent_affinity:
      - housekeeping-capcom
      - archivist

  snapshot-and-backup-policy:
    domain: snapshot
    description: >-
      Define and operate the snapshot schedule. Owns the policy
      that says which paths get snapshotted, how often, which
      tier they land in, and how long each tier holds. Runs the
      scheduled snapshots, captures a SnapshotRecord with scope
      + content hash + tier, and emits a warning when a scheduled
      snapshot is overdue. Distinct from single-file archive — a
      snapshot is a consistent point-in-time of a whole tree.
    triggers:
      - take snapshot
      - snapshot schedule
      - backup policy
      - snapshot tier
      - overdue snapshot
      - point in time
    agent_affinity:
      - housekeeping-capcom
      - archivist

  cold-archive-operations:
    domain: archive
    description: >-
      Move data into cold-tier storage. Covers the mechanical
      side — packaging (tar/zstd/borg/restic), content-hash
      computation, manifest generation, upload to the cold
      target, and the removal of the live copy only after the
      cold copy has been verified. Each move produces an
      ArchiveEntry with `from_path`, `to_target`, content hash,
      manifest, and verification verdict.
    triggers:
      - archive to cold
      - cold storage
      - pack archive
      - offsite archive
      - archive manifest
      - move to cold tier
    agent_affinity:
      - housekeeping-capcom
      - archivist

  dataset-lifecycle:
    domain: dataset
    description: >-
      Move datasets through the lifecycle — raw → curated →
      derived → archived. Each transition writes a
      DatasetLifecycleEvent record linking the source to the
      destination and recording the transformation applied.
      Makes it possible to trace a curated dataset back to its
      raw inputs without conversation-level memory.
    triggers:
      - curate dataset
      - dataset raw to curated
      - dataset lifecycle
      - derive dataset
      - dataset provenance
      - archive dataset
    agent_affinity:
      - housekeeping-capcom
      - curator
      - archivist

  naming-and-layout-conventions:
    domain: naming
    description: >-
      Enforce and evolve naming and directory-layout conventions.
      Covers file naming rules, directory structure templates,
      slugging policy, date-stamp conventions, and versioned-folder
      patterns (e.g. `v1.49.N/README.md`). Flags new files that
      violate convention so they can be renamed before they
      propagate, but never auto-renames without explicit go.
    triggers:
      - naming convention
      - layout convention
      - slugging
      - directory structure
      - file naming
      - rename policy
    agent_affinity:
      - housekeeping-capcom
      - curator

  dedup-and-content-addressing:
    domain: dedup
    description: >-
      Find duplicate files and content-addressable groups across
      the repo and known data stores. Writes a DedupReport that
      lists each collision set, proposes a canonical location,
      and records the content hash that identifies the group.
      Canonicalization is a human-approved step — the report is
      the work product, not a bulk mv.
    triggers:
      - find duplicates
      - dedup report
      - content hash
      - canonical location
      - duplicate files
      - hash the tree
    agent_affinity:
      - housekeeping-capcom
      - curator

  storage-tiering:
    domain: tiering
    description: >-
      Classify data across tiers — hot (live working set), warm
      (accessible, not in working set), cold (archived, restore
      required), frozen (offsite, long recovery). Owns the rules
      that decide which tier a path belongs in and emits
      promote/demote recommendations when observed access patterns
      drift from the declared tier. Every classification becomes
      part of the RetentionPolicy record for its namespace.
    triggers:
      - storage tier
      - promote tier
      - demote tier
      - hot warm cold frozen
      - tier policy
      - access pattern
    agent_affinity:
      - housekeeping-capcom
      - archivist
      - curator

  housekeeping-grove-memory:
    domain: grove
    description: >-
      The core of this cartridge — operate the grove memory
      substrate for the custodial pipeline. Every other skill
      writes into the `housekeeping` namespace; this skill owns
      query / link / diff / replay / export. A full custodial
      history can be rehydrated from grove by walking the
      GroveActivityLog and reconstructing HousekeepingSweep →
      StaleFileReport → ArchiveEntry → SnapshotRecord →
      DedupReport → RestoreDrillResult → RetentionAudit in
      order. Cross-cartridge linking lets a `ReleaseRecord` from
      the release-engine cartridge reference the ArchiveEntry
      that preserved its shipped state.
    triggers:
      - housekeeping grove
      - grove archive record
      - grove snapshot record
      - custodial history
      - rehydrate archive
      - cross cartridge archive
    agent_affinity:
      - housekeeping-capcom
      - archivist

  restore-drill:
    domain: restore
    description: >-
      Prove an archive is usable by test-restoring it into a
      staging target. An archive that has not been test-restored
      is treated as unverified. Each drill writes a
      RestoreDrillResult with scope, source ArchiveEntry, target,
      time-to-restore, integrity verdict, and any drift detected
      against the original content hash. Scheduled, not ad-hoc.
    triggers:
      - restore drill
      - test restore
      - archive drill
      - verify backup
      - rehearse restore
      - recovery drill
    agent_affinity:
      - housekeeping-capcom
      - archivist
      - retention-auditor

  media-and-format-migration:
    domain: media
    description: >-
      Migrate archives between media and between formats as the
      old ones age out — tar → zstd-packed, borg-v1 → borg-v2,
      LTO → object storage, deprecated codecs → current. Produces
      a MediaMigration record per move with source content hash,
      target content hash, format delta, and tool versions so the
      migration is itself reproducible.
    triggers:
      - migrate archive format
      - format migration
      - media migration
      - codec upgrade
      - borg upgrade
      - lto to object
    agent_affinity:
      - housekeeping-capcom
      - archivist

  retention-policy-enforcement:
    domain: retention
    description: >-
      Audit real storage state against the declared RetentionPolicy
      records. Flags under-retention (data aged out faster than
      policy said it should), over-retention (data kept in hot
      tier past its policy), and missing-policy (data with no
      declared tier). Writes a RetentionAudit record per run.
      Enforcement is advisory — the auditor surfaces findings;
      humans decide on destructive action, and the standing rule
      is still archive-over-delete.
    triggers:
      - retention audit
      - policy compliance
      - retention violation
      - under retention
      - over retention
      - missing policy
    agent_affinity:
      - housekeeping-capcom
      - retention-auditor

agents:
  topology: router
  router_agent: housekeeping-capcom
  agents:
    - name: housekeeping-capcom
      role: >-
        Opus-class capcom for the whole custodial pipeline. Owns
        routing between archivist, curator, steward, and
        retention-auditor. Enforces the archive-over-delete rule,
        requires human approval for any destructive action, and
        writes the namespace-level grove activity log.
      model: opus
      tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob
      is_capcom: true

    - name: archivist
      role: >-
        Opus-class agent that owns archive shape decisions — what
        goes to cold, in what format, with what manifest, on what
        schedule. Authors SnapshotRecord, ArchiveEntry, and
        MediaMigration records. Owns the restore-drill discipline.
      model: opus
      tools:
        - Read
        - Write
        - Bash
        - Grep
        - Glob

    - name: curator
      role: >-
        Sonnet-class agent that does day-to-day dataset and file
        curation — naming, layout, dedup, lifecycle transitions.
        Surfaces work for the archivist to approve before anything
        moves to cold.
      model: sonnet
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Grep
        - Glob

    - name: steward
      role: >-
        Sonnet-class agent that executes mechanical hygiene —
        gitignore edits, stale-file reports, untracked audits,
        sweep runs. Never deletes; every proposal passes through
        capcom for human approval.
      model: sonnet
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Grep
        - Glob

    - name: retention-auditor
      role: >-
        Opus-class agent that checks real state against declared
        RetentionPolicy and writes RetentionAudit records. Also
        signs off on restore drills and flags long-aged hot-tier
        data for tier review.
      model: opus
      tools:
        - Read
        - Bash
        - Grep
        - Glob

teams:
  housekeeping-sweep-team:
    description: >-
      Run a scheduled housekeeping sweep — repo hygiene, stale
      files, gitignore drift. Steward drives the scan, curator
      reviews the findings, capcom approves actions. Writes a
      HousekeepingSweep record and any StaleFileReport that
      comes out of it.
    agents:
      - housekeeping-capcom
      - steward
      - curator
    use_when: running a periodic housekeeping sweep on the repo

  dataset-curation-team:
    description: >-
      Move a dataset through its lifecycle. Curator handles the
      raw→curated→derived transitions, archivist reviews
      anything that heads toward cold, capcom approves. Writes
      DatasetLifecycleEvent and DedupReport records.
    agents:
      - housekeeping-capcom
      - curator
      - archivist
    use_when: curating, deduping, or lifecycle-moving a dataset

  archive-migration-team:
    description: >-
      Move data into cold storage or between formats/media.
      Archivist owns the pack/upload, retention-auditor
      cross-checks policy compliance, capcom approves the live
      copy removal only after verification.
    agents:
      - housekeeping-capcom
      - archivist
      - retention-auditor
    use_when: cold-archiving a dataset or migrating an existing archive between formats

  restore-drill-team:
    description: >-
      Run a scheduled restore drill to prove an archive is still
      usable. Archivist restores to a staging target,
      retention-auditor verifies integrity and time-to-restore
      against policy, capcom signs off and writes the
      RestoreDrillResult.
    agents:
      - housekeeping-capcom
      - archivist
      - retention-auditor
    use_when: running a scheduled restore drill or a pre-change recovery test

  retention-audit-team:
    description: >-
      Audit real storage state against declared RetentionPolicy
      records. Retention-auditor runs the compliance scan,
      archivist proposes remediation (always archive, never
      delete), capcom approves. Writes a RetentionAudit record.
    agents:
      - housekeeping-capcom
      - retention-auditor
      - archivist
    use_when: periodic retention compliance audit or policy review
