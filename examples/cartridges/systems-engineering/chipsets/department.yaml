skills:
  stakeholder-needs-and-requirements:
    domain: requirements
    description: >-
      Elicit, analyze, and baseline stakeholder needs and translate them
      into well-formed system and subsystem requirements. Covers needs
      interviews, concept-of-operations authoring, requirements
      decomposition, allocation, traceability, and quality checks
      (unambiguous, verifiable, feasible, singular).
    triggers:
      - capture requirements
      - elicit needs
      - write requirement
      - concept of operations
      - conops
      - requirement traceability
      - decompose requirements
      - allocate requirement
    agent_affinity:
      - se-requirements-analyst
      - se-chief-engineer

  system-architecture-modeling:
    domain: architecture
    description: >-
      Build and maintain logical and physical system architectures using
      MBSE tools and views (functional, behavioral, structural). Produces
      block definition, internal block, activity, state, and sequence
      diagrams, and keeps them consistent with the requirements baseline.
    triggers:
      - system architecture
      - mbse
      - sysml
      - block diagram
      - functional decomposition
      - physical architecture
      - logical architecture
      - architecture view
    agent_affinity:
      - se-chief-engineer

  interface-control:
    domain: interfaces
    description: >-
      Define and control interfaces between subsystems, external systems,
      and the operating environment. Owns the Interface Control Document
      (ICD), interface registry, and change-impact analysis when an
      interface needs to move. Prevents silent breakage at integration.
    triggers:
      - interface control
      - icd
      - define interface
      - interface change
      - api contract between subsystems
      - integration point
    agent_affinity:
      - se-chief-engineer
      - se-configuration-manager

  trade-studies-and-analysis:
    domain: analysis
    description: >-
      Run structured trade studies to choose between architectural,
      technology, or sourcing alternatives. Covers criteria weighting,
      scoring, sensitivity analysis, cost / schedule / risk trades, and
      the written rationale that makes the decision reviewable and
      reversible if new evidence arrives.
    triggers:
      - trade study
      - trade space
      - decision analysis
      - alternatives analysis
      - weighted criteria
      - pugh matrix
      - aoa
    agent_affinity:
      - se-chief-engineer

  verification-planning:
    domain: verification
    description: >-
      Plan and execute verification — does the system meet the
      requirements? Covers verification methods (inspection, analysis,
      demonstration, test), verification matrices, test readiness
      reviews, and closure of each requirement against its evidence.
    triggers:
      - verification plan
      - verification matrix
      - test readiness review
      - inspection analysis demonstration test
      - vcrm
      - requirement closure
    agent_affinity:
      - se-verification-lead

  validation-and-acceptance:
    domain: validation
    description: >-
      Plan and execute validation — does the system meet the stakeholder
      need in the intended operational environment? Covers operational
      scenarios, user acceptance testing, field trials, and the formal
      acceptance package that transfers the system to operations.
    triggers:
      - validation plan
      - user acceptance
      - operational test
      - field trial
      - acceptance criteria
      - stakeholder sign-off
    agent_affinity:
      - se-verification-lead
      - se-chief-engineer

  risk-and-opportunity-management:
    domain: risk
    description: >-
      Identify, assess, and track technical risks and opportunities
      across the lifecycle. Owns the risk register, likelihood / impact
      scoring, mitigation plans, burn-down, and escalation of red items
      to program leadership.
    triggers:
      - risk register
      - risk assessment
      - likelihood impact
      - mitigation plan
      - risk burn down
      - opportunity tracking
      - escalate risk
    agent_affinity:
      - se-risk-and-safety-officer
      - se-chief-engineer

  configuration-and-change-control:
    domain: configuration
    description: >-
      Control the evolving configuration of the system — baselines,
      change requests, impact analysis, change control board, and the
      audited history of what was built, when, and why. Keeps the
      as-designed, as-built, and as-operated views consistent.
    triggers:
      - configuration management
      - baseline
      - change request
      - ccb
      - change control board
      - impact analysis
      - as-built
    agent_affinity:
      - se-configuration-manager

  reliability-availability-maintainability:
    domain: reliability
    description: >-
      Specify and verify RAM parameters — MTBF, MTTR, availability
      budgets, FMEA, reliability block diagrams, and maintainability
      allocations. Feeds logistics support analysis and the sustainment
      plan.
    triggers:
      - reliability
      - availability
      - maintainability
      - mtbf
      - mttr
      - fmea
      - reliability block diagram
      - ram analysis
    agent_affinity:
      - se-risk-and-safety-officer

  safety-and-assurance:
    domain: safety
    description: >-
      Build and maintain the safety case — hazard analysis, fault trees,
      safety requirements, assurance arguments, and independent review
      of changes that touch safety-critical functions. Produces evidence
      that satisfies applicable safety standards.
    triggers:
      - hazard analysis
      - fault tree
      - safety case
      - safety requirement
      - functional hazard assessment
      - fha
      - assurance argument
    agent_affinity:
      - se-risk-and-safety-officer

  human-factors-and-usability:
    domain: human-factors
    description: >-
      Account for the human in the loop — operator workload, error
      modes, controls and displays, training needs, and accessibility.
      Produces human-system interface requirements and validates them
      against representative users before acceptance.
    triggers:
      - human factors
      - hsi
      - operator workload
      - usability test
      - human in the loop
      - controls and displays
      - accessibility
    agent_affinity:
      - se-verification-lead
      - se-chief-engineer

  lifecycle-and-transition:
    domain: lifecycle
    description: >-
      Own the handoffs between lifecycle stages — concept, development,
      production, utilization, support, retirement. Plans transition
      activities, defines entry and exit criteria for each stage, and
      keeps the technical baseline aligned with the program schedule.
    triggers:
      - lifecycle stage
      - transition plan
      - entry criteria
      - exit criteria
      - retirement
      - sustainment
      - operations handoff
    agent_affinity:
      - se-chief-engineer
      - se-configuration-manager

agents:
  topology: router
  router_agent: se-chief-engineer
  agents:
    - name: se-chief-engineer
      role: >-
        Opus-class agent that owns the end-to-end technical integrity of
        the system. Makes architecture and trade decisions, arbitrates
        between subsystem teams, routes work to the other SE agents, and
        acts as capcom for the cartridge. The single technical voice
        that signs off on the baseline.
      model: opus
      tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob
      is_capcom: true

    - name: se-requirements-analyst
      role: >-
        Sonnet agent that runs requirements day-to-day — elicitation
        notes, requirement writing, traceability matrices, quality
        checks, and change impact on the requirements baseline. Keeps
        the requirements database clean and queryable.
      model: sonnet
      tools:
        - Read
        - Write
        - Edit
        - Grep

    - name: se-verification-lead
      role: >-
        Opus-class agent specialized in verification and validation
        strategy. Authors the verification plan and matrix, runs test
        readiness reviews, owns the evidence package that closes each
        requirement, and leads the acceptance campaign with the
        stakeholder.
      model: opus
      tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob

    - name: se-risk-and-safety-officer
      role: >-
        Opus-class agent that owns the risk register, the hazard
        analysis, and the safety case. Performs FMEA / FTA, approves
        changes that touch safety-critical paths, and escalates red
        risks to program leadership with a documented mitigation plan.
      model: opus
      tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob

    - name: se-configuration-manager
      role: >-
        Sonnet agent that runs configuration management — baselines,
        change requests, ICD registry, as-built records, and the
        audit-ready history of what was built when. Keeps every other
        agent working from a single trusted configuration view.
      model: sonnet
      tools:
        - Read
        - Write
        - Edit
        - Grep

teams:
  se-requirements-team:
    description: >-
      Capture stakeholder needs and produce a baselined requirements
      set. Chief engineer frames scope and allocation, requirements
      analyst writes and traces each item, configuration manager
      freezes the baseline and opens the change-control channel.
    agents:
      - se-chief-engineer
      - se-requirements-analyst
      - se-configuration-manager
    use_when: >-
      a new program, subsystem, or major change needs a baselined
      requirements set before design work begins

  se-architecture-trade-team:
    description: >-
      Design the system architecture and run the trade studies that
      justify it. Chief engineer drives the architecture and
      decisions, requirements analyst keeps the trade criteria tied
      to real stakeholder needs, risk-and-safety officer surfaces
      hazards that should move the trade.
    agents:
      - se-chief-engineer
      - se-requirements-analyst
      - se-risk-and-safety-officer
    use_when: >-
      choosing between architectural alternatives or evaluating a
      technology insertion that reshapes the system

  se-verification-validation-team:
    description: >-
      Plan and execute the V&V campaign. Verification lead owns the
      plan and matrix, chief engineer approves scope and tailoring,
      configuration manager ties each piece of evidence back to the
      configuration that was tested.
    agents:
      - se-verification-lead
      - se-chief-engineer
      - se-configuration-manager
    use_when: >-
      entering a verification or validation phase, standing up a test
      campaign, or preparing an acceptance package

  se-risk-safety-review-team:
    description: >-
      Review and disposition technical risks and safety items. Risk
      and safety officer drives the review, chief engineer approves
      mitigations that change the architecture, verification lead
      confirms the mitigation is testable.
    agents:
      - se-risk-and-safety-officer
      - se-chief-engineer
      - se-verification-lead
    use_when: >-
      risk review board, hazard review, or change that touches a
      safety-critical function
