id: troubleshooting
name: Troubleshooting
version: 0.1.0
author: tibsfox
description: >-
  A full cartridge for general-purpose troubleshooting across all
  domains — software, hardware, mechanical, electrical, plumbing,
  chemical and process, biological, organizational, and human-system.
  Covers problem framing and symptom capture, divide-and-conquer
  bisection, five-whys root-cause, hypothesis-and-test, observation
  and measurement, reproducibility and isolation, fault-tree and
  failure-mode analysis, comparative diagnosis, intermittent and
  transient faults, safe-state and containment, post-incident
  analysis, and mentoring handoff. Domain-agnostic by design —
  composes over any physical or abstract system.
