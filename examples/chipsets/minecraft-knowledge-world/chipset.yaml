    description: "Hardware discovery and resource budgeting specialist"
    skills: [hardware-discovery, resource-budgeting]
    team: mc-infra
    model: sonnet
    tools: "Read, Bash, Glob, Grep"

  - name: infra-provisioner
    description: "PXE boot, kickstart provisioning, and VM lifecycle worker"
    skills: [pxe-boot, kickstart-provisioning, vm-lifecycle]
    team: mc-infra
    model: sonnet
    tools: "Read, Write, Bash, Glob, Grep"

  - name: platform-scout
    description: "Platform subsystem discovery and distribution abstraction specialist"
    skills: [platform-discovery, distro-abstraction]
    team: mc-platform
    model: sonnet
    tools: "Read, Bash, Glob, Grep"

  - name: platform-engineer
    description: "Hypervisor abstraction and hardware-adaptive configuration worker"
    skills: [hypervisor-abstraction, hardware-adaptation]
    team: mc-platform
    model: sonnet
    tools: "Read, Write, Bash, Glob, Grep"

  - name: amiga-emulator
    description: "FS-UAE installation and Amiga emulation configuration specialist"
    skills: [uae-emulation]
    team: mc-amiga
    model: sonnet
    tools: "Read, Write, Bash, Glob, Grep"

  - name: amiga-archivist
    description: "Amiga asset conversion and content curation worker"
    skills: [asset-conversion, content-curation]
    team: mc-amiga
    model: sonnet
    tools: "Read, Write, Bash, Glob, Grep"

  - name: world-architect
    description: "Knowledge World spatial design and schematic library leader"
    skills: [world-design, schematic-library]
    team: mc-creative
    model: sonnet
    tools: "Read, Write, Glob, Grep"

  - name: curriculum-designer
    description: "Educational curriculum and guided build methodology specialist"
    skills: [educational-curriculum]
    team: mc-creative
