id: psychology-department-v1-0
name: psychology-department-v1.0
version: 1.0.0
author: skill-creator cartridge migrate (v1.49.636 C2)
description: >
  A coordinated psychology department providing multi-perspective expertise
  through seven named agents (James, Piaget, Vygotsky, Kahneman, Rogers, Hooks,
  Skinner-P), six knowledge skills, and three pre-composed teams. Persists work
  via Grove records and integrates with the college psychology department
  concept graph.
trust: system
provenance:
  origin: migration
  createdAt: 2026-05-11
  migrated_from: legacy-department-chipset
chipsets:
  - kind: college
    department: psychology
    concept_graph:
      read: true
      write: true
    try_session_generation: true
    learning_pathway_updates: true
    wings:
      - Brain & Cognition
      - Emotion & Motivation
      - Development
      - Social Psychology
      - Behavior & Mental Health
  - kind: department
    skills:
      cognitive-psychology:
        domain: psychology
        description: Attention, memory, perception, decision-making, language,
          problem-solving
        triggers:
          - attention
          - memory
          - perception
          - decision-making
          - cognitive bias
          - heuristic
          - System 1
          - System 2
          - problem solving
        agent_affinity:
          - kahneman
          - james
      developmental-psychology:
        domain: psychology
        description: Piaget stages, attachment, moral development, lifespan development
        triggers:
          - developmental
          - child development
          - Piaget
          - attachment
          - moral development
          - adolescent
          - aging
          - lifespan
          - Erikson
        agent_affinity:
          - piaget
          - vygotsky
      social-psychology:
        domain: psychology
        description: Conformity, obedience, attitudes, group dynamics, prejudice
        triggers:
          - conformity
          - obedience
          - attitude
          - group dynamics
          - prejudice
          - stereotype
          - social influence
          - groupthink
          - implicit bias
        agent_affinity:
          - hooks
          - vygotsky
          - kahneman
      clinical-foundations:
        domain: psychology
        description: Anxiety, depression, personality theories, therapeutic approaches
        triggers:
          - anxiety
          - depression
          - therapy
          - CBT
          - person-centered
          - disorder
          - personality
          - treatment
          - mental health
        agent_affinity:
          - rogers
          - hooks
          - skinner-p
      research-methods-psych:
        domain: psychology
        description: Experimental design, ethics, statistics, replication crisis
        triggers:
          - experiment
          - research design
          - p-value
          - replication
          - effect size
          - IRB
          - informed consent
          - statistical
          - sample size
        agent_affinity:
          - kahneman
          - james
      behavioral-neuroscience:
        domain: psychology
        description: Brain structure, neurotransmitters, neural plasticity,
          psychopharmacology
        triggers:
          - brain
          - neurotransmitter
          - dopamine
          - serotonin
          - cortex
          - amygdala
          - plasticity
          - pharmacology
          - neural
        agent_affinity:
          - james
          - kahneman
    agents:
      topology: router
      router_agent: james
      agents:
        - name: james
          role: department chair — classification, routing, synthesis
          model: opus
          tools:
            - Read
            - Glob
            - Grep
            - Bash
            - Write
          is_capcom: true
          historical: William James (1842-1910)
        - name: piaget
          role: developmental specialist — cognitive stages, lifespan development
          model: opus
          tools:
            - Read
            - Grep
            - Bash
          historical: Jean Piaget (1896-1980)
        - name: vygotsky
          role: social-cultural specialist — ZPD, scaffolding, cultural mediation
          model: sonnet
          tools:
            - Read
            - Grep
          historical: Lev Vygotsky (1896-1934)
        - name: kahneman
          role: cognitive-behavioral specialist — heuristics, biases, System 1/2, research
            methods
          model: opus
          tools:
            - Read
            - Grep
            - Bash
          historical: Daniel Kahneman (1934-2024)
        - name: rogers
          role: clinical-humanistic specialist — person-centered therapy, unconditional
            positive regard
          model: sonnet
          tools:
            - Read
            - Write
          historical: Carl Rogers (1902-1987)
        - name: hooks
          role: social justice specialist — intersectionality, feminist psychology, power
            analysis
          model: sonnet
          tools:
            - Read
            - Grep
          historical: bell hooks (1952-2021)
        - name: skinner-p
          role: pedagogy specialist — operant conditioning applied to learning design
          model: sonnet
          tools:
            - Read
            - Write
          historical: B.F. Skinner (1904-1990), reimagined as pedagogy agent
    teams:
      psychology-seminar-team:
        description: Full department for complex multi-perspective problems
        agents:
          - james
          - piaget
          - vygotsky
          - kahneman
          - rogers
          - hooks
          - skinner-p
        use_when: multi-domain, graduate-level, or full-analysis requests
      research-design-team:
        description: Focused research design and methodology
        agents:
          - kahneman
          - piaget
          - james
          - skinner-p
        use_when: study design, methodology evaluation, replication planning
      case-study-team:
        description: Clinical case formulation and intervention design
        agents:
          - rogers
          - hooks
          - vygotsky
          - skinner-p
        use_when: case formulation, treatment planning, intervention design
    customization:
      rename_agents: true
      replace_skills: true
      swap_grove_types: true
      remap_college_department: true
      template_pattern: department
    evaluation:
      gates:
        pre_deploy:
          - check: all_skills_have_descriptions
            description: Every skill must have a non-empty description
            action: block
          - check: all_agents_have_roles
            description: Every agent must have a non-empty role
            action: block
          - check: grove_record_types_defined
            description: All 5 psychology Grove record types documented
            action: block
          - check: college_concept_ids_valid
            description: All referenced concept IDs exist in college psychology department
            action: block
          - check: router_agent_is_capcom
            description: The router agent (james) must be CAPCOM
            action: block
      benchmark:
        trigger_accuracy_threshold: 0.85
        test_cases_minimum: 30
        domains_covered:
          - cognitive
          - developmental
          - social
          - clinical
          - methods
          - neuroscience
  - kind: grove
    namespace: psychology-department
    record_types:
      - name: PsychologicalAnalysis
        description: Bias identification, structural analysis, or multi-framework
          analysis of a psychological phenomenon
      - name: CaseFormulation
        description: Clinical case conceptualization with person-centered, structural,
          social, and behavioral perspectives
      - name: ResearchDesign
        description: Research study design with methodology, power analysis, and ethical
          considerations
      - name: PsychologicalExplanation
        description: Teaching artifact or theoretical explanation at a specified level
      - name: PsychologySession
        description: Session log linking work products to interaction context
