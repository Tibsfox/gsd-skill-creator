[package]
name = "gsd-os"
version = "1.36.0"
edition = "2021"
description = "GSD-OS Desktop Application"

[lib]
name = "gsd_os_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
tauri = { version = "2.10", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
notify = { version = "8.2", default-features = false }
notify-debouncer-full = { version = "0.7", default-features = false }
portable-pty = "0.9"
tokio = { version = "1", features = ["sync", "macros", "rt-multi-thread", "time", "process", "io-util"] }
uuid = { version = "1", features = ["v4"] }
dirs = "6"
zeroize = { version = "1", features = ["derive"] }
base64 = "0.22"

[features]
gnome-keyring = []
macos-keychain = []

[dev-dependencies]
tempfile = "3"

[build-dependencies]
tauri-build = { version = "2.5", features = [] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true

[profile.dev]
opt-level = 0
