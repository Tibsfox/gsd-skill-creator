<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$ — LTM Research</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #221f3a;
            --accent: #FFB300;
            --text: #eee;
            --muted: #a0a0b0;
            --link: #9575CD;
            --border: #2f2a4a;
            --primary: #4527A0;
            --mem: #FFD54F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; padding: 2rem; max-width: 900px; margin: 0 auto; }
        h1 { color: var(--mem); font-size: 1.8rem; margin: 0 0 0.5rem; }
        h2 { color: var(--accent); font-size: 1.4rem; margin: 2.5rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        h3 { color: var(--link); font-size: 1.15rem; margin: 2rem 0 0.75rem; }
        h4 { color: var(--mem); font-size: 1rem; margin: 1.5rem 0 0.5rem; }
        p { margin-bottom: 1rem; }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        strong { color: var(--mem); }
        em { color: var(--muted); font-style: italic; }
        code { background: var(--surface); color: var(--mem); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
        pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
        pre code { background: none; padding: 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th { background: var(--surface); color: var(--mem); padding: 0.6rem 0.8rem; text-align: left; border-bottom: 2px solid var(--border); font-size: 0.9rem; }
        td { padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: rgba(149,117,205,0.05); }
        ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
        li { margin-bottom: 0.3rem; }
        blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: var(--muted); }
        hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
        .nav { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); }
        .header-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="header-meta">
        LTM — Long-Term Memory Systems for AI Agents<br>
        PNW Research Series &middot;
        <a href="../index.html">Back to LTM Index</a> &middot;
        <a href="../../index.html">Series Index</a>
    </div>
    $body$
    <div class="nav">
        <a href="../index.html">&larr; Back to LTM Index</a> &middot;
        Published April 2026 &middot; PNW Research Series &middot;
        <a href="https://tibsfox.com/Research/LTM/">tibsfox.com/Research/LTM</a>
    </div>
</body>
</html>
