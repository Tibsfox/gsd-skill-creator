<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:system-ui,-apple-system,sans-serif;color:#c8d0e0}
canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10}
#topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.85);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.06)}
#topbar a{color:#93c5fd;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}
#topbar a:hover{color:#bfdbfe}
.sep{color:rgba(255,255,255,.15);font-size:13px}
#title{color:#e2e8f0;font-size:14px;font-weight:700;white-space:nowrap}
#search{all:unset;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:4px 10px;color:#fff;font-size:12px;width:150px;pointer-events:auto;transition:all .2s}
#search:focus{border-color:rgba(255,255,255,.3);width:200px;background:rgba(255,255,255,.1)}
#search::placeholder{color:rgba(255,255,255,.25)}
#resetBtn{all:unset;cursor:pointer;padding:3px 10px;border-radius:3px;font-size:11px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08);pointer-events:auto;transition:all .15s}
#resetBtn:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
#clusters{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.cl{all:unset;cursor:pointer;padding:2px 7px;border-radius:3px;font-size:10px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);transition:all .15s;pointer-events:auto;white-space:nowrap}
.cl:hover{color:#fff;border-color:var(--c);background:rgba(255,255,255,.04)}
.cl.on{color:#fff;background:var(--c);border-color:var(--c)}
#tooltip{position:absolute;pointer-events:none;background:rgba(15,15,35,.94);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:8px 12px;font-size:12px;display:none;z-index:20;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#tooltip .tt-id{color:rgba(255,255,255,.4);font-size:10px;font-family:monospace}
#tooltip .tt-name{color:#fff;font-weight:600;margin:1px 0}
#tooltip .tt-cluster{font-size:10px;margin-top:2px}
#tooltip .tt-pairing{font-size:10px;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.08);line-height:1.5}
#tooltip .tt-pairing .pair-label{color:rgba(255,255,255,.35);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
#tooltip .tt-pairing .pair-artist{color:#93c5fd;font-weight:500}
#tooltip .tt-pairing .pair-species{color:#86efac;font-weight:500}
#tooltip .tt-pairing .pair-detail{color:rgba(255,255,255,.55)}
#tooltip .tt-energy{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}
#filterbar{display:flex;align-items:center;padding:4px 12px;gap:6px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.75);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.04)}
#filterbar label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}
.energy-btn{all:unset;cursor:pointer;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.1);font-size:9px;text-align:center;line-height:22px;color:rgba(255,255,255,.5);pointer-events:auto;transition:all .15s}
.energy-btn:hover{border-color:var(--ec);color:#fff}
.energy-btn.on{background:var(--ec);border-color:var(--ec);color:#fff;box-shadow:0 0 8px var(--ec)}
.filter-select{all:unset;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:2px 8px;color:rgba(255,255,255,.6);font-size:11px;pointer-events:auto;cursor:pointer}
.filter-select:hover{border-color:rgba(255,255,255,.2);color:#fff}
.filter-select option{background:#1a1a2e;color:#fff}
#stats{position:absolute;bottom:8px;left:12px;right:12px;font-size:10px;color:rgba(255,255,255,.3);pointer-events:none;z-index:10;display:flex;justify-content:space-between}
#stats .stats-left{}
#stats .stats-right{text-align:right}
#legend{position:absolute;bottom:30px;right:12px;pointer-events:auto;z-index:10}
#legend-toggle{all:unset;cursor:pointer;padding:4px 10px;border-radius:4px;font-size:10px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);background:rgba(10,10,26,.7);backdrop-filter:blur(6px)}
#legend-toggle:hover{color:#fff;border-color:rgba(255,255,255,.2)}
#legend-panel{display:none;background:rgba(10,10,26,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:10px;max-height:300px;overflow-y:auto;min-width:180px}
#legend-panel.open{display:block}
#legend-panel h4{color:rgba(255,255,255,.5);font-size:9px;text-transform:uppercase;letter-spacing:.6px;margin:8px 0 4px;font-weight:600}
#legend-panel h4:first-child{margin-top:0}
.legend-row{display:flex;align-items:center;gap:6px;padding:1px 0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-ring{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid;background:transparent}
.legend-text{color:rgba(255,255,255,.55)}
.legend-size{display:flex;align-items:center;gap:4px;padding:2px 0}
.legend-circle{border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
@media(max-width:640px){#search{width:100%;order:20}#clusters{order:19}#filterbar{padding:4px 8px;gap:4px}}

// === FORCE LAYOUT ===
var px=new Float32Array(N),py=new Float32Array(N);
var vx=new Float32Array(N),vy=new Float32Array(N);
var clusterAngle={};
CLUSTERS.forEach(function(c,i){clusterAngle[c.name]=i*2*Math.PI/CLUSTERS.length});
PROJECTS.forEach(function(p,i){
  var c=clusterOf[p.id];
  var a=clusterAngle[c.name]||0;
  var r=80+Math.random()*60;
  px[i]=Math.cos(a)*r+(Math.random()-.5)*40;
  py[i]=Math.sin(a)*r+(Math.random()-.5)*40;
});

(function runForce(){
  var repulsion=600,attraction=0.01,damping=0.88,centerPull=0.003,clusterPull=0.005;
  for(var iter=0;iter<100;iter++){
    var cx={},cy={},cc={};
    CLUSTERS.forEach(function(c){cx[c.name]=0;cy[c.name]=0;cc[c.name]=0});
    for(var i=0;i<N;i++){var cn=clusterOf[PROJECTS[i].id].name;cx[cn]+=px[i];cy[cn]+=py[i];cc[cn]++}
    CLUSTERS.forEach(function(c){if(cc[c.name]){cx[c.name]/=cc[c.name];cy[c.name]/=cc[c.name]}});
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=px[i]-px[j],dy=py[i]-py[j];
        var d2=dx*dx+dy*dy+1;
        var f=repulsion/d2;
        var fx=dx*f/Math.sqrt(d2),fy=dy*f/Math.sqrt(d2);
        vx[i]+=fx;vy[i]+=fy;vx[j]-=fx;vy[j]-=fy;
      }
    }
    for(var e=0;e<edgeIdx.length;e++){
      var a=edgeIdx[e][0],b=edgeIdx[e][1];
      var dx=px[b]-px[a],dy=py[b]-py[a];
      var d=Math.sqrt(dx*dx+dy*dy)+0.1;
      var f=d*attraction;
      vx[a]+=dx*f;vy[a]+=dy*f;vx[b]-=dx*f;vy[b]-=dy*f;
    }
    for(var i=0;i<N;i++){
      vx[i]-=px[i]*centerPull;vy[i]-=py[i]*centerPull;
      var cn=clusterOf[PROJECTS[i].id].name;
      vx[i]+=(cx[cn]-px[i])*clusterPull;vy[i]+=(cy[cn]-py[i])*clusterPull;
    }
    for(var i=0;i<N;i++){
      vx[i]*=damping;vy[i]*=damping;
      var maxV=50;
      if(vx[i]>maxV)vx[i]=maxV;if(vx[i]<-maxV)vx[i]=-maxV;
      if(vy[i]>maxV)vy[i]=maxV;if(vy[i]<-maxV)vy[i]=-maxV;
      px[i]+=vx[i];py[i]+=vy[i];
    }
  }
})();

// World <-> screen
function worldToScreen(wx,wy){
  return[(wx-camX)*camZoom+canvas.width/2, -(wy-camY)*camZoom+canvas.height/2];
}
function screenToWorld(sx,sy){
  return[(sx-canvas.width/2)/camZoom+camX, -(sy-canvas.height/2)/camZoom+camY];
}

function findNode(clientX,clientY){
  var sx=clientX*dpr,sy=clientY*dpr;
  var wp=screenToWorld(sx,sy);
  var best=-1,bestD=Infinity;
  var threshold=16/camZoom;
  for(var i=0;i<N;i++){
    if(nodeAlpha[i]<0.15)continue;
    var dx=px[i]-wp[0],dy=py[i]-wp[1];
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<threshold&&d<bestD){bestD=d;best=i}
  }
  return best;
}

  dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
  dragCamX=camX;dragCamY=camY;lastInteract=performance.now();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',function(e){
  lastInteract=performance.now();
  if(dragging){
    var dx=(e.clientX-dragStartX)*dpr/camZoom;
    var dy=(e.clientY-dragStartY)*dpr/camZoom;
    targetCamX=dragCamX-dx;
    targetCamY=dragCamY+dy;
  } else {
    var idx=findNode(e.clientX,e.clientY);
    if(idx!==hoverIdx){hoverIdx=idx;updateTooltip(e.clientX,e.clientY)}
    else if(idx>=0)updateTooltip(e.clientX,e.clientY);
  }
});
canvas.addEventListener('pointerup',function(e){
  var wasDrag=Math.abs(e.clientX-dragStartX)>3||Math.abs(e.clientY-dragStartY)>3;
  dragging=false;
  if(!wasDrag){
    var idx=findNode(e.clientX,e.clientY);
    if(idx>=0)window.location.href=PROJECTS[idx].id+'/index.html';
  }
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();lastInteract=performance.now();
  var factor=e.deltaY>0?0.9:1.1;
  targetZoom=Math.max(0.5,Math.min(20,targetZoom*factor));
  var wp=screenToWorld(e.clientX*dpr,e.clientY*dpr);
  targetCamX+=(wp[0]-targetCamX)*(1-1/factor)*0.3;
  targetCamY+=(wp[1]-targetCamY)*(1-1/factor)*0.3;
},{passive:false});

    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){

    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0)targetZoom=Math.max(0.5,Math.min(20,targetZoom*(dist/lastTouchDist)));

// Build set of pairing-matched project IDs for energy/order/genre filters
function getPairingMatchedIds(){
  var matched=new Set();
  var hasEnergyFilter=activeEnergy>0;
  var hasOrderFilter=activeOrder!=='';
  var hasGenreFilter=activeGenre!=='';

  if(!hasEnergyFilter&&!hasOrderFilter&&!hasGenreFilter)return null; // no pairing filter active

  PAIRINGS.forEach(function(p){
    var energyMatch=!hasEnergyFilter||(p.aEnergy===activeEnergy||p.sEnergy===activeEnergy);
    var orderMatch=!hasOrderFilter||p.order===activeOrder;
    var genreMatch=!hasGenreFilter||p.genre.indexOf(activeGenre)!==-1;

    if(energyMatch&&orderMatch&&genreMatch){
      // This pairing matches - highlight S36 and SPS
      matched.add('S36');
      matched.add('SPS');
    }
  });

  // If there are active pairing filters, also keep S36/SPS neighbors visible (dimmed)
  return matched;
}

function updateVisibility(){
  var matchSet=null;
  if(searchTerm){
    matchSet=new Set();
    PROJECTS.forEach(function(p,i){
      if(p.name.toLowerCase().indexOf(searchTerm)!==-1||p.id.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i);
    });
    // Also search pairings
    PAIRINGS.forEach(function(pair){
      if(pair.artist.toLowerCase().indexOf(searchTerm)!==-1||
         pair.species.toLowerCase().indexOf(searchTerm)!==-1||
         pair.family.toLowerCase().indexOf(searchTerm)!==-1||
         pair.order.toLowerCase().indexOf(searchTerm)!==-1||
         pair.genre.toLowerCase().indexOf(searchTerm)!==-1){
        // Highlight S36 and SPS
        if(s36Idx!==undefined)matchSet.add(s36Idx);
        if(spsIdx!==undefined)matchSet.add(spsIdx);
      }
    });
  }

  var pairingMatched=getPairingMatchedIds();

  for(var i=0;i<N;i++){
    var visible=true;
    var pid=PROJECTS[i].id;
    if(activeCluster&&clusterOf[pid]!==activeCluster)visible=false;
    if(matchSet&&!matchSet.has(i))visible=false;

    // Pairing filters (energy, order, genre)
    if(pairingMatched){
      if(!pairingMatched.has(pid)){
        // Dim non-matched projects but don't fully hide
        if(visible)nodeAlpha[i]=0.12;
        else nodeAlpha[i]=0.04;
        continue;
      }
    }

    nodeAlpha[i]=visible?1.0:0.06;
  }
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

// Pre-compute energy for S36/SPS (average of all pairings)
// For the engine nodes, we use the most common energy
var s36EnergyAvg=3,spsEnergyAvg=3;

function getNodeRadius(i){
  return Math.max(4,3+degree[i]*0.8);
}

function frame(t){
  requestAnimationFrame(frame);

  // Smooth camera
  camX+=(targetCamX-camX)*0.12;
  camY+=(targetCamY-camY)*0.12;
  camZoom+=(targetZoom-camZoom)*0.12;

  // Ambient drift
  var idle=t-lastInteract;
  if(idle>4000&&!dragging){
    driftTime+=0.0008;
    var amt=Math.min((idle-4000)/15000,1)*0.1;
    for(var i=0;i<N;i++){
      var phase=i*0.37+driftTime;
      px[i]+=Math.sin(phase)*amt*0.02;
      py[i]+=Math.cos(phase*1.3)*amt*0.02;
    }
  }

  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,w,h);

  // Determine if we're hovering over S36 or SPS (for paired highlight)
  var hoverIsS36=(hoverIdx>=0&&PROJECTS[hoverIdx].id==='S36');
  var hoverIsSPS=(hoverIdx>=0&&PROJECTS[hoverIdx].id==='SPS');
  var highlightPair=(hoverIsS36||hoverIsSPS);

  // Draw S36-SPS connecting line when either is hovered
  if(highlightPair&&s36Idx!==undefined&&spsIdx!==undefined){
    var sp36=worldToScreen(px[s36Idx],py[s36Idx]);
    var spSPS=worldToScreen(px[spsIdx],py[spsIdx]);
    if(isFinite(sp36[0])&&isFinite(spSPS[0])){
      ctx.save();
      ctx.setLineDash([6,4]);
      ctx.lineWidth=2;
      ctx.strokeStyle='rgba(147,197,253,0.4)';
      ctx.beginPath();
      ctx.moveTo(sp36[0],sp36[1]);
      ctx.lineTo(spSPS[0],spSPS[1]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Draw edges
  ctx.lineWidth=1;
  for(var i=0;i<edgeIdx.length;i++){
    var a=edgeIdx[i][0],b=edgeIdx[i][1];
    var alphaA=nodeAlpha[a],alphaB=nodeAlpha[b];
    var ea=Math.min(alphaA,alphaB)*0.2;

    // Brighten edges to/from hovered node
    if(hoverIdx>=0&&(a===hoverIdx||b===hoverIdx)){
      ea=Math.min(alphaA,alphaB)*0.6;
    }

    if(ea<0.01)continue;
    var colA=clusterRgb[colorOf[PROJECTS[a].id]]||[150,150,150];
    var colB=clusterRgb[colorOf[PROJECTS[b].id]]||[150,150,150];
    var mr=Math.round((colA[0]+colB[0])/2),mg=Math.round((colA[1]+colB[1])/2),mb=Math.round((colA[2]+colB[2])/2);
    var sa=worldToScreen(px[a],py[a]),sb=worldToScreen(px[b],py[b]);
    if(!isFinite(sa[0])||!isFinite(sb[0]))continue;
    ctx.strokeStyle='rgba('+mr+','+mg+','+mb+','+ea.toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(sa[0],sa[1]);ctx.lineTo(sb[0],sb[1]);ctx.stroke();
  }

  // Draw nodes
  for(var i=0;i<N;i++){
    var alpha=nodeAlpha[i];
    if(alpha<0.01)continue;
    var pid=PROJECTS[i].id;
    var col=clusterRgb[colorOf[pid]]||[150,150,150];
    var r=getNodeRadius(i);
    var isHovered=(i===hoverIdx);
    if(isHovered)r*=1.8;

    // Highlight neighbors of hovered node
    var isNeighborOfHover=(hoverIdx>=0&&neighbors[i].has(hoverIdx));
    if(isNeighborOfHover)r*=1.3;

    var sp=worldToScreen(px[i],py[i]);

    // Skip if off-screen or NaN
    if(!isFinite(sp[0])||!isFinite(sp[1]))continue;
    if(sp[0]<-50||sp[0]>w+50||sp[1]<-50||sp[1]>h+50)continue;

    // Energy glow ring for S36 and SPS
    var nodeEnergy=0;
    if(pid==='S36')nodeEnergy=s36EnergyAvg;
    else if(pid==='SPS')nodeEnergy=spsEnergyAvg;

    // Draw energy glow ring
    if(nodeEnergy>0&&alpha>0.3){
      var ec=energyRgb[nodeEnergy];
      if(ec){
        ctx.strokeStyle='rgba('+ec[0]+','+ec[1]+','+ec[2]+','+(alpha*0.35).toFixed(2)+')';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(sp[0],sp[1],r+4,0,Math.PI*2);ctx.stroke();
        // Outer soft glow
        ctx.fillStyle='rgba('+ec[0]+','+ec[1]+','+ec[2]+','+(alpha*0.06).toFixed(2)+')';
        ctx.beginPath();ctx.arc(sp[0],sp[1],r+10,0,Math.PI*2);ctx.fill();
      }
    }

    // Cluster glow
    if(alpha>0.5&&r>2){
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(alpha*0.15).toFixed(2)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r*2.5,0,Math.PI*2);ctx.fill();
    }

    // Highlight ring for S36/SPS pair when either is hovered
    if(highlightPair&&(pid==='S36'||pid==='SPS')){
      ctx.strokeStyle='rgba(147,197,253,0.5)';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+6,0,Math.PI*2);ctx.stroke();
    }

    // Core
    var bright=isHovered?80:(isNeighborOfHover?40:60);
    ctx.fillStyle='rgba('+Math.min(255,col[0]+bright)+','+Math.min(255,col[1]+bright)+','+Math.min(255,col[2]+bright)+','+alpha.toFixed(2)+')';
    ctx.beginPath();ctx.arc(sp[0],sp[1],r,0,Math.PI*2);ctx.fill();

    // Label
    if(camZoom>1.5||degree[i]>6||isHovered||isNeighborOfHover){
      var fontSize=Math.max(9,Math.min(13,10*camZoom/2));
      ctx.font=(isHovered?'bold ':'')+fontSize+'px system-ui';
      ctx.fillStyle='rgba(255,255,255,'+(alpha*(isHovered?1.0:0.8)).toFixed(2)+')';
      ctx.fillText(pid,sp[0]+r+3,sp[1]+fontSize*0.35);

      // Show genre/family as sub-label when zoomed in close
      if(camZoom>4&&(pid==='S36'||pid==='SPS')){
        ctx.font=(fontSize*0.75)+'px system-ui';
        ctx.fillStyle='rgba(255,255,255,'+(alpha*0.4).toFixed(2)+')';
        var sublabel=(pid==='S36')?'64 Artists':'64 Species';
        ctx.fillText(sublabel,sp[0]+r+3,sp[1]+fontSize*0.35+fontSize*0.85);
      }
    }
  }

  // Cluster labels at center of each cluster
  if(camZoom<2.5){
    ctx.font='bold 14px system-ui';
    ctx.textAlign='center';
    CLUSTERS.forEach(function(c){
      var cx=0,cy=0,cn=0;
      c.ids.forEach(function(id){
        var idx=idxMap[id];
        if(idx!==undefined){cx+=px[idx];cy+=py[idx];cn++}
      });
      if(cn){
        cx/=cn;cy/=cn;
        var sp=worldToScreen(cx,cy);
        var alpha=activeCluster?(activeCluster===c?0.7:0.1):0.4;
        ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';
        ctx.fillText(c.name,sp[0],sp[1]-20);
      }
    });
    ctx.textAlign='left';
  }

  // Draw pairing info overlay when hovering S36 or SPS at sufficient zoom
  if(highlightPair&&camZoom>3){
    var targetIdx=hoverIsS36?s36Idx:spsIdx;
    var sp=worldToScreen(px[targetIdx],py[targetIdx]);
    if(isFinite(sp[0])&&isFinite(sp[1])){
      // Draw a small info card near the node
      ctx.save();
      ctx.font='10px system-ui';
      ctx.textAlign='left';
      var cardX=sp[0]+25,cardY=sp[1]-40;
      ctx.fillStyle='rgba(15,15,35,0.85)';
      // Determine visible pairings to show (first 5 near the current energy filter)
      var showPairings=[];
      var startDeg=activeEnergy?0:Math.max(0,Math.floor(PAIRINGS.length/2)-2);
      for(var pi=0;pi<PAIRINGS.length&&showPairings.length<4;pi++){
        var pair=PAIRINGS[(pi+startDeg)%PAIRINGS.length];
        if(activeEnergy&&pair.aEnergy!==activeEnergy&&pair.sEnergy!==activeEnergy)continue;
        showPairings.push(pair);
      }

      if(showPairings.length>0){
        var cardH=showPairings.length*14+8;
        var cardW=200;
        ctx.fillRect(cardX,cardY,cardW,cardH);
        ctx.strokeStyle='rgba(255,255,255,0.1)';
        ctx.lineWidth=1;
        ctx.strokeRect(cardX,cardY,cardW,cardH);

        showPairings.forEach(function(pair,idx){
          var y=cardY+12+idx*14;
          // Energy dot
          var ec=energyRgb[pair.aEnergy];
          if(ec){
            ctx.fillStyle='rgba('+ec[0]+','+ec[1]+','+ec[2]+',0.8)';
            ctx.beginPath();ctx.arc(cardX+8,y-3,3,0,Math.PI*2);ctx.fill();
          }
          // Artist + species
          ctx.fillStyle='rgba(147,197,253,0.8)';
          ctx.fillText(pair.artist,cardX+16,y);
          ctx.fillStyle='rgba(134,239,172,0.6)';
          ctx.fillText(pair.species,cardX+16+ctx.measureText(pair.artist+' ').width,y);
        });
      }
      ctx.restore();
    }
  }
}
requestAnimationFrame(frame);
</script>
