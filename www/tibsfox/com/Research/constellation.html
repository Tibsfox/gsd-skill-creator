#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10}
#topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.85);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.06)}

#resetBtn:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
#clusters{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.cl{all:unset;cursor:pointer;padding:2px 7px;border-radius:3px;font-size:10px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);transition:all .15s;pointer-events:auto;white-space:nowrap}
.cl:hover{color:#fff;border-color:var(--c);background:rgba(255,255,255,.04)}
.cl.on{color:#fff;background:var(--c);border-color:var(--c)}
#tooltip{position:absolute;pointer-events:none;background:rgba(15,15,35,.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 10px;font-size:12px;display:none;z-index:20;max-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#tooltip .tt-id{color:rgba(255,255,255,.4);font-size:10px;font-family:monospace}
#tooltip .tt-name{color:#fff;font-weight:600;margin:1px 0}

#stats{position:absolute;bottom:8px;left:12px;font-size:10px;color:rgba(255,255,255,.3);pointer-events:none;z-index:10}
@media(max-width:640px){#search{width:100%;order:20}#clusters{order:19}}

var EDGES=[];
'ABL>FLS,OCT,WAL,DAA,SYN,NEH,SYS;ACE>GSD2,SYS,CMH,MPC,OCN,GPO,SGL,SFC,K8S;AIH>LLM,CFU,MST,TCP,SYS;ALV>SNX,TVH,RFC,DAA,COL,BRC;ANM>HEN,ARC,SPA,INP,STA,FFA,GPG,BNY;APR>BHK,ECO,WAL,COL,BRC,MCF,SYS,GRD,GDN;B52>PJM,FFA,SNY,DAA,DRN,DPM,TKH,CAR,BRC;BHC>BHK,GRB,LTS;BHK>GRD,MPC,SGM,LGW,SET,BPS,THE,FQC,DAA;BHM>PPM,WSB,KSM,SAL,ECO,GDN,AGR;BMR>LKR,CDS,HJX,TIBS,COI,PRS;BNY>SGL,BPS,HFE,LED,SVB,OTM,SFC,ECO;CBC>RBH,FCC,C89,KPZ,PSS,IBC,BHM;CDL>COK,FEG,GSD2,ACE,PMG,WAL,SGM,MPC;CDS>TIBS,BRC,MIX,GRV,PJM,FFA,KUB,SGL;CFU>LLM,AIH,MST,TCP,PNP,SYS,K8S,DNS;CGI>GSD2,ACE,PMG,GSA,MGU,CMH,MCF,K8S,OCN;CHS>VKS,RFC,GRD,ECO,BRC,WPH,SYS,K8S;COK>MPC,GRD,SGM,ACE,WAL,GSD2,OTM,BNY;CRY>MIX,SOC,WSB,ACC,KUB,BMR,HFE,CDS;CWC>COK,SAL,DAA,GRD,PPM,GSD2,MPC,BHM,ECO,AWF,GDN,BPS,AGR,ACC;DFQ>RBH,PSS,KPZ,WLF,FCC,C89,CBC,IBC;DHP>DNS,SYS,CMH,MCF,K8S,WPH,TCP,SAN;DNS>RFC,CMH,SYS,K8S,WPH,MCF,FCC,PSS;DPM>DAA,HFE,SGL,CAR,TKH,PIN,DRN,B52,COI;DRN>DPM,HFE,DAA,CAR,B52,FFA,TKH,CDP;EAZ>ATC,FDR,TIBS,LKR,NWZ,ECO,BMR,SGM;ENB>SYS,WPH,PSS,SFC,K8S,CMH,CDS,RBH;FCC>RBH,PSS,SGL,WPH,DAA,CBC,IBC,SVB,KPZ,C89,T55,LED,CMH,SHE,NND,WSB;FEG>COK,SGM,BNY,OTM,SVB,HEN,ACE,MPC;FLS>ABL,OCT,WAL,SYN,DAA;GPG>GPO,SGL,GSD2,K8S,ACE,MPC,GRD,CMH,LED,SYS,T55;GPO>ACE,MPC,K8S,GSD2,CMH,OCN,SYS,SGL,MCF;GRB>BHK,BHC,LTS;GSA>GSD2,CMH,ACE,MCF,PMG,K8S,MGU,COK;HEN>ANM,ARC,FFA,SGL,INP,BNY,STA,OTM,SVB;HFE>DAA,SGL,SRG,LED,FQC,GTP,HFR,SNY;HFR>DAA,SGL,EMG,FQC,BPS,SNL,SNY,LED;HJX>DAA,GRV,MIX,HFE,HFR,SGL,SRG,SSM,PJM,SNY;IBC>RBH,C89,KSM,TIBS,ECO,SAL,CDS,BHM,SYS,CMH,CBC;ICS>ACE,MPC,GSD2,SGM,BCM,OTM,SPA;INP>FFA,ARC,SPA,LED,HEN,ANM,GPG;KFU>TIBS,FFA,BMR,BRC,SGM,MTB,PRS,OTM;LGW>BHK,FQC,SGL,DAA,GRD,BPS,PSS,MPC;LLM>CFU,AIH,MST,TCP,SYS,K8S;LTS>BHC,BHK,GRB,WAL,APR,SYS,MCF;M05>GSD2,ACE,COK,CDL,CMH,MPC,PMG,CDS,MIX,SAL,SGL;MCF>K8S,SYS,GSD2,CMH,NND,OCN,BRC,MCM;MCS>MCM,NND,HGE,OCN,ROF,THE,ACC,WSB;MGU>PMG,GSD2,CDL,K8S,SYS,ACE,COK,MCF;MRW>PLT,CMH,SPA,SNL,BPS,MCR,ECO,VAV;MST>PNP,SYS,TCP,DNS,K8S,RFC,BRC,AVI,ECO,CFU,LLM,AIH,COL,BPS,MAM;MTB>BRC,FFA,TIBS,PRS,DPM,DAA,SGL,COL,BMR,ECO,PIN,COI,HFE;MWC>ACC,WSB,WYR,BCM,COL,NND,BHM,PPM;NEH>VKD,WAL;NWZ>ATC,FDR,SGM,TIBS,LKR,ECO,BMR,GDN;OCT>ABL,FLS,WAL,DAA,NEH;OPS>GSD2,CMH,ACE,K8S,SYS,NND,MCF,OCN;OSC>PKD,LNV,BNY,SGM,OTM,MPC,CMH,K8S;PIN>NND,SYS,OCN,K8S,CMH,MCM,WYR,SFC;PKD>LNV,OSC,COI,ACE,MRW,STE,DPM,PIN;PNP>TCP,SYS,CMH,GSD2,MCF,K8S,DNS,RFC,SGL,EMG;PPM>AGR,GDN,ECO,SAL,AWF,WSB,ACC;PRS>DAA,FQC,SGL,T55,GRD,BMR,TKH,HJX,SPA;PSS>SGL,FCC,BPS,LED,T55,RBH,SYS,K8S,PSG;PTG>WYR,LFR,ECO,FFA,INP,ICS,COK;RFC>SYS,CMH,K8S,WPH,FCC,DNS,MCF,ENB;SET>BPS,MPC,DAA,SGL,PSS,FQC,SNL,BHK,LGW;SFC>SYS,OCN,SYN,NND,K8S,MCM,WYR,PIN;SFH>DPM,DAA,CDS,HFE,SGL,PRS,MIX,BMR,BRC,MTB,C89;SGL>DAA,FQC,T55,GRD,EMG,LED,SPA,ARC;SGM>MPC,GRD,ARC,FQC,SPA,PRS,BHK,ECO;SMP>DAA,GRV,SNY,HFE,PJM,DPM,HJX,CAR;SNL>BPS,T55,SYS,LED,SGL,SHE,SPA,ECO,EMG,PSS,K8S,DAA,AWF,GSD2;SNX>TVH,ALV,RFC,BRC,DAA,GRD;SOC>CDS,GRV,HJX,KUB,PJM,MIX,BMR,CRY;SRD>TCP,PNP,RFC,FEC,SYS,K8S,MDS,CMH,DNS;SRG>HFE,DAA,SGL,FQC,PRS,HFR,DPM,CAR;SSM>PJM,GRV,PPM,SNY,KUB,MIX,SGL,DAA,COL,CAS,TIBS;SST>GSD2,MPC,GSA,DAA,FQC,HFR,MGU,ICS,GRD,BHK,M05,CGI,HFE;STE>SYS,CMH,SAN,K8S,OCN,ACE,VAV,SGL;SVB>C89,BNY,FCC,RBH,KSM,CBC,OTM;TCP>RFC,DNS,DHP,CMH,SYS,K8S,MCF,GRD,WPH;TKH>DPM,CAR,B52,SNY,DAA,HFE,BMR,DRN,PIN;TVH>RFC,SYS,TCP,PNP,DAA,ALV,COL,DHP,BRC;VKD>NEH,WAL,SYS;VKS>SYS,GRD,CMH,DAA,ECO,BRC,CHS,K8S;WPH>SHE,SYS,CMH,SGL,LED,FCC,PSS,GRD,EMG,RBH,BRC,DAA,HFE,GSD2;YNT>LTS,BHK,SYS,RFC,BRC'.split(';').forEach(function(g){var p=g.split('>');var s=p[0];p[1].split(',').forEach(function(t){EDGES.push([s,t])})});

// === BUILD INDEX ===
var idxMap={},clusterOf={},colorOf={};
PROJECTS.forEach(function(p,i){idxMap[p.id]=i});
CLUSTERS.forEach(function(c){c.ids.forEach(function(id){if(!clusterOf[id]){clusterOf[id]=c;colorOf[id]=c.color}})});
PROJECTS.forEach(function(p){if(!clusterOf[p.id]){clusterOf[p.id]=CLUSTERS[0];colorOf[p.id]=CLUSTERS[0].color}});

var N=PROJECTS.length;
var edgeIdx=[];
EDGES.forEach(function(e){
  var a=idxMap[e[0]],b=idxMap[e[1]];
  if(a!==undefined&&b!==undefined)edgeIdx.push([a,b]);
});

// Degree count
var degree=new Uint16Array(N);
edgeIdx.forEach(function(e){degree[e[0]]++;degree[e[1]]++});

// === FORCE LAYOUT ===
var px=new Float32Array(N),py=new Float32Array(N);
var vx=new Float32Array(N),vy=new Float32Array(N);
var clusterAngle={};
CLUSTERS.forEach(function(c,i){clusterAngle[c.name]=i*2*Math.PI/CLUSTERS.length});
PROJECTS.forEach(function(p,i){
  var c=clusterOf[p.id];
  var a=clusterAngle[c.name]||0;
  var r=80+Math.random()*60;
  px[i]=Math.cos(a)*r+(Math.random()-.5)*40;
  py[i]=Math.sin(a)*r+(Math.random()-.5)*40;
});

(function runForce(){
  var repulsion=600,attraction=0.01,damping=0.88,centerPull=0.003,clusterPull=0.005;
  for(var iter=0;iter<100;iter++){
    var cx={},cy={},cc={};
    CLUSTERS.forEach(function(c){cx[c.name]=0;cy[c.name]=0;cc[c.name]=0});
    for(var i=0;i<N;i++){var cn=clusterOf[PROJECTS[i].id].name;cx[cn]+=px[i];cy[cn]+=py[i];cc[cn]++}
    CLUSTERS.forEach(function(c){if(cc[c.name]){cx[c.name]/=cc[c.name];cy[c.name]/=cc[c.name]}});
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=px[i]-px[j],dy=py[i]-py[j];
        var d2=dx*dx+dy*dy+1;
        var f=repulsion/d2;
        var fx=dx*f/Math.sqrt(d2),fy=dy*f/Math.sqrt(d2);
        vx[i]+=fx;vy[i]+=fy;vx[j]-=fx;vy[j]-=fy;
      }
    }
    for(var e=0;e<edgeIdx.length;e++){
      var a=edgeIdx[e][0],b=edgeIdx[e][1];
      var dx=px[b]-px[a],dy=py[b]-py[a];
      var d=Math.sqrt(dx*dx+dy*dy)+0.1;
      var f=d*attraction;
      vx[a]+=dx*f;vy[a]+=dy*f;vx[b]-=dx*f;vy[b]-=dy*f;
    }
    for(var i=0;i<N;i++){
      vx[i]-=px[i]*centerPull;vy[i]-=py[i]*centerPull;
      var cn=clusterOf[PROJECTS[i].id].name;
      vx[i]+=(cx[cn]-px[i])*clusterPull;vy[i]+=(cy[cn]-py[i])*clusterPull;
    }
    for(var i=0;i<N;i++){
      vx[i]*=damping;vy[i]*=damping;
      // Clamp velocity to prevent blowup
      var maxV=50;
      if(vx[i]>maxV)vx[i]=maxV;if(vx[i]<-maxV)vx[i]=-maxV;
      if(vy[i]>maxV)vy[i]=maxV;if(vy[i]<-maxV)vy[i]=-maxV;
      px[i]+=vx[i];py[i]+=vy[i];
    }
  }
})();

// === CANVAS 2D RENDERER ===
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var dpr=Math.min(window.devicePixelRatio||1,2);

function resize(){
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
}
resize();
window.addEventListener('resize',resize);

// Camera
var camX=0,camY=0,camZoom=1;
var targetCamX=0,targetCamY=0,targetZoom=1;
// Fit all nodes
var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
for(var i=0;i<N;i++){
  if(px[i]<minX)minX=px[i];if(px[i]>maxX)maxX=px[i];
  if(py[i]<minY)minY=py[i];if(py[i]>maxY)maxY=py[i];
}
var rangeX=maxX-minX||1,rangeY=maxY-minY||1;
camX=targetCamX=(minX+maxX)*0.5;
camY=targetCamY=(minY+maxY)*0.5;
targetZoom=camZoom=Math.max(0.1,Math.min(10,Math.min(canvas.width/(rangeX*1.3),canvas.height/(rangeY*1.3))));

// State
var dragging=false,dragStartX,dragStartY,dragCamX,dragCamY;
var hoverIdx=-1;
var activeCluster=null;
var searchTerm='';
var nodeAlpha=new Float32Array(N);
for(var i=0;i<N;i++)nodeAlpha[i]=1.0;
var driftTime=0,lastInteract=0;

// World <-> screen
function worldToScreen(wx,wy){
  return[(wx-camX)*camZoom+canvas.width/2, -(wy-camY)*camZoom+canvas.height/2];
}
function screenToWorld(sx,sy){
  return[(sx-canvas.width/2)/camZoom+camX, -(sy-canvas.height/2)/camZoom+camY];
}

function findNode(clientX,clientY){
  var sx=clientX*dpr,sy=clientY*dpr;
  var wp=screenToWorld(sx,sy);
  var best=-1,bestD=Infinity;
  var threshold=16/camZoom;
  for(var i=0;i<N;i++){
    if(nodeAlpha[i]<0.15)continue;
    var dx=px[i]-wp[0],dy=py[i]-wp[1];
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<threshold&&d<bestD){bestD=d;best=i}
  }
  return best;
}

// === INTERACTION ===
canvas.addEventListener('pointerdown',function(e){
  if(e.button>0)return;
  dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
  dragCamX=camX;dragCamY=camY;lastInteract=performance.now();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',function(e){
  lastInteract=performance.now();
  if(dragging){
    var dx=(e.clientX-dragStartX)*dpr/camZoom;
    var dy=(e.clientY-dragStartY)*dpr/camZoom;
    targetCamX=dragCamX-dx;
    targetCamY=dragCamY+dy;
  } else {
    var idx=findNode(e.clientX,e.clientY);
    if(idx!==hoverIdx){hoverIdx=idx;updateTooltip(e.clientX,e.clientY)}
    else if(idx>=0)updateTooltip(e.clientX,e.clientY);
  }
});
canvas.addEventListener('pointerup',function(e){
  var wasDrag=Math.abs(e.clientX-dragStartX)>3||Math.abs(e.clientY-dragStartY)>3;
  dragging=false;
  if(!wasDrag){
    var idx=findNode(e.clientX,e.clientY);
    if(idx>=0)window.location.href=PROJECTS[idx].id+'/index.html';
  }
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();lastInteract=performance.now();
  var factor=e.deltaY>0?0.9:1.1;
  targetZoom=Math.max(0.5,Math.min(20,targetZoom*factor));
  var wp=screenToWorld(e.clientX*dpr,e.clientY*dpr);
  targetCamX+=(wp[0]-targetCamX)*(1-1/factor)*0.3;
  targetCamY+=(wp[1]-targetCamY)*(1-1/factor)*0.3;
},{passive:false});

// Touch pinch
var lastTouchDist=0;
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0)targetZoom=Math.max(0.5,Math.min(20,targetZoom*(dist/lastTouchDist)));
    lastTouchDist=dist;lastInteract=performance.now();
  }
},{passive:true});

// Tooltip
var tooltip=document.getElementById('tooltip');
function updateTooltip(mx,my){
  if(hoverIdx<0){tooltip.style.display='none';canvas.style.cursor='grab';return}
  canvas.style.cursor='pointer';
  var p=PROJECTS[hoverIdx];
  var c=clusterOf[p.id];
  tooltip.querySelector('.tt-id').textContent=p.id;
  tooltip.querySelector('.tt-name').textContent=p.name;
  tooltip.querySelector('.tt-cluster').innerHTML='<span style="color:'+c.color+'">&#9679;</span> '+c.name+' &middot; '+degree[hoverIdx]+' connections';
  tooltip.style.display='block';
  var tx=mx+14,ty=my-10;
  if(tx+220>window.innerWidth)tx=mx-224;
  if(ty<0)ty=my+14;
  tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
}

// Cluster buttons
var clDiv=document.getElementById('clusters');
CLUSTERS.forEach(function(c,i){
  var btn=document.createElement('button');
  btn.className='cl'+(activeCluster===c?' on':'');
  btn.textContent=c.name;
  btn.style.setProperty('--c',c.color);
  btn.addEventListener('click',function(){
    if(activeCluster===c){activeCluster=null;btn.classList.remove('on')}
    else{
      document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')});
      activeCluster=c;btn.classList.add('on');
      var cx=0,cy=0,cn=0;
      PROJECTS.forEach(function(p,j){if(clusterOf[p.id]===c){cx+=px[j];cy+=py[j];cn++}});
      if(cn){targetCamX=cx/cn;targetCamY=cy/cn;targetZoom=Math.max(camZoom,3.0)}
    }
    updateVisibility();lastInteract=performance.now();
  });
  clDiv.appendChild(btn);
});

// Search
var searchInput=document.getElementById('search');
searchInput.addEventListener('input',function(){
  searchTerm=this.value.toLowerCase().trim();
  if(searchTerm){activeCluster=null;document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')})}
  updateVisibility();lastInteract=performance.now();
});
searchInput.addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';searchTerm='';updateVisibility()}
});

// Reset
document.getElementById('resetBtn').addEventListener('click',function(){
  activeCluster=null;searchTerm='';searchInput.value='';
  document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')});
  targetCamX=(minX+maxX)*0.5;targetCamY=(minY+maxY)*0.5;
  targetZoom=Math.min(canvas.width/(rangeX*1.3),canvas.height/(rangeY*1.3));
  updateVisibility();lastInteract=performance.now();
});

function updateVisibility(){
  var matchSet=null;
  if(searchTerm){
    matchSet=new Set();
    PROJECTS.forEach(function(p,i){
      if(p.name.toLowerCase().indexOf(searchTerm)!==-1||p.id.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i);
    });
  }
  for(var i=0;i<N;i++){
    var visible=true;
    if(activeCluster&&clusterOf[PROJECTS[i].id]!==activeCluster)visible=false;
    if(matchSet&&!matchSet.has(i))visible=false;
    nodeAlpha[i]=visible?1.0:0.06;
  }
}
updateVisibility();

document.getElementById('stats').textContent=N+' projects \u00b7 '+edgeIdx.length+' connections \u00b7 '+CLUSTERS.length+' clusters';

// === RENDER LOOP ===
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}
var clusterRgb={};
CLUSTERS.forEach(function(c){clusterRgb[c.color]=hexToRgb(c.color)});

function frame(t){
  requestAnimationFrame(frame);

  // Smooth camera
  camX+=(targetCamX-camX)*0.12;
  camY+=(targetCamY-camY)*0.12;
  camZoom+=(targetZoom-camZoom)*0.12;

  // Ambient drift
  var idle=t-lastInteract;
  if(idle>4000&&!dragging){
    driftTime+=0.0008;
    var amt=Math.min((idle-4000)/15000,1)*0.1;
    for(var i=0;i<N;i++){
      var phase=i*0.37+driftTime;
      px[i]+=Math.sin(phase)*amt*0.02;
      py[i]+=Math.cos(phase*1.3)*amt*0.02;
    }
  }

  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,w,h);

  // Draw edges
  ctx.lineWidth=1;
  for(var i=0;i<edgeIdx.length;i++){
    var a=edgeIdx[i][0],b=edgeIdx[i][1];
    var alphaA=nodeAlpha[a],alphaB=nodeAlpha[b];
    var ea=Math.min(alphaA,alphaB)*0.2;
    if(ea<0.01)continue;
    var colA=clusterRgb[colorOf[PROJECTS[a].id]]||[150,150,150];
    var colB=clusterRgb[colorOf[PROJECTS[b].id]]||[150,150,150];
    var mr=Math.round((colA[0]+colB[0])/2),mg=Math.round((colA[1]+colB[1])/2),mb=Math.round((colA[2]+colB[2])/2);
    var sa=worldToScreen(px[a],py[a]),sb=worldToScreen(px[b],py[b]);
    if(!isFinite(sa[0])||!isFinite(sb[0]))continue;
    ctx.strokeStyle='rgba('+mr+','+mg+','+mb+','+ea.toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(sa[0],sa[1]);ctx.lineTo(sb[0],sb[1]);ctx.stroke();
  }

  // Draw nodes
  for(var i=0;i<N;i++){
    var alpha=nodeAlpha[i];
    if(alpha<0.01)continue;
    var col=clusterRgb[colorOf[PROJECTS[i].id]]||[150,150,150];
    var r=Math.max(4,3+degree[i]*0.8);
    if(i===hoverIdx)r*=1.8;
    var sp=worldToScreen(px[i],py[i]);

    // Skip if off-screen or NaN
    if(!isFinite(sp[0])||!isFinite(sp[1]))continue;
    if(sp[0]<-50||sp[0]>w+50||sp[1]<-50||sp[1]>h+50)continue;

    // Glow
    if(alpha>0.5&&r>2){
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(alpha*0.15).toFixed(2)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r*2.5,0,Math.PI*2);ctx.fill();
    }

    // Core
    ctx.fillStyle='rgba('+Math.min(255,col[0]+60)+','+Math.min(255,col[1]+60)+','+Math.min(255,col[2]+60)+','+alpha.toFixed(2)+')';
    ctx.beginPath();ctx.arc(sp[0],sp[1],r,0,Math.PI*2);ctx.fill();

    // Label
    if(camZoom>1.5||degree[i]>6||i===hoverIdx){
      var fontSize=Math.max(9,Math.min(13,10*camZoom/2));
      ctx.font=fontSize+'px system-ui';
      ctx.fillStyle='rgba(255,255,255,'+(alpha*0.8).toFixed(2)+')';
      ctx.fillText(PROJECTS[i].id,sp[0]+r+3,sp[1]+fontSize*0.35);
    }
  }

  // Cluster labels at center of each cluster
  if(camZoom<2.5){
    ctx.font='bold 14px system-ui';
    ctx.textAlign='center';
    CLUSTERS.forEach(function(c){
      var cx=0,cy=0,cn=0;
      c.ids.forEach(function(id){
        var idx=idxMap[id];
        if(idx!==undefined){cx+=px[idx];cy+=py[idx];cn++}
      });
      if(cn){
        cx/=cn;cy/=cn;
        var sp=worldToScreen(cx,cy);
        var alpha=activeCluster?(activeCluster===c?0.7:0.1):0.4;
        ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';
        ctx.fillText(c.name,sp[0],sp[1]-20);
      }
    });
    ctx.textAlign='left';
  }
}
requestAnimationFrame(frame);
</script>
</body>
</html>
