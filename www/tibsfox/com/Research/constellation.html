html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:system-ui,-apple-system,sans-serif;color:#c8d0e0}
canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}

#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10}
#topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.85);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.06)}
#topbar a{color:#93c5fd;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}
#topbar a:hover{color:#bfdbfe}
.sep{color:rgba(255,255,255,.15);font-size:13px}
#title{color:#e2e8f0;font-size:14px;font-weight:700;white-space:nowrap}
#search{all:unset;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:4px 10px;color:#fff;font-size:12px;width:150px;pointer-events:auto;transition:all .2s}
#search:focus{border-color:rgba(255,255,255,.3);width:200px;background:rgba(255,255,255,.1)}
#search::placeholder{color:rgba(255,255,255,.25)}
.topbtn{all:unset;cursor:pointer;padding:3px 10px;border-radius:3px;font-size:11px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08);pointer-events:auto;transition:all .15s;white-space:nowrap}
.topbtn:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
.topbtn.on{color:#fff;border-color:rgba(147,197,253,.5);background:rgba(147,197,253,.12)}
#clusters{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.cl{all:unset;cursor:pointer;padding:2px 7px;border-radius:3px;font-size:10px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);transition:all .15s;pointer-events:auto;white-space:nowrap}
.cl:hover{color:#fff;border-color:var(--c);background:rgba(255,255,255,.04)}
.cl.on{color:#fff;background:var(--c);border-color:var(--c)}
#tooltip{position:absolute;pointer-events:none;background:rgba(10,12,28,.94);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;font-size:12px;display:none;z-index:20;max-width:280px;box-shadow:0 4px 24px rgba(0,0,0,.5);line-height:1.5}
#tooltip .tt-id{color:rgba(255,255,255,.35);font-size:10px;font-family:monospace;letter-spacing:0.5px}
#tooltip .tt-name{color:#fff;font-weight:600;font-size:14px;margin:2px 0 4px}
#tooltip .tt-cluster{font-size:11px;margin-bottom:6px}
#tooltip .tt-metrics{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:10px;color:rgba(255,255,255,.55);border-top:1px solid rgba(255,255,255,.08);padding-top:6px;margin-top:4px}
#tooltip .tt-metrics .val{color:rgba(255,255,255,.85);font-weight:500;font-variant-numeric:tabular-nums}
#tooltip .tt-hub{font-size:10px;color:#f0c070;margin-top:4px;border-top:1px solid rgba(255,255,255,.06);padding-top:4px}
#tooltip .tt-edges{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px}
#stats{position:absolute;bottom:8px;left:12px;font-size:10px;color:rgba(255,255,255,.3);pointer-events:none;z-index:10}
#legend{position:absolute;bottom:8px;right:12px;font-size:10px;color:rgba(255,255,255,.35);pointer-events:none;z-index:10;text-align:right;line-height:1.6}
@media(max-width:640px){#search{width:100%;order:20}#clusters{order:19}}
</style>

// === FORCE LAYOUT ===
var px=new Float32Array(N),py=new Float32Array(N);

var clusterAngle={};
CLUSTERS.forEach(function(c,i){clusterAngle[c.name]=i*2*Math.PI/CLUSTERS.length});
PROJECTS.forEach(function(p,i){
  var c=clusterOf[p.id];
  var a=clusterAngle[c.name]||0;
  var r=80+Math.random()*60;
  px[i]=Math.cos(a)*r+(Math.random()-.5)*40;
  py[i]=Math.sin(a)*r+(Math.random()-.5)*40;
});

(function runForce(){
  var repulsion=600,attraction=0.01,damping=0.88,centerPull=0.003,clusterPull=0.005;
  for(var iter=0;iter<100;iter++){
    var cx={},cy={},cc={};
    CLUSTERS.forEach(function(c){cx[c.name]=0;cy[c.name]=0;cc[c.name]=0});
    for(var i=0;i<N;i++){var cn=clusterOf[PROJECTS[i].id].name;cx[cn]+=px[i];cy[cn]+=py[i];cc[cn]++}
    CLUSTERS.forEach(function(c){if(cc[c.name]){cx[c.name]/=cc[c.name];cy[c.name]/=cc[c.name]}});
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=px[i]-px[j],dy=py[i]-py[j];
        var d2=dx*dx+dy*dy+1;
        var f=repulsion/d2;
        var fx=dx*f/Math.sqrt(d2),fy=dy*f/Math.sqrt(d2);
        vx[i]+=fx;vy[i]+=fy;vx[j]-=fx;vy[j]-=fy;
      }
    }
    for(var e=0;e<edgeIdx.length;e++){
      var a=edgeIdx[e][0],b=edgeIdx[e][1];
      var dx=px[b]-px[a],dy=py[b]-py[a];
      var d=Math.sqrt(dx*dx+dy*dy)+0.1;
      var f=d*attraction;
      vx[a]+=dx*f;vy[a]+=dy*f;vx[b]-=dx*f;vy[b]-=dy*f;
    }
    for(var i=0;i<N;i++){
      vx[i]-=px[i]*centerPull;vy[i]-=py[i]*centerPull;
      var cn=clusterOf[PROJECTS[i].id].name;
      vx[i]+=(cx[cn]-px[i])*clusterPull;vy[i]+=(cy[cn]-py[i])*clusterPull;
    }
    for(var i=0;i<N;i++){
      vx[i]*=damping;vy[i]*=damping;
      var maxV=50;
      if(vx[i]>maxV)vx[i]=maxV;if(vx[i]<-maxV)vx[i]=-maxV;
      if(vy[i]>maxV)vy[i]=maxV;if(vy[i]<-maxV)vy[i]=-maxV;
      px[i]+=vx[i];py[i]+=vy[i];
    }
  }
})();

}
var rangeX=maxX-minX||1,rangeY=maxY-minY||1;

camY=targetCamY=(minY+maxY)*0.5;
targetZoom=camZoom=Math.max(0.1,Math.min(10,Math.min(canvas.width/(rangeX*1.3),canvas.height/(rangeY*1.3))));

function worldToScreen(wx,wy){return[(wx-camX)*camZoom+canvas.width/2, -(wy-camY)*camZoom+canvas.height/2]}
function screenToWorld(sx,sy){return[(sx-canvas.width/2)/camZoom+camX, -(sy-canvas.height/2)/camZoom+camY]}

function findNode(clientX,clientY){
  var sx=clientX*dpr,sy=clientY*dpr;
  var wp=screenToWorld(sx,sy);
  var best=-1,bestD=Infinity;
  var threshold=16/camZoom;
  for(var i=0;i<N;i++){
    if(nodeAlpha[i]<0.15)continue;
    var dx=px[i]-wp[0],dy=py[i]-wp[1];
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<threshold&&d<bestD){bestD=d;best=i}
  }
  return best;
}

  if(!wasDrag){
    var idx=findNode(e.clientX,e.clientY);
    if(idx>=0)window.location.href=PROJECTS[idx].id+'/index.html';
  }
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();lastInteract=performance.now();
  var factor=e.deltaY>0?0.9:1.1;
  targetZoom=Math.max(0.5,Math.min(20,targetZoom*factor));
  var wp=screenToWorld(e.clientX*dpr,e.clientY*dpr);
  targetCamX+=(wp[0]-targetCamX)*(1-1/factor)*0.3;
  targetCamY+=(wp[1]-targetCamY)*(1-1/factor)*0.3;
},{passive:false});
var lastTouchDist=0;
canvas.addEventListener('touchstart',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy)}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);if(lastTouchDist>0)targetZoom=Math.max(0.5,Math.min(20,targetZoom*(dist/lastTouchDist)));lastTouchDist=dist;lastInteract=performance.now()}},{passive:true});

// Tooltip
var tooltip=document.getElementById('tooltip');
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'K':String(n)}

function updateTooltip(mx,my){
  if(hoverIdx<0){tooltip.style.display='none';canvas.style.cursor='grab';return}
  canvas.style.cursor='pointer';
  var p=PROJECTS[hoverIdx];
  var c=clusterOf[p.id];
  var m=METRICS[p.id]||{f:0,l:0,kb:0,bc:0,br:0};
  var s=SERIES[p.id];

  tooltip.querySelector('.tt-id').textContent=p.id;
  tooltip.querySelector('.tt-name').textContent=p.name;

  var clusterHtml='<span style="color:'+c.color+'">&#9679;</span> '+c.name+' &middot; '+degree[hoverIdx]+' connections';
  if(s&&s.length)clusterHtml+=' &middot; <span style="color:#f0c070">'+s.join(', ')+'</span>';
  tooltip.querySelector('.tt-cluster').innerHTML=clusterHtml;

  // Metrics grid
  var metricsHtml='<span>Files</span><span class="val">'+m.f+'</span>'+
    '<span>Lines</span><span class="val">'+fmtNum(m.l)+'</span>'+
    '<span>Size</span><span class="val">'+fmtNum(m.kb)+' KB</span>'+
    '<span>Centrality</span><span class="val">'+(m.bc*100).toFixed(0)+'%</span>';
  tooltip.querySelector('.tt-metrics').innerHTML=metricsHtml;

  // Hub indicator
  var hubEl=tooltip.querySelector('.tt-hub');
  if(m.bc>=0.3){
    hubEl.textContent='Hub node — bridges '+(m.br*100).toFixed(0)+'% cross-cluster';
    hubEl.style.display='block';
  } else if(m.br>=0.8&&degree[hoverIdx]>=3){
    hubEl.textContent='Bridge node — '+(m.br*100).toFixed(0)+'% cross-cluster edges';
    hubEl.style.display='block';
  } else {
    hubEl.style.display='none';
  }

  // Edge breakdown
  var edgeEl=tooltip.querySelector('.tt-edges');
  var inD=0,outD=0;
  edgeIdx.forEach(function(e){if(e[0]===hoverIdx)outD++;if(e[1]===hoverIdx)inD++});
  if(inD||outD){
    edgeEl.textContent='In: '+inD+' / Out: '+outD;
    edgeEl.style.display='block';
  } else {
    edgeEl.style.display='none';
  }

  tooltip.style.display='block';
  var tx=mx+14,ty=my-10;
  if(tx+280>window.innerWidth)tx=mx-290;
  if(ty<0)ty=my+14;
  if(ty+200>window.innerHeight)ty=window.innerHeight-210;
  tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
}

// Cluster buttons
var clDiv=document.getElementById('clusters');
CLUSTERS.forEach(function(c){
  var btn=document.createElement('button');
  btn.className='cl';btn.textContent=c.name;
  btn.style.setProperty('--c',c.color);
  btn.addEventListener('click',function(){
    if(activeCluster===c){activeCluster=null;btn.classList.remove('on')}
    else{
      document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')});
      activeCluster=c;btn.classList.add('on');
      var cx=0,cy=0,cn=0;
      PROJECTS.forEach(function(p,j){if(clusterOf[p.id]===c){cx+=px[j];cy+=py[j];cn++}});
      if(cn){targetCamX=cx/cn;targetCamY=cy/cn;targetZoom=Math.max(camZoom,3.0)}
    }
    updateVisibility();lastInteract=performance.now();
  });
  clDiv.appendChild(btn);
});

// Size mode toggle
var sizeBtn=document.getElementById('sizeMode');
sizeBtn.addEventListener('click',function(){
  sizeMode=(sizeMode+1)%sizeModeLabels.length;
  sizeBtn.textContent='Size: '+sizeModeLabels[sizeMode];
  lastInteract=performance.now();
});

// Edge mode toggle
var edgeBtn=document.getElementById('edgeToggle');
edgeBtn.addEventListener('click',function(){
  edgeMode=(edgeMode+1)%edgeModeLabels.length;
  edgeBtn.textContent='Edges: '+edgeModeLabels[edgeMode];
  lastInteract=performance.now();
});

// Search
var searchInput=document.getElementById('search');
searchInput.addEventListener('input',function(){
  searchTerm=this.value.toLowerCase().trim();
  if(searchTerm){activeCluster=null;document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')})}
  updateVisibility();lastInteract=performance.now();
});
searchInput.addEventListener('keydown',function(e){if(e.key==='Escape'){this.value='';searchTerm='';updateVisibility()}});

// Reset
document.getElementById('resetBtn').addEventListener('click',function(){
  activeCluster=null;searchTerm='';searchInput.value='';
  document.querySelectorAll('.cl').forEach(function(b){b.classList.remove('on')});
  targetCamX=(minX+maxX)*0.5;targetCamY=(minY+maxY)*0.5;
  targetZoom=Math.min(canvas.width/(rangeX*1.3),canvas.height/(rangeY*1.3));
  updateVisibility();lastInteract=performance.now();
});

function updateVisibility(){
  var matchSet=null;
  if(searchTerm){
    matchSet=new Set();
    PROJECTS.forEach(function(p,i){
      if(p.name.toLowerCase().indexOf(searchTerm)!==-1||p.id.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i);
    });
  }
  for(var i=0;i<N;i++){
    var visible=true;
    if(activeCluster&&clusterOf[PROJECTS[i].id]!==activeCluster)visible=false;
    if(matchSet&&!matchSet.has(i))visible=false;
    nodeAlpha[i]=visible?1.0:0.06;
  }
}
updateVisibility();

// Stats
var totalLines=0,totalFiles=0;
PROJECTS.forEach(function(p){var m=METRICS[p.id];if(m){totalLines+=m.l;totalFiles+=m.f}});
document.getElementById('stats').textContent=N+' projects \u00b7 '+edgeIdx.length+' connections \u00b7 '+CLUSTERS.length+' clusters \u00b7 '+fmtNum(totalLines)+' lines \u00b7 '+totalFiles+' files';

// Legend
document.getElementById('legend').innerHTML='Node size: '+sizeModeLabels[sizeMode]+' &middot; Hub glow = betweenness centrality<br>Bridge ring = cross-cluster connector';

// === RENDER LOOP ===
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}
var clusterRgb={};
CLUSTERS.forEach(function(c){clusterRgb[c.color]=hexToRgb(c.color)});

// Edge type colors
var edgeTypeColors={c:[100,140,200],e:[80,200,120],r:[200,160,80]};

function frame(t){
  requestAnimationFrame(frame);

  camX+=(targetCamX-camX)*0.12;
  camY+=(targetCamY-camY)*0.12;
  camZoom+=(targetZoom-camZoom)*0.12;

  // Ambient drift
  var idle=t-lastInteract;
  if(idle>4000&&!dragging){
    driftTime+=0.0008;
    var amt=Math.min((idle-4000)/15000,1)*0.1;
    for(var i=0;i<N;i++){
      var phase=i*0.37+driftTime;
      px[i]+=Math.sin(phase)*amt*0.02;
      py[i]+=Math.cos(phase*1.3)*amt*0.02;
    }
  }

  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,w,h);

  // Draw edges
  for(var i=0;i<edgeIdx.length;i++){
    var a=edgeIdx[i][0],b=edgeIdx[i][1],eIdx=edgeIdx[i][2];
    var alphaA=nodeAlpha[a],alphaB=nodeAlpha[b];
    var ea=Math.min(alphaA,alphaB)*0.25;
    if(ea<0.01)continue;

    // Highlight edges of hovered node
    if(hoverIdx>=0&&(a===hoverIdx||b===hoverIdx))ea=Math.min(alphaA,alphaB)*0.7;

    var colR,colG,colB;
    if(edgeMode===1){
      // Typed edge colors
      var et=EDGE_TYPES[eIdx]||'c';
      var etc=edgeTypeColors[et];
      colR=etc[0];colG=etc[1];colB=etc[2];
    } else {
      var colA=clusterRgb[colorOf[PROJECTS[a].id]]||[150,150,150];
      var colBc=clusterRgb[colorOf[PROJECTS[b].id]]||[150,150,150];
      colR=Math.round((colA[0]+colBc[0])/2);
      colG=Math.round((colA[1]+colBc[1])/2);
      colB=Math.round((colA[2]+colBc[2])/2);
    }

    var sa=worldToScreen(px[a],py[a]),sb=worldToScreen(px[b],py[b]);
    if(!isFinite(sa[0])||!isFinite(sb[0]))continue;

    ctx.lineWidth=hoverIdx>=0&&(a===hoverIdx||b===hoverIdx)?2:1;
    ctx.strokeStyle='rgba('+colR+','+colG+','+colB+','+ea.toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(sa[0],sa[1]);ctx.lineTo(sb[0],sb[1]);ctx.stroke();
  }

  // Draw nodes
  for(var i=0;i<N;i++){
    var alpha=nodeAlpha[i];
    if(alpha<0.01)continue;
    var col=clusterRgb[colorOf[PROJECTS[i].id]]||[150,150,150];
    var r=nodeRadius(i);
    if(i===hoverIdx)r*=1.8;
    var sp=worldToScreen(px[i],py[i]);

    if(!isFinite(sp[0])||!isFinite(sp[1]))continue;
    if(sp[0]<-50||sp[0]>w+50||sp[1]<-50||sp[1]>h+50)continue;

    var m=METRICS[PROJECTS[i].id]||{bc:0,br:0};

    // Hub glow (betweenness centrality > 0.2)
    if(alpha>0.5&&m.bc>0.2){
      var glowR=r*(2+m.bc*4);
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(alpha*0.08*(1+m.bc)).toFixed(3)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],glowR,0,Math.PI*2);ctx.fill();
    }
    // Standard glow
    else if(alpha>0.5&&r>2){
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(alpha*0.15).toFixed(2)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r*2.5,0,Math.PI*2);ctx.fill();
    }

    // Bridge ring (cross-cluster connector)
    if(m.br>=0.7&&degree[i]>=3&&alpha>0.5){
      ctx.strokeStyle='rgba(240,192,112,'+(alpha*0.5).toFixed(2)+')';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+3,0,Math.PI*2);ctx.stroke();
    }

    // Series badge ring (PNW = green inner ring)
    var ser=SERIES[PROJECTS[i].id];
    if(ser&&ser.length&&alpha>0.5){
      var serCol=ser[0]==='PNW'?'rgba(76,175,80,':'rgba(30,136,229,';
      ctx.strokeStyle=serCol+(alpha*0.4).toFixed(2)+')';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+1,0,Math.PI*2);ctx.stroke();
    }

    // Core
    ctx.fillStyle='rgba('+Math.min(255,col[0]+60)+','+Math.min(255,col[1]+60)+','+Math.min(255,col[2]+60)+','+alpha.toFixed(2)+')';
    ctx.beginPath();ctx.arc(sp[0],sp[1],r,0,Math.PI*2);ctx.fill();

    // Label
    if(camZoom>1.5||degree[i]>6||i===hoverIdx||m.bc>0.3){
      var fontSize=Math.max(9,Math.min(13,10*camZoom/2));
      ctx.font=fontSize+'px system-ui';
      ctx.fillStyle='rgba(255,255,255,'+(alpha*0.8).toFixed(2)+')';
      ctx.fillText(PROJECTS[i].id,sp[0]+r+3,sp[1]+fontSize*0.35);
    }
  }

  // Cluster labels
  if(camZoom<2.5){
    ctx.font='bold 14px system-ui';
    ctx.textAlign='center';
    CLUSTERS.forEach(function(c){
      var cx=0,cy=0,cn=0;
      c.ids.forEach(function(id){var idx=idxMap[id];if(idx!==undefined){cx+=px[idx];cy+=py[idx];cn++}});
      if(cn){
        cx/=cn;cy/=cn;
        var sp=worldToScreen(cx,cy);
        var alpha=activeCluster?(activeCluster===c?0.7:0.1):0.4;
        ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';
        ctx.fillText(c.name,sp[0],sp[1]-20);
      }
    });
    ctx.textAlign='left';
  }

  // Update legend
  document.getElementById('legend').innerHTML='Node size: '+sizeModeLabels[sizeMode]+' &middot; Hub glow = centrality<br>'+
    (edgeMode===1?'<span style="color:#6488c8">&#9644;</span> cites &middot; <span style="color:#50c878">&#9644;</span> extends &middot; <span style="color:#c8a050">&#9644;</span> references':'Bridge ring = <span style="color:#f0c070">&#9675;</span> cross-cluster');
}
requestAnimationFrame(frame);
</script>
</body>
</html>
