<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:system-ui,-apple-system,sans-serif;color:#c8d0e0}
canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10}
#topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.85);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.06)}
#topbar a{color:#93c5fd;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}
#topbar a:hover{color:#bfdbfe}
.sep{color:rgba(255,255,255,.15);font-size:13px}
#title{color:#e2e8f0;font-size:14px;font-weight:700;white-space:nowrap}
#search{all:unset;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:4px 10px;color:#fff;font-size:12px;width:150px;pointer-events:auto;transition:all .2s}
#search:focus{border-color:rgba(255,255,255,.3);width:200px;background:rgba(255,255,255,.1)}
#search::placeholder{color:rgba(255,255,255,.25)}
#resetBtn{all:unset;cursor:pointer;padding:3px 10px;border-radius:3px;font-size:11px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08);pointer-events:auto;transition:all .15s}
#resetBtn:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
#clusters{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.cl{all:unset;cursor:pointer;padding:2px 7px;border-radius:3px;font-size:10px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);transition:all .15s;pointer-events:auto;white-space:nowrap}
.cl:hover{color:#fff;border-color:var(--c);background:rgba(255,255,255,.04)}
.cl.on{color:#fff;background:var(--c);border-color:var(--c)}
#tooltip{position:absolute;pointer-events:none;background:rgba(15,15,35,.94);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:10px 14px;font-size:12px;display:none;z-index:20;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#tooltip .tt-id{color:rgba(255,255,255,.4);font-size:10px;font-family:monospace}
#tooltip .tt-name{color:#fff;font-weight:600;font-size:14px;margin:2px 0}
#tooltip .tt-sci{color:rgba(255,255,255,.5);font-style:italic;font-size:11px}
#tooltip .tt-cluster{font-size:10px;margin-top:2px}
#tooltip .tt-detail{font-size:10px;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.08);line-height:1.6}
#tooltip .tt-detail .pair-label{color:rgba(255,255,255,.35);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
#tooltip .tt-detail .pair-artist{color:#93c5fd;font-weight:500}
#tooltip .tt-detail .pair-species{color:#86efac;font-weight:500}
#tooltip .tt-detail .pair-info{color:rgba(255,255,255,.55)}
#tooltip .tt-energy{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}
#tooltip .tt-xrefs{font-size:9px;color:rgba(255,255,255,.4);margin-top:4px;max-height:60px;overflow-y:auto;line-height:1.4}
#filterbar{display:flex;align-items:center;padding:4px 12px;gap:6px;flex-wrap:wrap;pointer-events:auto;background:rgba(10,10,26,.75);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.04)}
#filterbar label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}
.energy-btn{all:unset;cursor:pointer;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.1);font-size:9px;text-align:center;line-height:22px;color:rgba(255,255,255,.5);pointer-events:auto;transition:all .15s}
.energy-btn:hover{border-color:var(--ec);color:#fff}
.energy-btn.on{background:var(--ec);border-color:var(--ec);color:#fff;box-shadow:0 0 8px var(--ec)}
.filter-select{all:unset;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:2px 8px;color:rgba(255,255,255,.6);font-size:11px;pointer-events:auto;cursor:pointer}
.filter-select:hover{border-color:rgba(255,255,255,.2);color:#fff}
.filter-select option{background:#1a1a2e;color:#fff}
#stats{position:absolute;bottom:8px;left:12px;right:12px;font-size:10px;color:rgba(255,255,255,.3);pointer-events:none;z-index:10;display:flex;justify-content:space-between}
#stats .stats-left{}
#stats .stats-right{text-align:right}
#legend{position:absolute;bottom:30px;right:12px;pointer-events:auto;z-index:10}
#legend-toggle{all:unset;cursor:pointer;padding:4px 10px;border-radius:4px;font-size:10px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);background:rgba(10,10,26,.7);backdrop-filter:blur(6px)}
#legend-toggle:hover{color:#fff;border-color:rgba(255,255,255,.2)}
#legend-panel{display:none;background:rgba(10,10,26,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:10px;max-height:400px;overflow-y:auto;min-width:200px}
#legend-panel.open{display:block}
#legend-panel h4{color:rgba(255,255,255,.5);font-size:9px;text-transform:uppercase;letter-spacing:.6px;margin:8px 0 4px;font-weight:600}
#legend-panel h4:first-child{margin-top:0}
.legend-row{display:flex;align-items:center;gap:6px;padding:1px 0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-ring{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid;background:transparent}
.legend-text{color:rgba(255,255,255,.55)}
.legend-size{display:flex;align-items:center;gap:4px;padding:2px 0}
.legend-circle{border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
@media(max-width:640px){#search{width:100%;order:20}#clusters{order:19}#filterbar{padding:4px 8px;gap:4px}}
</style>

// === HELPER: determine node type ===
function nodeType(id){
  if(id.charAt(0)==='A'&&id.length===4)return 'artist';
  if(id.charAt(0)==='B'&&id.length===4)return 'species';
  if(NASA_DATA[id])return 'nasa';

}
function nodeDeg(id){return parseInt(id.substring(1),10)}

EDGES.forEach(function(e){

}

  var t=nodeType(id);

  if(id==='S36'||id==='SPS')return 3;
  if(t==='nasa')return id==='NART'?5:2;

}

// === FORCE LAYOUT ===
var px=new Float32Array(N),py=new Float32Array(N);
var vx=new Float32Array(N),vy=new Float32Array(N);
var clusterAngle={};
CLUSTERS.forEach(function(c,i){clusterAngle[c.name]=i*2*Math.PI/CLUSTERS.length});
PROJECTS.forEach(function(p,i){
  var c=clusterOf[p.id];
  var a=clusterAngle[c.name]||0;
  var t=nodeType(p.id);
  var r,spread;
  if(t==='artist'){r=30+Math.random()*50;spread=25}
  else if(t==='species'){r=30+Math.random()*50;spread=25}
  else{r=80+Math.random()*60;spread=40}
  px[i]=Math.cos(a)*r+(Math.random()-.5)*spread;
  py[i]=Math.sin(a)*r+(Math.random()-.5)*spread;
});

(function runForce(){
  var repulsion=400,attraction=0.008,damping=0.85,centerPull=0.002,clusterPull=0.008;
  for(var iter=0;iter<180;iter++){
    var cx={},cy={},cc={};
    CLUSTERS.forEach(function(c){cx[c.name]=0;cy[c.name]=0;cc[c.name]=0});
    for(var i=0;i<N;i++){var cn=clusterOf[PROJECTS[i].id].name;cx[cn]+=px[i];cy[cn]+=py[i];cc[cn]++}
    CLUSTERS.forEach(function(c){if(cc[c.name]){cx[c.name]/=cc[c.name];cy[c.name]/=cc[c.name]}});
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=px[i]-px[j],dy=py[i]-py[j];
        var d2=dx*dx+dy*dy+1;
        var f=repulsion/d2;
        var sq=Math.sqrt(d2);
        var fx=dx*f/sq,fy=dy*f/sq;
        vx[i]+=fx;vy[i]+=fy;vx[j]-=fx;vy[j]-=fy;
      }
    }
    for(var e=0;e<edgeIdx.length;e++){
      var a=edgeIdx[e][0],b=edgeIdx[e][1];
      var dx=px[b]-px[a],dy=py[b]-py[a];
      var dd=Math.sqrt(dx*dx+dy*dy)+0.1;
      var f=dd*attraction;
      vx[a]+=dx*f;vy[a]+=dy*f;vx[b]-=dx*f;vy[b]-=dy*f;
    }
    for(var i=0;i<N;i++){
      vx[i]-=px[i]*centerPull;vy[i]-=py[i]*centerPull;
      var cn=clusterOf[PROJECTS[i].id].name;
      vx[i]+=(cx[cn]-px[i])*clusterPull;vy[i]+=(cy[cn]-py[i])*clusterPull;
    }
    for(var i=0;i<N;i++){
      vx[i]*=damping;vy[i]*=damping;
      var maxV=40;
      if(vx[i]>maxV)vx[i]=maxV;if(vx[i]<-maxV)vx[i]=-maxV;
      if(vy[i]>maxV)vy[i]=maxV;if(vy[i]<-maxV)vy[i]=-maxV;
      px[i]+=vx[i];py[i]+=vy[i];
    }
  }
})();

// Camera

var targetCamX=0,targetCamY=0,targetZoom=1;
var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
for(var i=0;i<N;i++){
  if(px[i]<minX)minX=px[i];if(px[i]>maxX)maxX=px[i];
  if(py[i]<minY)minY=py[i];if(py[i]>maxY)maxY=py[i];
}
var rangeX=maxX-minX||1,rangeY=maxY-minY||1;
camX=targetCamX=(minX+maxX)*0.5;
camY=targetCamY=(minY+maxY)*0.5;
targetZoom=camZoom=Math.max(0.1,Math.min(10,Math.min(canvas.width/(rangeX*1.3),canvas.height/(rangeY*1.3))));

function worldToScreen(wx,wy){return[(wx-camX)*camZoom+canvas.width/2,-(wy-camY)*camZoom+canvas.height/2]}
function screenToWorld(sx,sy){return[(sx-canvas.width/2)/camZoom+camX,-(sy-canvas.height/2)/camZoom+camY]}

function findNode(clientX,clientY){
  var sx=clientX*dpr,sy=clientY*dpr;
  var wp=screenToWorld(sx,sy);
  var best=-1,bestD=Infinity;
  var threshold=16/camZoom;
  for(var i=0;i<N;i++){
    if(nodeAlpha[i]<0.15)continue;
    var dx=px[i]-wp[0],dy=py[i]-wp[1];
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<threshold&&d<bestD){bestD=d;best=i}
  }
  return best;
}

// === INTERACTION ===
canvas.addEventListener('pointerdown',function(e){
  if(e.button>0)return;
  dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
  dragCamX=camX;dragCamY=camY;lastInteract=performance.now();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',function(e){
  lastInteract=performance.now();
  if(dragging){
    var dx=(e.clientX-dragStartX)*dpr/camZoom;
    var dy=(e.clientY-dragStartY)*dpr/camZoom;
    targetCamX=dragCamX-dx;targetCamY=dragCamY+dy;
  } else {
    var idx=findNode(e.clientX,e.clientY);
    if(idx!==hoverIdx){hoverIdx=idx;updateTooltip(e.clientX,e.clientY)}
    else if(idx>=0)updateTooltip(e.clientX,e.clientY);
  }
});
canvas.addEventListener('pointerup',function(e){
  var wasDrag=Math.abs(e.clientX-dragStartX)>3||Math.abs(e.clientY-dragStartY)>3;
  dragging=false;
  if(!wasDrag){
    var idx=findNode(e.clientX,e.clientY);
    if(idx>=0){
      var pid=PROJECTS[idx].id;
      var t=nodeType(pid);
      if(t==='artist'){
        var deg=nodeDeg(pid);
        var slug=String(deg).padStart(3,'0')+'-'+PAIRINGS[deg].artist.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        window.location.href='S36/research/releases/'+slug+'/index.html';
      } else if(t==='species'){
        var deg=nodeDeg(pid);
        var slug=String(deg).padStart(3,'0')+'-'+PAIRINGS[deg].species.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        window.location.href='SPS/research/releases/'+slug+'/index.html';
      } else {
        window.location.href=pid+'/index.html';
      }
    }
  }
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();lastInteract=performance.now();
  var factor=e.deltaY>0?0.9:1.1;
  targetZoom=Math.max(0.3,Math.min(25,targetZoom*factor));
  var wp=screenToWorld(e.clientX*dpr,e.clientY*dpr);
  targetCamX+=(wp[0]-targetCamX)*(1-1/factor)*0.3;
  targetCamY+=(wp[1]-targetCamY)*(1-1/factor)*0.3;
},{passive:false});

// Touch pinch

canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});

    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0)targetZoom=Math.max(0.3,Math.min(25,targetZoom*(dist/lastTouchDist)));

},{passive:true});

    if(nd.crew)clHtml+='<br><span style="color:#C4A35A;font-size:10px">Crew: '+nd.crew+'</span>';
    ttCluster.innerHTML=clHtml;
    var dHtml='<span class="pair-label">Organism Pairing</span><br>';
    dHtml+='<span class="pair-species">'+nd.organism+'</span>';
    if(nd.sciName)dHtml+=' <span class="pair-info">(<i>'+nd.sciName+'</i>)</span>';
    dHtml+='<br><span class="pair-info">'+nd.nodes+' knowledge nodes</span>';
    ttDetail.innerHTML=dHtml;
    ttDetail.style.display='block';
  } else {
    ttName.textContent=p.name;
    var cd=clusterDescriptions[c.name]||'';
    var clHtml='<span style="color:'+c.color+'">&#9679;</span> '+c.name+' \u00b7 '+degreeCount[hoverIdx]+' connections';
    if(cd)clHtml+='<br><span style="color:rgba(255,255,255,.35);font-size:9px">'+cd+'</span>';
    ttCluster.innerHTML=clHtml;
    if(p.id==='S36'){
      var ac=0;for(var ai=0;ai<64;ai++){var aid='A'+String(ai).padStart(3,'0');if(idxMap[aid]!==undefined&&neighbors[hoverIdx].has(idxMap[aid]))ac++}
      ttDetail.innerHTML='<span class="pair-label">Seattle 360 Engine</span><br><span class="pair-info">64 artist-species pairings across PNW music and ecology</span><br><span class="pair-info">'+ac+' artist nodes connected</span>';
      ttDetail.style.display='block';
    } else if(p.id==='SPS'){
      var sc=0;for(var bi=0;bi<64;bi++){var bid='B'+String(bi).padStart(3,'0');if(idxMap[bid]!==undefined&&neighbors[hoverIdx].has(idxMap[bid]))sc++}
      ttDetail.innerHTML='<span class="pair-label">Sound of Puget Sound Engine</span><br><span class="pair-info">64 species with acoustic signatures paired to S36 artists</span><br><span class="pair-info">'+sc+' species nodes connected</span>';
      ttDetail.style.display='block';
    } else {
      var isMusic=(c.name==='Music');
      if(isMusic){
        var an=0;neighbors[hoverIdx].forEach(function(ni){if(nodeType(PROJECTS[ni].id)==='artist')an++});
        if(an>0){ttDetail.innerHTML='<span class="pair-info">Connected to '+an+' artist node'+(an>1?'s':'')+'</span>';ttDetail.style.display='block'}
        else{ttDetail.style.display='none'}
      } else {ttDetail.style.display='none'}
    }
  }
  tooltip.style.display='block';
  var tx=mx+14,ty=my-10;
  if(tx+380>window.innerWidth)tx=mx-390;
  if(ty<0)ty=my+14;
  if(ty+tooltip.offsetHeight>window.innerHeight)ty=window.innerHeight-tooltip.offsetHeight-10;
  tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
}

function updateVisibility(){
  var matchSet=null;
  if(searchTerm){
    matchSet=new Set();
    PROJECTS.forEach(function(p,i){
      var pid=p.id,t=nodeType(pid);
      if(p.name&&p.name.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i);
      if(pid.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i);
      if(t==='artist'){var d=nodeDeg(pid);var ad=ARTIST_DATA[d];if(ad.a.toLowerCase().indexOf(searchTerm)!==-1||ad.g.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i)}
      if(t==='species'){var d=nodeDeg(pid);var sd=SPECIES_DATA[d];if(sd.s.toLowerCase().indexOf(searchTerm)!==-1||sd.n.toLowerCase().indexOf(searchTerm)!==-1||sd.f.toLowerCase().indexOf(searchTerm)!==-1||sd.o.toLowerCase().indexOf(searchTerm)!==-1)matchSet.add(i)}
    });
    PAIRINGS.forEach(function(pair){
      if(pair.artist.toLowerCase().indexOf(searchTerm)!==-1||pair.species.toLowerCase().indexOf(searchTerm)!==-1||
         pair.family.toLowerCase().indexOf(searchTerm)!==-1||pair.order.toLowerCase().indexOf(searchTerm)!==-1||
         pair.genre.toLowerCase().indexOf(searchTerm)!==-1){
        if(s36Idx!==undefined)matchSet.add(s36Idx);
        if(spsIdx!==undefined)matchSet.add(spsIdx);
      }
    });
  }
  for(var i=0;i<N;i++){
    var visible=true;var pid=PROJECTS[i].id,t=nodeType(pid);
    if(activeCluster&&clusterOf[pid]!==activeCluster)visible=false;
    if(matchSet&&!matchSet.has(i))visible=false;
    if(activeEnergy){
      var ne=getNodeEnergy(pid);
      if(ne>0&&ne!==activeEnergy)visible=false;
      if(ne===0&&pid!=='S36'&&pid!=='SPS'){}// project nodes unaffected
    }
    if(activeOrder){
      if(t==='species'){var d=nodeDeg(pid);if(SPECIES_DATA[d].o!==activeOrder)visible=false}
      else if(t==='artist'){var d=nodeDeg(pid);if(SPECIES_DATA[d].o!==activeOrder)visible=false}
      else if(pid==='SPS'||pid==='S36')visible=true;
    }
    if(activeGenre){
      if(t==='artist'){var d=nodeDeg(pid);if(ARTIST_DATA[d].g.indexOf(activeGenre)===-1)visible=false}
      else if(t==='species'){var d=nodeDeg(pid);if(ARTIST_DATA[d].g.indexOf(activeGenre)===-1)visible=false}
      else if(pid==='S36'||pid==='SPS')visible=true;
    }
    nodeAlpha[i]=visible?1.0:0.06;
  }
}
updateVisibility();

// === RENDER LOOP ===
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}
var clusterRgb={};
CLUSTERS.forEach(function(c){clusterRgb[c.color]=hexToRgb(c.color)});
var energyRgb={};
for(var e in ENERGY_COLORS)energyRgb[e]=hexToRgb(ENERGY_COLORS[e]);
var genreRgb={};
for(var gk in GENRE_COLORS)genreRgb[gk]=hexToRgb(GENRE_COLORS[gk]);
var orderRgb={};
for(var ok in ORDER_COLORS)orderRgb[ok]=hexToRgb(ORDER_COLORS[ok]);

function getNodeColorRgb(id){
  var t=nodeType(id);
  if(t==='artist'){
    var d=nodeDeg(id);
    var g=ARTIST_DATA[d].g.split('(')[0].split('/')[0].trim();
    return genreRgb[g]||genreRgb[ARTIST_DATA[d].g.split('(')[0].trim()]||[239,83,80];
  }
  if(t==='species'){var d=nodeDeg(id);return orderRgb[SPECIES_DATA[d].o]||[76,175,80]}
  return clusterRgb[colorOf[id]]||[150,150,150];
}

function getNodeRadius(i){
  var pid=PROJECTS[i].id,t=nodeType(pid);
  if(t==='artist'||t==='species'){var en=getNodeEnergy(pid);return Math.max(3,2+en*1.2)}
  if(pid==='S36'||pid==='SPS')return Math.max(8,4+degreeCount[i]*0.3);
  return Math.max(4,3+degreeCount[i]*0.8);
}

// Track pairing edges for gold highlight
var pairingEdgeSet=new Set();
for(var pd=0;pd<64;pd++){
  var aIdx=idxMap['A'+String(pd).padStart(3,'0')];
  var bIdx=idxMap['B'+String(pd).padStart(3,'0')];
  if(aIdx!==undefined&&bIdx!==undefined){pairingEdgeSet.add(aIdx+','+bIdx);pairingEdgeSet.add(bIdx+','+aIdx)}
}

function frame(t){
  requestAnimationFrame(frame);
  camX+=(targetCamX-camX)*0.12;camY+=(targetCamY-camY)*0.12;camZoom+=(targetZoom-camZoom)*0.12;

  // Ambient drift
  var idle=t-lastInteract;
  if(idle>4000&&!dragging){
    driftTime+=0.0005;
    var amt=Math.min((idle-4000)/15000,1)*0.08;
    for(var i=0;i<N;i++){
      var phase=i*0.37+driftTime;
      px[i]+=Math.sin(phase)*amt*0.015;py[i]+=Math.cos(phase*1.3)*amt*0.015;
    }
  }

  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);

  // Hover context
  var hoverPid=hoverIdx>=0?PROJECTS[hoverIdx].id:'';
  var hoverType=nodeType(hoverPid);
  var hoverPartnerIdx=-1;
  if(hoverIdx>=0&&(hoverType==='artist'||hoverType==='species')){
    var partner=pairPartner[hoverPid];
    if(partner&&idxMap[partner]!==undefined)hoverPartnerIdx=idxMap[partner];
  }

  // Draw edges
  for(var i=0;i<edgeIdx.length;i++){
    var a=edgeIdx[i][0],b=edgeIdx[i][1];
    var alphaA=nodeAlpha[a],alphaB=nodeAlpha[b];
    var ea=Math.min(alphaA,alphaB)*0.28;
    var isHoverEdge=(hoverIdx>=0&&(a===hoverIdx||b===hoverIdx));
    if(isHoverEdge)ea=Math.min(alphaA,alphaB)*0.6;

    // Gold pairing edge
    var isPairingHL=false;
    if(hoverIdx>=0&&(hoverType==='artist'||hoverType==='species')){
      if(pairingEdgeSet.has(a+','+b)&&(a===hoverIdx||b===hoverIdx||a===hoverPartnerIdx||b===hoverPartnerIdx)){
        isPairingHL=true;ea=0.9;
      }
    }
    if(ea<0.008)continue;
    var sa=worldToScreen(px[a],py[a]),sb=worldToScreen(px[b],py[b]);
    if(!isFinite(sa[0])||!isFinite(sb[0]))continue;
    if((sa[0]<-50&&sb[0]<-50)||(sa[0]>w+50&&sb[0]>w+50)||(sa[1]<-50&&sb[1]<-50)||(sa[1]>h+50&&sb[1]>h+50))continue;

    if(isPairingHL){
      ctx.strokeStyle='rgba(255,215,0,'+ea.toFixed(2)+')';ctx.lineWidth=2.5;
    } else {
      var colA=getNodeColorRgb(PROJECTS[a].id),colB=getNodeColorRgb(PROJECTS[b].id);
      var mr=(colA[0]+colB[0])>>1,mg=(colA[1]+colB[1])>>1,mb=(colA[2]+colB[2])>>1;
      ctx.strokeStyle='rgba('+mr+','+mg+','+mb+','+ea.toFixed(2)+')';
      ctx.lineWidth=isHoverEdge?2:0.8;
    }
    ctx.beginPath();ctx.moveTo(sa[0],sa[1]);ctx.lineTo(sb[0],sb[1]);ctx.stroke();
  }

  // Draw nodes
  for(var i=0;i<N;i++){
    var alpha=nodeAlpha[i];if(alpha<0.01)continue;
    var pid=PROJECTS[i].id,t=nodeType(pid);
    var col=getNodeColorRgb(pid);
    var r=getNodeRadius(i);
    var isHovered=(i===hoverIdx);
    var isPairedHL=(i===hoverPartnerIdx);
    if(isHovered)r*=1.8;
    if(isPairedHL)r*=1.5;
    var isNeighborOfHover=(hoverIdx>=0&&neighbors[i].has(hoverIdx));
    if(isNeighborOfHover&&!isPairedHL)r*=1.2;

    var sp=worldToScreen(px[i],py[i]);
    if(!isFinite(sp[0])||!isFinite(sp[1]))continue;
    if(sp[0]<-50||sp[0]>w+50||sp[1]<-50||sp[1]>h+50)continue;

    // Energy glow ring
    var ne=getNodeEnergy(pid);
    if(ne>0&&alpha>0.3){
      var ec=energyRgb[ne];
      if(ec){
        ctx.strokeStyle='rgba('+ec[0]+','+ec[1]+','+ec[2]+','+(alpha*0.3).toFixed(2)+')';
        ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(sp[0],sp[1],r+3,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='rgba('+ec[0]+','+ec[1]+','+ec[2]+','+(alpha*0.04).toFixed(2)+')';
        ctx.beginPath();ctx.arc(sp[0],sp[1],r+8,0,Math.PI*2);ctx.fill();
      }
    }

    // Cluster glow for project nodes
    if(t==='project'&&alpha>0.5&&r>2){
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(alpha*0.12).toFixed(2)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r*2.5,0,Math.PI*2);ctx.fill();
    }

    // Gold ring for paired highlight
    if(isPairedHL){
      ctx.strokeStyle='rgba(255,215,0,0.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+4,0,Math.PI*2);ctx.stroke();
    }

    // Artemis II pulsing gold ring
    if(pid==='NART'&&alpha>0.3){
      var pulse=0.4+0.3*Math.sin(driftTime*3);
      ctx.strokeStyle='rgba(196,163,90,'+pulse.toFixed(2)+')';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+6+2*Math.sin(driftTime*2),0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(196,163,90,'+(pulse*0.08).toFixed(3)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r+14,0,Math.PI*2);ctx.fill();
    }

    // NASA mission glow
    if(t==='nasa'&&pid!=='NART'&&alpha>0.3){
      ctx.fillStyle='rgba(11,61,145,'+(alpha*0.1).toFixed(2)+')';
      ctx.beginPath();ctx.arc(sp[0],sp[1],r*2,0,Math.PI*2);ctx.fill();
    }

    // Core node
    var bright=isHovered?80:(isNeighborOfHover||isPairedHL?40:50);
    ctx.fillStyle='rgba('+Math.min(255,col[0]+bright)+','+Math.min(255,col[1]+bright)+','+Math.min(255,col[2]+bright)+','+alpha.toFixed(2)+')';

    // Diamond shape for artist/species when zoomed in
    if((t==='artist'||t==='species')&&camZoom>1.5){
      ctx.beginPath();
      ctx.moveTo(sp[0],sp[1]-r);ctx.lineTo(sp[0]+r,sp[1]);ctx.lineTo(sp[0],sp[1]+r);ctx.lineTo(sp[0]-r,sp[1]);
      ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(sp[0],sp[1],r,0,Math.PI*2);ctx.fill();
    }

    // Labels
    var showLabel=false,showSublabel=false;
    if(isHovered||isPairedHL||isNeighborOfHover)showLabel=true;
    else if(t==='project'&&(camZoom>1.5||degreeCount[i]>6))showLabel=true;
    else if((t==='artist'||t==='species')&&camZoom>2.0)showLabel=true;
    if(camZoom>4.0)showSublabel=true;

    if(showLabel){
      var fontSize=Math.max(8,Math.min(13,10*camZoom/2));
      ctx.font=(isHovered||isPairedHL?'bold ':'')+fontSize+'px system-ui';
      ctx.textAlign='left';
      var labelText='',sublabelText='';
      if(t==='artist'){var d=nodeDeg(pid);labelText=ARTIST_DATA[d].a;sublabelText=ARTIST_DATA[d].g.split('(')[0].trim()}
      else if(t==='species'){var d=nodeDeg(pid);labelText=SPECIES_DATA[d].s;sublabelText=SPECIES_DATA[d].f}
      else{labelText=pid;if(pid==='S36')sublabelText='64 Artists';else if(pid==='SPS')sublabelText='64 Species'}
      ctx.fillStyle='rgba(255,255,255,'+(alpha*(isHovered||isPairedHL?1.0:0.75)).toFixed(2)+')';
      ctx.fillText(labelText,sp[0]+r+3,sp[1]+fontSize*0.35);
      if(showSublabel&&sublabelText){
        ctx.font=(fontSize*0.7)+'px system-ui';
        ctx.fillStyle='rgba(255,255,255,'+(alpha*0.4).toFixed(2)+')';
        ctx.fillText(sublabelText,sp[0]+r+3,sp[1]+fontSize*0.35+fontSize*0.85);
      }
    }
  }

  // Cluster labels
  if(camZoom<2.0){
    ctx.font='bold 14px system-ui';ctx.textAlign='center';
    CLUSTERS.forEach(function(c){
      var cx=0,cy=0,cn=0;
      c.ids.forEach(function(id){var idx=idxMap[id];if(idx!==undefined){cx+=px[idx];cy+=py[idx];cn++}});
      if(cn){
        cx/=cn;cy/=cn;
        var sp=worldToScreen(cx,cy);
        var alpha=activeCluster?(activeCluster===c?0.7:0.1):0.35;
        ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';
        ctx.fillText(c.name,sp[0],sp[1]-20);
      }
    });
    ctx.textAlign='left';
  }
}
requestAnimationFrame(frame);
</script>
