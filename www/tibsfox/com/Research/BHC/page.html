    .loading { text-align: center; padding: 4rem; color: var(--text-light); }

    h2:hover .anchor, h3:hover .anchor { opacity: 1; }

  <script>
    function mdToHtml(md){var html='';var lines=md.split('\n');var inTable=false,inList=false,inCode=false,listType='',tableRows=[];function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}function inlineFormat(t){t=t.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>');t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*([^*]+)\*/g,'<em>$1</em>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(m,x,u){if(u.endsWith('.md'))return'<a href="page.html?doc='+u.replace('.md','').replace(/.*\//,'')+'">'+x+'</a>';return'<a href="'+u+'" target="_blank" rel="noopener">'+x+'</a>';});t=t.replace(/ -- /g,' &mdash; ');return t;}function flushTable(){if(!tableRows.length)return;html+='<table>';tableRows.forEach(function(row,i){var cells=row.split('|').filter(function(c){return c.trim()!=='';});if(i===0)html+='<thead><tr>'+cells.map(function(c){return'<th>'+inlineFormat(c.trim())+'</th>';}).join('')+'</tr></thead><tbody>';else if(i>1)html+='<tr>'+cells.map(function(c){return'<td>'+inlineFormat(c.trim())+'</td>';}).join('')+'</tr>';});html+='</tbody></table>';tableRows=[];}function closeList(){if(inList){html+=listType==='ul'?'</ul>':'</ol>';inList=false;}}for(var i=0;i<lines.length;i++){var line=lines[i];if(line.trim().startsWith('```')){if(inCode){html+='</pre>';inCode=false;}else{closeList();flushTable();inCode=true;html+='<pre>';}continue;}if(inCode){html+=escHtml(line)+'\n';continue;}if(line.trim().startsWith('|')&&line.trim().endsWith('|')){closeList();tableRows.push(line.trim());if(i+1>=lines.length||!(lines[i+1].trim().startsWith('|')&&lines[i+1].trim().endsWith('|')))flushTable();continue;}else if(tableRows.length)flushTable();if(line.trim()===''){closeList();continue;}if(line.trim().startsWith('> **SAFETY')||line.trim().startsWith('> **WARNING')){closeList();html+='<div class="safety-callout">'+inlineFormat(line.trim().substring(2))+'</div>';continue;}if(line.trim().startsWith('> **Related:')){closeList();html+='<div class="cross-links"><h4>Related Topics</h4>'+inlineFormat(line.trim().substring(2).replace('**Related:** ',''))+'</div>';continue;}var hm=line.match(/^(#{1,6})\s+(.*)/);if(hm){closeList();var lv=hm[1].length;var id=hm[2].toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');html+='<h'+lv+' id="'+id+'">'+inlineFormat(hm[2])+'</h'+lv+'>';continue;}if(line.trim().match(/^[-*_]{3,}$/)){closeList();html+='<hr>';continue;}if(line.trim().startsWith('> ')){closeList();html+='<blockquote>'+inlineFormat(line.trim().substring(2))+'</blockquote>';continue;}if(line.trim().match(/^[-*]\s/)){if(!inList||listType!=='ul'){closeList();html+='<ul>';inList=true;listType='ul';}html+='<li>'+inlineFormat(line.trim().replace(/^[-*]\s/,''))+'</li>';continue;}if(line.trim().match(/^\d+\.\s/)){if(!inList||listType!=='ol'){closeList();html+='<ol>';inList=true;listType='ol';}html+='<li>'+inlineFormat(line.trim().replace(/^\d+\.\s/,''))+'</li>';continue;}closeList();html+='<p>'+inlineFormat(line)+'</p>';}closeList();flushTable();if(inCode)html+='</pre>';return html;}
    function buildToc(html){var h=[],re=/<h([23])\s+id="([^"]*)">(.*?)<\/h[23]>/g;var m;while((m=re.exec(html))!==null)h.push({level:parseInt(m[1]),id:m[2],text:m[3].replace(/<[^>]+>/g,'')});if(h.length<3)return'';var t='<div class="toc"><h3>Contents</h3><input type="text" class="toc-search" placeholder="Filter sections..."><ul>';h.forEach(function(x){t+='<li class="depth-'+x.level+'"><a href="#'+x.id+'">'+x.text+'</a></li>';});return t+'</ul></div>';}
    function enhanceNavigation(){var toc=document.querySelector('.toc');var content=document.getElementById('content');if(!toc||!content)return;var grid=document.createElement('div');grid.className='page-grid';content.parentNode.insertBefore(grid,content);grid.appendChild(toc);var body=document.createElement('div');body.className='md-body';while(content.firstChild)body.appendChild(content.firstChild);content.appendChild(grid);grid.appendChild(body);body.querySelectorAll('h2[id],h3[id]').forEach(function(h){var a=document.createElement('a');a.className='anchor';a.href='#'+h.id;a.textContent='#';h.appendChild(a);});var tocLinks=toc.querySelectorAll('a[href^="#"]');var observer=new IntersectionObserver(function(entries){entries.forEach(function(entry){if(entry.isIntersecting){tocLinks.forEach(function(a){a.classList.remove('active');});var link=toc.querySelector('a[href="#'+entry.target.id+'"]');if(link)link.classList.add('active');}});},{rootMargin:'-20% 0px -80% 0px'});body.querySelectorAll('h2[id],h3[id]').forEach(function(h){observer.observe(h);});tocLinks.forEach(function(a){a.addEventListener('click',function(e){var target=document.getElementById(a.getAttribute('href').slice(1));if(target){e.preventDefault();target.scrollIntoView({behavior:'smooth',block:'start'});history.replaceState(null,'',a.getAttribute('href'));}});});var si=toc.querySelector('.toc-search');if(si){si.addEventListener('input',function(){var q=this.value.toLowerCase();toc.querySelectorAll('li').forEach(function(li){li.style.display=(!q||li.textContent.toLowerCase().indexOf(q)!==-1)?'':'none';});});}}
    var titles={'01-stellar-mass':'Stellar-Mass Black Holes -- X-ray Binaries & LIGO','02-intermediate-mass':'Intermediate-Mass Black Holes -- The Missing Link','03-supermassive':'Supermassive Black Holes -- Galactic Centers & AGN','04-detection-methods':'Detection Methods & Instrumentation','05-dynamics-phenomena':'Dynamics & Phenomena -- TDEs, Jets, Mergers'};
    var params=new URLSearchParams(window.location.search);var doc=params.get('doc')||'01-stellar-mass';
    document.title=(titles[doc]||doc)+' \u2014 Black Hole Catalog';
    document.querySelectorAll('header nav a').forEach(function(a){if(a.href.includes('doc='+doc))a.classList.add('active');});
    fetch('research/'+doc+'.md').then(function(r){if(!r.ok)throw new Error('Document not found');return r.text();}).then(function(md){var html=mdToHtml(md);document.getElementById('content').innerHTML=buildToc(html)+html;enhanceNavigation();}).catch(function(err){document.getElementById('content').innerHTML='<p style="color:#DC2626">Error: '+err.message+'</p>';});
  </script>
