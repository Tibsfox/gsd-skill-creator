<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschen Curve Explorer — Ranger 6 | v1.33</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0D0A08; color: #E8E8E8; padding: 2rem; }
  h1 { font-size: 1.5rem; color: #E8D4B8; margin-bottom: 0.5rem; }
  .subtitle { color: #A0A0A0; font-size: 0.9rem; margin-bottom: 2rem; }
  .container { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; max-width: 1200px; margin: 0 auto; }
  canvas { background: #1A1008; border: 1px solid #5C2E0E; border-radius: 8px; width: 100%; }
  .controls { background: #1A1008; border: 1px solid #5C2E0E; border-radius: 8px; padding: 1.5rem; }
  .control-group { margin-bottom: 1.5rem; }
  .control-group label { display: block; color: #D4A574; font-size: 0.85rem; margin-bottom: 0.3rem; }
  .control-group .value { font-family: monospace; color: #FFB030; font-size: 1.1rem; }
  input[type="range"] { width: 100%; accent-color: #CC8800; }
  .result { padding: 1rem; border-radius: 6px; margin-top: 1rem; font-size: 0.95rem; font-weight: bold; text-align: center; }
  .result.safe { background: rgba(64,204,64,0.15); border: 1px solid #40CC40; color: #40CC40; }
  .result.danger { background: rgba(255,48,48,0.15); border: 1px solid #FF3030; color: #FF3030; }
  .preset-btn { background: #5C2E0E; border: 1px solid #8B4513; color: #E8D4B8; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin: 0.2rem; }
  .preset-btn:hover { background: #8B4513; }
  .presets { margin-bottom: 1.5rem; }
  .presets label { display: block; color: #D4A574; font-size: 0.85rem; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<h1>Paschen Curve Explorer</h1>
<p class="subtitle">Adjust pressure, gap, and voltage to see if an arc occurs — the physics that killed Ranger 6's cameras</p>

<div class="container">
  <canvas id="canvas" width="800" height="500"></canvas>
  <div class="controls">
    <div class="presets">
      <label>Presets:</label>
      <button class="preset-btn" onclick="setPreset(1, 0.5, 10000)">Ranger 6 Camera</button>
      <button class="preset-btn" onclick="setPreset(760, 0.5, 10000)">Sea Level</button>
      <button class="preset-btn" onclick="setPreset(0.0001, 0.5, 10000)">Hard Vacuum</button>
    </div>
    <div class="control-group">
      <label>Pressure: <span class="value" id="pVal">1.00 torr</span></label>
      <input type="range" id="pressure" min="-4" max="3" step="0.01" value="0" oninput="update()">
    </div>
    <div class="control-group">
      <label>Gap Distance: <span class="value" id="dVal">0.50 cm</span></label>
      <input type="range" id="gap" min="-2" max="1.5" step="0.01" value="-0.3" oninput="update()">
    </div>
    <div class="control-group">
      <label>Voltage: <span class="value" id="vVal">10,000 V</span></label>
      <input type="range" id="voltage" min="2" max="5" step="0.01" value="4" oninput="update()">
    </div>
    <div id="result" class="result safe">SAFE — No Arc</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const A = 15.0, B = 365.0, gamma = 0.01;

function paschen(pd) {
  const denom = Math.log(A * pd) - Math.log(Math.log(1 + 1/gamma));
  return denom > 0 ? B * pd / denom : NaN;
}

function setPreset(p, d, v) {
  document.getElementById('pressure').value = Math.log10(p);
  document.getElementById('gap').value = Math.log10(d);
  document.getElementById('voltage').value = Math.log10(v);
  update();
}

function update() {
  const p = Math.pow(10, parseFloat(document.getElementById('pressure').value));
  const d = Math.pow(10, parseFloat(document.getElementById('gap').value));
  const v = Math.pow(10, parseFloat(document.getElementById('voltage').value));
  
  document.getElementById('pVal').textContent = p < 0.01 ? p.toExponential(1) + ' torr' : p.toFixed(2) + ' torr';
  document.getElementById('dVal').textContent = d.toFixed(2) + ' cm';
  document.getElementById('vVal').textContent = Math.round(v).toLocaleString() + ' V';
  
  const pd_current = p * d;
  const v_bd = paschen(pd_current);
  const arcs = !isNaN(v_bd) && v > v_bd;
  
  const result = document.getElementById('result');
  if (isNaN(v_bd)) {
    result.className = 'result safe';
    result.textContent = 'SAFE — Outside Paschen range';
  } else if (arcs) {
    result.className = 'result danger';
    result.textContent = `ARC! V=${Math.round(v).toLocaleString()}V > Vbd=${Math.round(v_bd).toLocaleString()}V`;
  } else {
    result.className = 'result safe';
    result.textContent = `SAFE — V=${Math.round(v).toLocaleString()}V < Vbd=${Math.round(v_bd).toLocaleString()}V`;
  }
  
  drawCurve(pd_current, v, v_bd, arcs);
}

function drawCurve(pd_current, v_applied, v_bd, arcs) {
  const W = canvas.width, H = canvas.height;
  const margin = { top: 40, right: 30, bottom: 50, left: 70 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;
  
  ctx.fillStyle = '#1A1008';
  ctx.fillRect(0, 0, W, H);
  
  function xScale(pd) { return margin.left + (Math.log10(pd) - (-1)) / (4 - (-1)) * w; }
  function yScale(v) { return margin.top + h - (Math.log10(v) - 2) / (5.5 - 2) * h; }
  
  // Grid
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  for (let i = -1; i <= 4; i++) {
    const x = xScale(Math.pow(10, i));
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, H - margin.bottom); ctx.stroke();
  }
  for (let i = 2; i <= 5; i++) {
    const y = yScale(Math.pow(10, i));
    ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
  }
  
  // Paschen curve
  ctx.strokeStyle = '#7EB8DA';
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = -1; i <= 4; i += 0.02) {
    const pd = Math.pow(10, i);
    const vb = paschen(pd);
    if (!isNaN(vb) && vb > 0 && vb < 300000) {
      const x = xScale(pd), y = yScale(vb);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
  }
  ctx.stroke();
  
  // Applied voltage line
  ctx.strokeStyle = '#FF3030';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 4]);
  const yv = yScale(v_applied);
  ctx.beginPath(); ctx.moveTo(margin.left, yv); ctx.lineTo(W - margin.right, yv); ctx.stroke();
  ctx.setLineDash([]);
  
  // Current p×d marker
  const xc = xScale(pd_current);
  ctx.strokeStyle = arcs ? '#FF3030' : '#40CC40';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(xc, margin.top); ctx.lineTo(xc, H - margin.bottom); ctx.stroke();
  
  // Marker dot
  if (!isNaN(v_bd)) {
    ctx.fillStyle = arcs ? '#FF3030' : '#40CC40';
    ctx.beginPath(); ctx.arc(xc, yScale(v_bd), 6, 0, Math.PI * 2); ctx.fill();
  }
  
  // Labels
  ctx.fillStyle = '#A0A0A0'; ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('p × d (torr·cm)', W/2, H - 10);
  ctx.save();
  ctx.translate(15, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Breakdown Voltage (V)', 0, 0);
  ctx.restore();
  
  ctx.fillStyle = '#E8D4B8'; ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Paschen Breakdown Curve', margin.left + 10, margin.top - 10);
  
  // Axis labels
  ctx.fillStyle = '#666'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  for (let i = -1; i <= 4; i++) {
    ctx.fillText('10^' + i, xScale(Math.pow(10, i)), H - margin.bottom + 15);
  }
  ctx.textAlign = 'right';
  for (let i = 2; i <= 5; i++) {
    ctx.fillText(Math.pow(10, i).toLocaleString(), margin.left - 5, yScale(Math.pow(10, i)) + 4);
  }
}

update();
</script>
</body>
</html>
