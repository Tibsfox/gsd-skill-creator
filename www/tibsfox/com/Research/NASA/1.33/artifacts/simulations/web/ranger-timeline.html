<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranger Program Timeline — v1.33</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0D0A08; color: #E8E8E8; padding: 2rem; }
  h1 { font-size: 1.5rem; color: #E8D4B8; margin-bottom: 0.5rem; }
  .subtitle { color: #A0A0A0; font-size: 0.9rem; margin-bottom: 2rem; }
  .timeline { max-width: 900px; margin: 0 auto; position: relative; }
  .timeline::before { content: ''; position: absolute; left: 50px; top: 0; bottom: 0; width: 2px; background: #5C2E0E; }
  .mission { display: flex; gap: 1.5rem; margin-bottom: 2rem; position: relative; align-items: flex-start; }
  .mission-marker { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; position: relative; left: 39px; z-index: 1; border: 2px solid #0D0A08; }
  .mission-marker.failure { background: #FF3030; }
  .mission-marker.partial { background: #FFB030; }
  .mission-marker.success { background: #40CC40; }
  .mission-card { background: #1A1008; border: 1px solid #5C2E0E; border-radius: 8px; padding: 1rem 1.25rem; flex: 1; margin-left: 2rem; }
  .mission-card h3 { color: #E8D4B8; font-size: 1rem; margin-bottom: 0.3rem; }
  .mission-card .date { color: #A0A0A0; font-size: 0.8rem; margin-bottom: 0.5rem; }
  .mission-card .result { font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: bold; }
  .mission-card .result.failure { color: #FF3030; }
  .mission-card .result.partial { color: #FFB030; }
  .mission-card .result.success { color: #40CC40; }
  .mission-card .detail { font-size: 0.85rem; color: #A0A0A0; line-height: 1.5; }
  .mission-card .images { font-family: monospace; font-size: 1.2rem; margin-top: 0.5rem; }
  .mission-card .images.zero { color: #FF3030; }
  .mission-card .images.many { color: #40CC40; }
  .highlight { border-color: #FFB030 !important; box-shadow: 0 0 15px rgba(204,136,0,0.15); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 900px; margin: 2rem auto; }
  .stat-box { background: #1A1008; border: 1px solid #5C2E0E; border-radius: 8px; padding: 1rem; text-align: center; }
  .stat-box .num { font-size: 2rem; font-weight: bold; font-family: monospace; }
  .stat-box .label { font-size: 0.8rem; color: #A0A0A0; }
</style>
</head>
<body>
<h1>Ranger Program Timeline</h1>
<p class="subtitle">Nine missions to the Moon — six failures, then three triumphs</p>

<div class="stats">
  <div class="stat-box"><div class="num" style="color:#FF3030;">6</div><div class="label">Failures (Rangers 1-6)</div></div>
  <div class="stat-box"><div class="num" style="color:#40CC40;">17,267</div><div class="label">Total Images (Rangers 7-9)</div></div>
  <div class="stat-box"><div class="num" style="color:#FFB030;">100+</div><div class="label">Fixes from Ranger 6</div></div>
</div>

<div class="timeline" id="timeline"></div>

<script>
const missions = [
  { name:"Ranger 1", date:"Aug 23, 1961", status:"failure", images:0, detail:"Agena B failed to reignite for translunar injection. Spacecraft reentered and burned up. First Ranger attempt." },
  { name:"Ranger 2", date:"Nov 18, 1961", status:"failure", images:0, detail:"Same failure mode — Agena B did not reignite. Two consecutive identical failures." },
  { name:"Ranger 3", date:"Jan 26, 1962", status:"failure", images:0, detail:"Atlas guidance error produced excessive velocity. Missed Moon by 36,800 km. Entered heliocentric orbit." },
  { name:"Ranger 4", date:"Apr 23, 1962", status:"partial", images:0, detail:"Computer failure after launch. Uncontrollable. First US spacecraft to hit the Moon — but blind and tumbling." },
  { name:"Ranger 5", date:"Oct 18, 1962", status:"failure", images:0, detail:"Power failure 8 hours after launch. Missed Moon by 725 km. Dead spacecraft entered heliocentric orbit." },
  { name:"Ranger 6", date:"Jan 30, 1964", status:"partial", images:0, detail:"PERFECT TRAJECTORY — hit Moon within 32 km of aim point. But all six cameras dead (Paschen arc at T+107s). Zero photographs. Failure analysis produced 100+ fixes.", highlight:true },
  { name:"Ranger 7", date:"Jul 31, 1964", status:"success", images:4316, detail:"First successful Ranger! 4,316 photographs of Mare Cognitum — the first close-up images of the Moon." },
  { name:"Ranger 8", date:"Feb 20, 1965", status:"success", images:7137, detail:"7,137 photographs of Mare Tranquillitatis — the same region Ranger 6 hit blind." },
  { name:"Ranger 9", date:"Mar 24, 1965", status:"success", images:5814, detail:"5,814 photographs of Alphonsus crater. Live television broadcast to the public. Final Ranger." },
];

const timeline = document.getElementById('timeline');
missions.forEach(m => {
  const div = document.createElement('div');
  div.className = 'mission';
  div.innerHTML = `
    <div class="mission-marker ${m.status}"></div>
    <div class="mission-card ${m.highlight ? 'highlight' : ''}">
      <h3>${m.name}</h3>
      <div class="date">${m.date}</div>
      <div class="result ${m.status}">${m.status.toUpperCase()}</div>
      <div class="detail">${m.detail}</div>
      <div class="images ${m.images === 0 ? 'zero' : 'many'}">${m.images === 0 ? '0 images' : m.images.toLocaleString() + ' images'}</div>
    </div>
  `;
  timeline.appendChild(div);
});
</script>
</body>
</html>
