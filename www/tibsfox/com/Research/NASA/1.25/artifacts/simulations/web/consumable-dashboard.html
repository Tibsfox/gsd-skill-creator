<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA-9 Consumable Dashboard | Mission 1.25</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1A12; color: #E8E4DE; font-family: 'Courier New', monospace; }
  .dashboard { max-width: 800px; margin: 2rem auto; padding: 1rem; }
  h1 { text-align: center; color: #B5573A; margin-bottom: 0.5rem; font-size: 1.2rem; }
  .subtitle { text-align: center; color: #7A3A28; font-size: 0.85rem; margin-bottom: 2rem; }
  .met { text-align: center; font-size: 2rem; color: #F5E6C8; margin-bottom: 1.5rem; }
  .orbit-info { text-align: center; color: #3D8B37; margin-bottom: 1.5rem; }
  .bar-container { margin-bottom: 1rem; }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.85rem; }
  .bar-bg { background: #1A2218; height: 24px; border-radius: 4px; overflow: hidden; border: 1px solid #3A2A1A; }
  .bar-fill { height: 100%; transition: width 0.5s ease; border-radius: 3px; }
  .status { text-align: center; margin-top: 2rem; padding: 1rem; border: 1px solid #3A2A1A; border-radius: 6px; }
  .controls { text-align: center; margin-top: 1.5rem; }
  button { background: #B5573A; color: #F5E6C8; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.9rem; margin: 0 0.5rem; }
  button:hover { background: #7A3A28; }
  .warning { color: #F44336; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="dashboard">
  <h1>MERCURY-ATLAS 9 / FAITH 7</h1>
  <p class="subtitle">Consumable Depletion Dashboard</p>
  <div class="met" id="met">MET: 00h 00m 00s</div>
  <div class="orbit-info" id="orbit">ORBIT 0 of 22 — PRE-LAUNCH</div>

  <div class="bar-container">
    <div class="bar-label"><span>🔋 Battery Power</span><span id="bat-pct">100%</span></div>
    <div class="bar-bg"><div class="bar-fill" id="bat-bar" style="width:100%; background:#4A90D9;"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label"><span>💨 Oxygen (O₂)</span><span id="o2-pct">100%</span></div>
    <div class="bar-bg"><div class="bar-fill" id="o2-bar" style="width:100%; background:#4CAF50;"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label"><span>🫁 CO₂ Scrubber (LiOH)</span><span id="co2-pct">100%</span></div>
    <div class="bar-bg"><div class="bar-fill" id="co2-bar" style="width:100%; background:#F44336;"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label"><span>🚀 Attitude Fuel (H₂O₂)</span><span id="h2o2-pct">100%</span></div>
    <div class="bar-bg"><div class="bar-fill" id="h2o2-bar" style="width:100%; background:#FF9800;"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label"><span>💧 Cooling Water</span><span id="h2o-pct">100%</span></div>
    <div class="bar-bg"><div class="bar-fill" id="h2o-bar" style="width:100%; background:#9E9E9E;"></div></div>
  </div>

  <div class="status" id="status">STATUS: READY FOR LAUNCH</div>

  <div class="controls">
    <button onclick="startMission()">▶ LAUNCH</button>
    <button onclick="toggleSpeed()">⏩ Speed: 1x</button>
    <button onclick="resetMission()">↺ Reset</button>
  </div>
</div>

<script>
let missionTime = 0; // seconds (mission elapsed time)
let speed = 100;     // 100x real time by default
let running = false;
let interval = null;

const MISSION_DURATION = 34 * 3600 + 19 * 60 + 49; // 34h 19m 49s in seconds
const ORBIT_PERIOD = 88.5 * 60; // seconds

// Consumable depletion rates (fraction per hour)
const consumables = {
  bat:  { rate: 1/80, sleep_factor: 0.6 },
  o2:   { rate: 1/53.6, sleep_factor: 0.85 },
  co2:  { rate: 1/45, sleep_factor: 0.85 },
  h2o2: { rate: 1/60.4, sleep_factor: 0.3 },
  h2o:  { rate: 1/46.6, sleep_factor: 0.7 },
};

function startMission() {
  if (running) return;
  running = true;
  interval = setInterval(tick, 50);
}

function toggleSpeed() {
  const speeds = [100, 500, 1000, 2000];
  const idx = (speeds.indexOf(speed) + 1) % speeds.length;
  speed = speeds[idx];
  document.querySelector('.controls button:nth-child(2)').textContent = `⏩ Speed: ${speed}x`;
}

function resetMission() {
  running = false;
  if (interval) clearInterval(interval);
  missionTime = 0;
  updateDisplay();
}

function tick() {
  missionTime += speed * 0.05; // 50ms intervals
  if (missionTime >= MISSION_DURATION + 60) {
    running = false;
    clearInterval(interval);
  }
  updateDisplay();
}

function updateDisplay() {
  const hours = Math.floor(missionTime / 3600);
  const mins = Math.floor((missionTime % 3600) / 60);
  const secs = Math.floor(missionTime % 60);
  document.getElementById('met').textContent = `MET: ${String(hours).padStart(2,'0')}h ${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;

  const orbit = Math.floor(missionTime / ORBIT_PERIOD);
  const isSleep = hours >= 10 && hours <= 21;

  let orbitText = `ORBIT ${Math.min(orbit, 22)} of 22`;
  if (isSleep) orbitText += ' — SLEEP PERIOD';
  if (hours >= 28 && hours < 31) orbitText += ' — ⚠ SYSTEMS DEGRADING';
  if (hours >= 31 && hours < 33) orbitText += ' — ⚠ ASCS FAILURE';
  if (hours >= 33 && missionTime < MISSION_DURATION) orbitText += ' — MANUAL CONTROL';
  if (missionTime >= MISSION_DURATION) orbitText = 'SPLASHDOWN — 6.4 km from USS Kearsarge';
  document.getElementById('orbit').textContent = orbitText;

  // Update consumable bars
  const t_hr = missionTime / 3600;
  for (const [key, c] of Object.entries(consumables)) {
    const factor = isSleep ? c.sleep_factor : 1.0;
    const remaining = Math.max(0, 100 * (1 - c.rate * t_hr * factor));
    document.getElementById(`${key}-bar`).style.width = `${remaining}%`;
    document.getElementById(`${key}-pct`).textContent = `${remaining.toFixed(1)}%`;
    if (remaining < 25) {
      document.getElementById(`${key}-pct`).className = 'warning';
    }
  }

  // Status
  let status = 'STATUS: NOMINAL';
  if (missionTime < 1) status = 'STATUS: READY FOR LAUNCH';
  else if (hours >= 33 && missionTime < MISSION_DURATION) status = 'STATUS: ⚠ MANUAL CONTROL — Cooper flying by hand';
  else if (hours >= 31) status = 'STATUS: ⚠ ASCS FAILURE — Gyros drifted, inverter intermittent';
  else if (hours >= 28) status = 'STATUS: ⚠ 0.05g FALSE ALARM — Attitude reference degrading';
  else if (isSleep) status = 'STATUS: SLEEP PERIOD — First American sleep in space';
  if (missionTime >= MISSION_DURATION) status = 'STATUS: ✅ MISSION COMPLETE — Most accurate Mercury landing';
  document.getElementById('status').textContent = status;
}

updateDisplay();
</script>
</body>
</html>
