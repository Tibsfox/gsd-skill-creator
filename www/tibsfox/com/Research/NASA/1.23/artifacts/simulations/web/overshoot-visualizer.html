<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora 7 Overshoot Visualizer | v1.23</title>
<style>
  body { font-family: 'Courier New', monospace; background: #0a0a1a; color: #e8e8e8; margin: 0; padding: 2rem; }
  h1 { color: #d4a830; font-size: 1.5rem; }
  .controls { display: flex; gap: 2rem; margin: 1rem 0; flex-wrap: wrap; }
  .slider-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .slider-group label { font-size: 0.85rem; color: #a0a0a0; }
  .slider-group input { width: 300px; }
  .result { font-size: 1.2rem; margin: 1rem 0; padding: 1rem; background: #1a1a2e; border: 1px solid #2d5a2d; border-radius: 8px; }
  .result .overshoot { font-size: 2rem; color: #fc3d21; font-weight: bold; }
  .result .nominal { color: #40cc40; }
  canvas { border: 1px solid #2d5a2d; border-radius: 4px; margin-top: 1rem; }
  .formula { color: #7eb8da; font-style: italic; margin: 0.5rem 0; }
</style>
</head>
<body>

<h1>Aurora 7 Retrofire Overshoot Visualizer</h1>
<p>Adjust the yaw angle and timing delay to see how small errors become 402 km.</p>

<div class="controls">
  <div class="slider-group">
    <label>Yaw Error: <span id="yawVal">25</span>°</label>
    <input type="range" id="yaw" min="0" max="45" value="25" step="0.5">
  </div>
  <div class="slider-group">
    <label>Timing Delay: <span id="delayVal">3.0</span>s</label>
    <input type="range" id="delay" min="0" max="10" value="3" step="0.1">
  </div>
</div>

<p class="formula">Δv_retrograde = 152 × cos(θ) = <span id="dvRetro">137.8</span> m/s &nbsp;|&nbsp;
   Deficit = <span id="dvDeficit">14.2</span> m/s &nbsp;|&nbsp;
   cos(<span id="cosAngle">25</span>°) = <span id="cosVal">0.9063</span></p>

<div class="result">
  Estimated Overshoot: <span class="overshoot" id="overshootKm">402</span> km
  <br><span id="status" style="font-size:0.9rem;"></span>
</div>

<canvas id="vectorCanvas" width="600" height="300"></canvas>
<canvas id="barCanvas" width="600" height="100"></canvas>

<script>
const yawSlider = document.getElementById('yaw');
const delaySlider = document.getElementById('delay');
const canvas = document.getElementById('vectorCanvas');
const barCanvas = document.getElementById('barCanvas');
const ctx = canvas.getContext('2d');
const bctx = barCanvas.getContext('2d');

function update() {
  const yaw = parseFloat(yawSlider.value);
  const delay = parseFloat(delaySlider.value);
  const yawRad = yaw * Math.PI / 180;

  const dvPlanned = 152;
  const dvRetro = dvPlanned * Math.cos(yawRad);
  const dvCross = dvPlanned * Math.sin(yawRad);
  const deficit = dvPlanned - dvRetro;
  const overshoot = 25 * deficit + 7.84 * delay;

  document.getElementById('yawVal').textContent = yaw.toFixed(1);
  document.getElementById('delayVal').textContent = delay.toFixed(1);
  document.getElementById('dvRetro').textContent = dvRetro.toFixed(1);
  document.getElementById('dvDeficit').textContent = deficit.toFixed(1);
  document.getElementById('cosAngle').textContent = yaw.toFixed(1);
  document.getElementById('cosVal').textContent = Math.cos(yawRad).toFixed(4);
  document.getElementById('overshootKm').textContent = Math.round(overshoot);

  const statusEl = document.getElementById('status');
  if (overshoot < 50) {
    statusEl.textContent = '✅ Within recovery zone';
    statusEl.style.color = '#40cc40';
  } else if (overshoot < 200) {
    statusEl.textContent = '⚠️ Significant overshoot — extended search required';
    statusEl.style.color = '#d4a830';
  } else {
    statusEl.textContent = '🔴 Major overshoot — pilot recovery delayed hours';
    statusEl.style.color = '#fc3d21';
  }

  // Vector diagram
  ctx.clearRect(0, 0, 600, 300);
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 600, 300);

  const cx = 300, cy = 150;
  const scale = 1.5;

  // Planned vector (green)
  ctx.strokeStyle = '#40cc40';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx - dvPlanned * scale, cy);
  ctx.stroke();
  ctx.fillStyle = '#40cc40';
  ctx.font = '12px monospace';
  ctx.fillText('Planned: 152 m/s retrograde', cx - 250, cy - 15);

  // Actual vector (yellow)
  ctx.strokeStyle = '#d4a830';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx - dvRetro * scale, cy - dvCross * scale);
  ctx.stroke();
  ctx.fillText(`Actual: ${dvRetro.toFixed(0)} retro + ${dvCross.toFixed(0)} cross`, cx - 250, cy + 30);

  // Retrograde component (dashed)
  ctx.strokeStyle = '#fc3d21';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(cx - dvRetro * scale, cy - dvCross * scale);
  ctx.lineTo(cx - dvRetro * scale, cy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arc showing yaw angle
  ctx.strokeStyle = '#7eb8da';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, 50, Math.PI, Math.PI + yawRad, true);
  ctx.stroke();
  ctx.fillStyle = '#7eb8da';
  ctx.fillText(`θ = ${yaw.toFixed(1)}°`, cx - 80, cy - 55);

  // Overshoot bar
  bctx.clearRect(0, 0, 600, 100);
  bctx.fillStyle = '#0a0a1a';
  bctx.fillRect(0, 0, 600, 100);

  // Recovery zone
  const zoneWidth = 50 / 800 * 580;
  bctx.fillStyle = '#1a3a1a';
  bctx.fillRect(10, 30, zoneWidth, 40);
  bctx.fillStyle = '#40cc40';
  bctx.font = '10px monospace';
  bctx.fillText('Recovery Zone (50 km)', 12, 25);

  // Overshoot bar
  const barWidth = Math.min(overshoot / 800 * 580, 580);
  const barColor = overshoot < 50 ? '#40cc40' : overshoot < 200 ? '#d4a830' : '#fc3d21';
  bctx.fillStyle = barColor;
  bctx.fillRect(10, 30, barWidth, 40);

  // 402 km marker
  const marker402 = 402 / 800 * 580 + 10;
  bctx.strokeStyle = '#ffffff';
  bctx.lineWidth = 1;
  bctx.setLineDash([3, 3]);
  bctx.beginPath();
  bctx.moveTo(marker402, 20);
  bctx.lineTo(marker402, 80);
  bctx.stroke();
  bctx.setLineDash([]);
  bctx.fillStyle = '#ffffff';
  bctx.fillText('Carpenter: 402 km', marker402 - 40, 15);

  bctx.fillStyle = '#a0a0a0';
  bctx.fillText(`${Math.round(overshoot)} km`, barWidth + 15, 55);
}

yawSlider.addEventListener('input', update);
delaySlider.addEventListener('input', update);
update();
</script>

</body>
</html>
