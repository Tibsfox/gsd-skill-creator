<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyroscope Physics Demo — Ranger 2</title>
<style>
  body { margin: 0; background: #0D160D; color: #D8D8D8; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.2rem; color: #A0D0A0; margin-bottom: 1rem; }
  canvas { border: 1px solid #2A4A2A; margin-bottom: 1rem; }
  .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
  button { background: #2A4A2A; color: #D8D8D8; border: 1px solid #4A8A4A; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; }
  button:hover { background: #3A6A3A; }
  button.fail { background: #5A1010; border-color: #CC4444; }
  #status { font-size: 1.1rem; padding: 0.5rem 1rem; border-radius: 4px; }
  .active { background: rgba(74,138,74,0.2); border: 1px solid #4A8A4A; color: #4A8A4A; }
  .failed { background: rgba(204,68,68,0.2); border: 1px solid #CC4444; color: #CC4444; }
</style>
</head>
<body>
<h1>Gyroscope Angular Momentum — Ranger 2 Attitude Reference</h1>
<canvas id="c" width="400" height="400"></canvas>
<div class="controls">
  <button onclick="spinUp()">Spin Up Gyroscope</button>
  <button class="fail" onclick="failGyro()">Fail Gyroscope (Bearing Seizure)</button>
</div>
<div id="status" class="active">GYROSCOPE: ACTIVE — ATTITUDE REFERENCE VALID</div>
<div id="rpm" style="margin-top:0.5rem;">Spin rate: 24,000 RPM | Angular momentum: 0.0189 kg·m²/s</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 400, cx = W/2, cy = H/2;

let spinRate = 24000; // RPM
let targetRate = 24000;
let angle = 0;
let perturbAngle = 0;
let failing = false;

function spinUp() {
  targetRate = 24000;
  failing = false;
}

function failGyro() {
  targetRate = 0;
  failing = true;
}

function draw() {
  // Update spin rate (smooth transition)
  if (failing) {
    spinRate = Math.max(0, spinRate - 200);
  } else {
    spinRate = Math.min(24000, spinRate + 500);
  }
  
  // Angular velocity
  const omega = spinRate / 60 * 2 * Math.PI; // rad/s
  angle += omega * 0.001; // scaled for visualization
  
  // Perturbation (drift when gyro fails)
  if (spinRate < 5000) {
    perturbAngle += (24000 - spinRate) / 24000 * 0.02;
  } else {
    perturbAngle *= 0.95; // damped when spinning
  }
  
  // Clear
  ctx.fillStyle = '#0A0A1A';
  ctx.fillRect(0, 0, W, H);
  
  // Outer ring (gimbal)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(perturbAngle);
  
  ctx.strokeStyle = '#4A8A4A';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 150, 0, Math.PI * 2);
  ctx.stroke();
  
  // Rotor
  const rotorColor = spinRate > 5000 ? '#FFD700' : 
                     spinRate > 1000 ? '#FF8800' : '#CC4444';
  
  ctx.strokeStyle = rotorColor;
  ctx.lineWidth = 3;
  
  // Draw spinning rotor lines
  for (let i = 0; i < 8; i++) {
    const a = angle + i * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 30, Math.sin(a) * 30);
    ctx.lineTo(Math.cos(a) * 100, Math.sin(a) * 100);
    ctx.stroke();
  }
  
  // Center hub
  ctx.fillStyle = rotorColor;
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI * 2);
  ctx.fill();
  
  // Spin axis indicator
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, -120, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = '10px Courier New';
  ctx.fillText('ROLL AXIS', -30, -130);
  
  ctx.restore();
  
  // Update status
  const L = (0.5 * 0.4 * 0.03 * 0.03) * (spinRate / 60 * 2 * Math.PI);
  const statusEl = document.getElementById('status');
  const rpmEl = document.getElementById('rpm');
  
  if (spinRate > 5000) {
    statusEl.textContent = 'GYROSCOPE: ACTIVE — ATTITUDE REFERENCE VALID';
    statusEl.className = 'active';
  } else if (spinRate > 0) {
    statusEl.textContent = 'GYROSCOPE: DEGRADING — REFERENCE UNSTABLE';
    statusEl.className = 'failed';
  } else {
    statusEl.textContent = 'GYROSCOPE: STOPPED — ATTITUDE REFERENCE LOST — RESTART ABORTED';
    statusEl.className = 'failed';
  }
  
  rpmEl.textContent = `Spin rate: ${Math.round(spinRate).toLocaleString()} RPM | Angular momentum: ${L.toFixed(4)} kg·m²/s | Drift: ${(perturbAngle * 180 / Math.PI).toFixed(1)}°`;
  
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
