<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranger 2 Parking Orbit Simulator</title>
<style>
  body { margin: 0; background: #0D160D; color: #D8D8D8; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { border: 1px solid #2A4A2A; }
  #info { position: absolute; top: 10px; left: 10px; font-size: 12px; line-height: 1.6; background: rgba(13,22,13,0.8); padding: 10px; border-radius: 4px; }
  .fail { color: #CC4444; }
  .ok { color: #4A8A4A; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<div id="info">
  <div>RANGER 2 — PARKING ORBIT</div>
  <div id="orbit">Orbit: 1</div>
  <div id="alt">Altitude: 150 x 242 km</div>
  <div id="gyro" class="fail">Gyroscope: INOPERATIVE</div>
  <div id="n2">N₂: 100%</div>
  <div id="status" class="ok">Status: TRACKING</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;
const earthR = 120;

let t = 0;
const orbitPeriod = 180; // frames per orbit
const totalOrbits = 33;
const totalFrames = orbitPeriod * totalOrbits;

function draw() {
  ctx.fillStyle = '#0A0A1A';
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  for (let i = 0; i < 100; i++) {
    const sx = (Math.sin(i*127.1)*0.5+0.5)*W;
    const sy = (Math.sin(i*311.7)*0.5+0.5)*H;
    ctx.fillStyle = `rgba(200,200,255,${0.2+Math.sin(t/20+i)*0.1})`;
    ctx.fillRect(sx, sy, 1, 1);
  }
  
  // Earth
  const earthGrad = ctx.createRadialGradient(cx-20, cy-20, 10, cx, cy, earthR);
  earthGrad.addColorStop(0, '#1A4A6A');
  earthGrad.addColorStop(0.5, '#0A3050');
  earthGrad.addColorStop(1, '#051520');
  ctx.fillStyle = earthGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, earthR, 0, Math.PI*2);
  ctx.fill();
  
  // Atmosphere
  ctx.strokeStyle = 'rgba(100,180,255,0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, earthR+3, 0, Math.PI*2);
  ctx.stroke();
  
  // Orbit parameters
  const orbitNum = Math.floor(t / orbitPeriod);
  const decay = 1 - (t / totalFrames) * 0.8;
  const orbitR = earthR + 60 * decay;
  const angle = (t / orbitPeriod) * Math.PI * 2;
  
  // Orbit trail
  ctx.strokeStyle = 'rgba(74,138,74,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, orbitR, 0, Math.PI*2);
  ctx.stroke();
  
  // Spacecraft
  const sx = cx + orbitR * Math.cos(angle);
  const sy = cy + orbitR * Math.sin(angle);
  
  // Shadow detection
  const inShadow = sx < cx && Math.abs(sy - cy) < earthR;
  
  // Signal strength
  const signal = Math.max(0, 1 - t/(totalFrames * 0.7));
  const brightness = inShadow ? signal * 0.3 : signal;
  
  // Spacecraft dot
  const scColor = t < totalFrames * 0.9 
    ? `rgba(255,215,0,${brightness})` 
    : `rgba(255,100,50,${brightness})`;
  
  ctx.fillStyle = scColor;
  ctx.beginPath();
  ctx.arc(sx, sy, 3 + brightness * 2, 0, Math.PI*2);
  ctx.fill();
  
  // Glow
  ctx.fillStyle = `rgba(255,215,0,${brightness * 0.1})`;
  ctx.beginPath();
  ctx.arc(sx, sy, 10, 0, Math.PI*2);
  ctx.fill();
  
  // Reentry streak
  if (orbitR < earthR + 5) {
    ctx.strokeStyle = 'rgba(255,150,50,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx - 20*Math.cos(angle), sy - 20*Math.sin(angle));
    ctx.stroke();
  }
  
  // Update HUD
  const n2 = Math.max(0, 100 - orbitNum * 7);
  const perigee = Math.round(150 - (1-decay) * 70);
  const apogee = Math.round(242 - (1-decay) * 140);
  
  document.getElementById('orbit').textContent = `Orbit: ${orbitNum + 1} / ${totalOrbits}`;
  document.getElementById('alt').textContent = `Altitude: ${perigee} x ${apogee} km`;
  document.getElementById('n2').textContent = `N₂: ${n2.toFixed(0)}%`;
  
  if (n2 <= 0 && signal > 0) {
    document.getElementById('status').textContent = 'Status: TUMBLING';
    document.getElementById('status').className = 'fail';
  } else if (signal <= 0) {
    document.getElementById('status').textContent = 'Status: SIGNAL LOST';
    document.getElementById('status').className = 'fail';
  } else if (perigee < 100) {
    document.getElementById('status').textContent = 'Status: REENTRY';
    document.getElementById('status').className = 'fail';
  }
  
  t++;
  if (t >= totalFrames) t = 0;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
