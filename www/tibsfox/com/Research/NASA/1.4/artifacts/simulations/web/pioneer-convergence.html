<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pioneer Program Convergence — Five Missions to Escape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    color: #7ec8e3;
    margin-bottom: 4px;
  }
  h2 {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
    font-weight: normal;
  }
  #main-canvas {
    border: 1px solid #333;
    border-radius: 4px;
    cursor: pointer;
  }
  #controls {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: #1a1a5e;
    color: #7ec8e3;
    border: 1px solid #7ec8e3;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  button:hover { background: #2a2a7e; }
  #failure-stack {
    margin-top: 16px;
    width: 900px;
    max-width: 95vw;
  }
  .failure-row {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    border-left: 3px solid transparent;
    opacity: 0;
    transition: opacity 0.5s ease;
    font-size: 12px;
    gap: 12px;
  }
  .failure-row.visible { opacity: 1; }
  .failure-row .mission-id {
    font-weight: bold;
    width: 80px;
    flex-shrink: 0;
  }
  .failure-row .date { color: #888; width: 100px; flex-shrink: 0; }
  .failure-row .vehicle { color: #aaa; width: 100px; flex-shrink: 0; }
  .failure-row .result { flex: 1; }
  .failure-row .alt { color: #7ec8e3; width: 120px; text-align: right; flex-shrink: 0; }
  .fail { border-left-color: #ff6b6b; }
  .fail .mission-id { color: #ff6b6b; }
  .partial { border-left-color: #ffd93d; }
  .partial .mission-id { color: #ffd93d; }
  .success { border-left-color: #6bcb77; }
  .success .mission-id { color: #6bcb77; }
</style>
</head>
<body>
<h1>PIONEER PROGRAM CONVERGENCE</h1>
<h2>Five missions. Four failures. One escape. August 1958 – March 1959.</h2>
<canvas id="main-canvas" width="900" height="500"></canvas>
<div id="controls">
  <button id="btn-animate">&#9654; Animate Missions</button>
  <button id="btn-reset">Reset</button>
  <span id="status" style="color: #888; font-size: 11px;"></span>
</div>
<div id="failure-stack"></div>

<script>
// ========================================================================
// Mission Data
// ========================================================================
const missions = [
  {
    id: 'Pioneer 0', version: 'v1.1', date: 'Aug 17, 1958',
    vehicle: 'Thor-Able I', maxAlt: 16, flightTime: '77 sec',
    failure: 'First stage exploded at T+77s (turbopump bearing)',
    status: 'fail', color: '#ff6b6b',
    organism: "Devil's club"
  },
  {
    id: 'Pioneer 1', version: 'v1.2', date: 'Oct 11, 1958',
    vehicle: 'Thor-Able I', maxAlt: 113854, flightTime: '43 hours',
    failure: 'Guidance error: 3.5° steering caused 236 m/s deficit',
    status: 'partial', color: '#ffd93d',
    organism: 'Sword fern'
  },
  {
    id: 'Pioneer 2', version: 'v1.3', date: 'Nov 8, 1958',
    vehicle: 'Thor-Able I', maxAlt: 1550, flightTime: '45 min',
    failure: 'Third stage failed to ignite (spin rockets misaligned)',
    status: 'fail', color: '#ff6b6b',
    organism: 'Black-capped chickadee'
  },
  {
    id: 'Pioneer 3', version: 'v1.4', date: 'Dec 6, 1958',
    vehicle: 'Juno II', maxAlt: 102322, flightTime: '38 hours',
    failure: 'First stage cutoff 3.7 sec early (LOX depletion sensor)',
    status: 'partial', color: '#ffd93d',
    organism: "Old Man's Beard lichen"
  },
  {
    id: 'Pioneer 4', version: 'v1.5', date: 'Mar 3, 1959',
    vehicle: 'Juno II', maxAlt: Infinity, flightTime: '82+ hours (escape)',
    failure: null,
    status: 'success', color: '#6bcb77',
    organism: 'Douglas-fir'
  }
];

const MOON_DIST = 384400;

// ========================================================================
// Canvas setup
// ========================================================================
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Chart area
const margin = { top: 50, right: 80, bottom: 80, left: 100 };
const chartW = W - margin.left - margin.right;
const chartH = H - margin.top - margin.bottom;

// Log scale for altitude
const logMin = 1; // 10 km
const logMax = 6; // 1,000,000 km
function altToY(alt) {
  if (alt <= 0) return margin.top + chartH;
  const logAlt = Math.log10(Math.max(alt, 10));
  return margin.top + chartH * (1 - (logAlt - logMin) / (logMax - logMin));
}
function missionToX(i) {
  return margin.left + (i / (missions.length - 1)) * chartW;
}

// ========================================================================
// Animation state
// ========================================================================
let visibleMissions = 0;
let animating = false;
let animTimer = null;

function drawChart() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (log scale)
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 1;
  ctx.font = '10px Courier New';
  ctx.fillStyle = '#666';
  for (let exp = logMin; exp <= logMax; exp++) {
    const y = altToY(Math.pow(10, exp));
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(W - margin.right, y);
    ctx.stroke();
    const labels = ['10 km', '100 km', '1,000 km', '10,000 km', '100,000 km', '1,000,000 km'];
    ctx.fillText(labels[exp - logMin] || '', 5, y + 4);
  }

  // Moon distance line
  const moonY = altToY(MOON_DIST);
  ctx.beginPath();
  ctx.setLineDash([8, 4]);
  ctx.moveTo(margin.left, moonY);
  ctx.lineTo(W - margin.right, moonY);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '11px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('\u263E Moon (384,400 km)', W - margin.right + 5, moonY + 4);

  // X-axis labels
  ctx.font = '10px Courier New';
  missions.forEach((m, i) => {
    const x = missionToX(i);
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText(m.id, x, H - margin.bottom + 20);
    ctx.fillText(m.version, x, H - margin.bottom + 35);
    ctx.fillText(m.date, x, H - margin.bottom + 50);
    ctx.fillStyle = '#555';
    ctx.fillText(m.vehicle, x, H - margin.bottom + 65);
  });
  ctx.textAlign = 'left';

  // Draw connecting line between visible missions
  if (visibleMissions > 1) {
    ctx.beginPath();
    for (let i = 0; i < visibleMissions && i < missions.length; i++) {
      const x = missionToX(i);
      const alt = missions[i].maxAlt === Infinity ? 500000 : missions[i].maxAlt;
      const y = altToY(alt);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(126,200,227,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Draw mission points
  for (let i = 0; i < visibleMissions && i < missions.length; i++) {
    const m = missions[i];
    const x = missionToX(i);
    const alt = m.maxAlt === Infinity ? 500000 : m.maxAlt;
    const y = altToY(alt);

    // Glow
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 25);
    grad.addColorStop(0, m.color + '66');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(x - 25, y - 25, 50, 50);

    // Point
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = m.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Altitude label
    ctx.font = '11px Courier New';
    ctx.fillStyle = m.color;
    ctx.textAlign = 'center';
    if (m.maxAlt === Infinity) {
      ctx.fillText('ESCAPE \u2192 \u221E', x, y - 18);
    } else {
      ctx.fillText(m.maxAlt.toLocaleString() + ' km', x, y - 18);
    }

    // Failure annotation
    if (m.failure) {
      ctx.font = '9px Courier New';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      // Wrap short failure text
      const shortFail = m.flightTime;
      ctx.fillText(shortFail, x, y + 22);
    } else {
      ctx.font = '10px Courier New';
      ctx.fillStyle = '#6bcb77';
      ctx.fillText('FIRST SUCCESS', x, y + 22);
      ctx.fillText('Heliocentric orbit', x, y + 36);
    }
    ctx.textAlign = 'left';
  }

  // Arrow showing escape for Pioneer 4
  if (visibleMissions >= 5) {
    const x = missionToX(4);
    const y = altToY(500000);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, margin.top + 10);
    ctx.strokeStyle = '#6bcb7766';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow head
    ctx.beginPath();
    ctx.moveTo(x - 6, margin.top + 16);
    ctx.lineTo(x, margin.top + 4);
    ctx.lineTo(x + 6, margin.top + 16);
    ctx.strokeStyle = '#6bcb77';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Title
  ctx.font = '14px Courier New';
  ctx.fillStyle = '#7ec8e3';
  ctx.textAlign = 'center';
  ctx.fillText('Maximum Altitude Reached (logarithmic scale)', W / 2, 25);
  ctx.textAlign = 'left';
}

function updateFailureStack() {
  const container = document.getElementById('failure-stack');
  container.innerHTML = '';

  for (let i = 0; i < missions.length; i++) {
    const m = missions[i];
    const row = document.createElement('div');
    row.className = `failure-row ${m.status}${i < visibleMissions ? ' visible' : ''}`;
    row.innerHTML = `
      <span class="mission-id">${m.id}</span>
      <span class="date">${m.date}</span>
      <span class="vehicle">${m.vehicle}</span>
      <span class="result">${m.failure || 'ALL STAGES NOMINAL — escape velocity achieved'}</span>
      <span class="alt">${m.maxAlt === Infinity ? '\u221E (escape)' : m.maxAlt.toLocaleString() + ' km'}</span>
    `;
    container.appendChild(row);
  }
}

// ========================================================================
// Controls
// ========================================================================
document.getElementById('btn-animate').addEventListener('click', function () {
  if (animating) return;
  visibleMissions = 0;
  animating = true;
  updateFailureStack();
  this.textContent = '\u23F8 Animating...';

  let step = 0;
  animTimer = setInterval(() => {
    step++;
    visibleMissions = step;
    drawChart();
    updateFailureStack();
    document.getElementById('status').textContent =
      step <= 5 ? missions[step - 1].id + ' — ' + missions[step - 1].date : '';

    if (step >= missions.length) {
      clearInterval(animTimer);
      animating = false;
      document.getElementById('btn-animate').textContent = '\u25B6 Animate Missions';
      document.getElementById('status').textContent = 'Pioneer 4: first successful escape — March 3, 1959';
    }
  }, 1500);
});

document.getElementById('btn-reset').addEventListener('click', function () {
  if (animTimer) clearInterval(animTimer);
  animating = false;
  visibleMissions = 0;
  document.getElementById('btn-animate').textContent = '\u25B6 Animate Missions';
  document.getElementById('status').textContent = '';
  drawChart();
  updateFailureStack();
});

// Click to reveal all
canvas.addEventListener('click', function () {
  if (!animating) {
    visibleMissions = missions.length;
    drawChart();
    updateFailureStack();
  }
});

// ========================================================================
// Init
// ========================================================================
visibleMissions = missions.length;
drawChart();
updateFailureStack();
</script>
</body>
</html>
