<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariner 1 Guidance Demo — The Missing Overbar</title>
<style>
  body { font-family: 'Courier New', monospace; background: #0a0e14; color: #c8d8e8; margin: 0; padding: 20px; }
  h1 { color: #cc4444; font-size: 1.4rem; margin-bottom: 0.5rem; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
  canvas { border: 1px solid #2a3a4a; border-radius: 4px; display: block; margin: 10px 0; }
  .controls { display: flex; gap: 20px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: #8ab; }
  .controls input[type=range] { width: 150px; }
  .controls button { background: #2a3a5a; color: #8ab; border: 1px solid #4a6a8a; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .controls button:hover { background: #3a4a6a; }
  .controls button.destruct { background: #5a1a1a; border-color: #cc4444; color: #cc4444; }
  .status { font-size: 0.9rem; margin: 10px 0; padding: 10px; border-radius: 4px; }
  .status.nominal { background: rgba(40,80,40,0.3); border: 1px solid #2a6a2a; }
  .status.warning { background: rgba(80,80,20,0.3); border: 1px solid #8a8a2a; }
  .status.destruct { background: rgba(80,20,20,0.3); border: 1px solid #cc4444; }
  .legend { display: flex; gap: 20px; font-size: 0.8rem; margin: 5px 0; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<h1>MARINER 1: The Missing Overbar</h1>
<p class="subtitle">Interactive guidance system simulation — toggle smoothing to see the effect</p>

<div class="controls">
  <label>Smoothing: <input type="checkbox" id="smoothing" checked> <span id="smoothLabel">ON (correct)</span></label>
  <label>Noise: <input type="range" id="noise" min="1" max="20" value="8"> <span id="noiseVal">8</span></label>
  <label>Gain: <input type="range" id="gain" min="1" max="10" value="4"> <span id="gainVal">0.4</span></label>
  <button onclick="restart()">Restart</button>
  <button class="destruct" id="destructBtn" onclick="destruct()">RANGE SAFETY DESTRUCT</button>
</div>

<div class="legend">
  <span><span class="dot" style="background:#4488ff"></span> Smoothed corrections</span>
  <span><span class="dot" style="background:#ff4444"></span> Raw corrections (no overbar)</span>
  <span><span class="dot" style="background:#ffaa00"></span> Destruct limit</span>
</div>

<canvas id="canvas" width="800" height="300"></canvas>
<div class="status nominal" id="status">T+0s — Vehicle nominal. Guidance tracking.</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let positions = [];
let time = 0;
let destroyed = false;
let destructTime = -1;
const DESTRUCT_LIMIT = 120;

function gauss() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function restart() {
  positions = [];
  time = 0;
  destroyed = false;
  destructTime = -1;
  statusEl.className = 'status nominal';
  statusEl.textContent = 'T+0s — Vehicle nominal. Guidance tracking.';
}

function destruct() {
  if (!destroyed) {
    destroyed = true;
    destructTime = time;
    statusEl.className = 'status destruct';
    statusEl.textContent = `T+${time}s — RANGE SAFETY DESTRUCT. Vehicle destroyed.`;
  }
}

function step() {
  if (destroyed) return;

  const noiseStd = parseFloat(document.getElementById('noise').value);
  const gain = parseFloat(document.getElementById('gain').value) / 10;
  const smoothing = document.getElementById('smoothing').checked;
  const window = 7;

  document.getElementById('noiseVal').textContent = noiseStd;
  document.getElementById('gainVal').textContent = gain.toFixed(1);
  document.getElementById('smoothLabel').textContent = smoothing ? 'ON (correct)' : 'OFF (Mariner 1!)';
  document.getElementById('smoothLabel').style.color = smoothing ? '#4a8a4a' : '#cc4444';

  const noise = gauss() * noiseStd;
  const lastPos = positions.length > 0 ? positions[positions.length - 1] : 0;

  let measurement, correction;
  if (smoothing && positions.length >= window) {
    const recent = positions.slice(-window);
    measurement = recent.reduce((a, b) => a + b, 0) / window + noise;
  } else {
    measurement = lastPos + noise;
  }

  correction = -gain * measurement;
  const newPos = lastPos + correction + gauss() * 0.5;
  positions.push(newPos);
  time++;

  if (Math.abs(newPos) > DESTRUCT_LIMIT) {
    destruct();
  }

  // Update status
  if (!destroyed) {
    const dev = Math.abs(newPos);
    if (dev < DESTRUCT_LIMIT * 0.5) {
      statusEl.className = 'status nominal';
      statusEl.textContent = `T+${time}s — Deviation: ${dev.toFixed(1)} km. Nominal.`;
    } else if (dev < DESTRUCT_LIMIT * 0.8) {
      statusEl.className = 'status warning';
      statusEl.textContent = `T+${time}s — Deviation: ${dev.toFixed(1)} km. WARNING: approaching limit.`;
    } else {
      statusEl.className = 'status warning';
      statusEl.textContent = `T+${time}s — Deviation: ${dev.toFixed(1)} km. CRITICAL: near destruct limit!`;
    }
  }
}

function draw() {
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const h = canvas.height;
  const w = canvas.width;
  const mid = h / 2;
  const scale = mid / (DESTRUCT_LIMIT * 1.2);

  // Destruct limits
  ctx.strokeStyle = '#ffaa00';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(0, mid - DESTRUCT_LIMIT * scale);
  ctx.lineTo(w, mid - DESTRUCT_LIMIT * scale);
  ctx.moveTo(0, mid + DESTRUCT_LIMIT * scale);
  ctx.lineTo(w, mid + DESTRUCT_LIMIT * scale);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center line
  ctx.strokeStyle = '#1a2a3a';
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();

  // Trajectory
  if (positions.length > 1) {
    const smoothing = document.getElementById('smoothing').checked;
    ctx.strokeStyle = smoothing ? '#4488ff' : '#ff4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const startIdx = Math.max(0, positions.length - w);
    for (let i = startIdx; i < positions.length; i++) {
      const x = ((i - startIdx) / (w - 1 || 1)) * w;
      const y = mid - positions[i] * scale;
      if (i === startIdx) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Destruct marker
    if (destroyed && destructTime >= startIdx) {
      const dx = ((destructTime - startIdx) / (w - 1 || 1)) * w;
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(dx, 0);
      ctx.lineTo(dx, h);
      ctx.stroke();
      ctx.fillStyle = '#ff4444';
      ctx.font = '14px monospace';
      ctx.fillText(`DESTRUCT T+${destructTime}s`, dx + 5, 20);
    }
  }

  // Labels
  ctx.fillStyle = '#ffaa00';
  ctx.font = '10px monospace';
  ctx.fillText(`+${DESTRUCT_LIMIT} km`, 5, mid - DESTRUCT_LIMIT * scale - 5);
  ctx.fillText(`-${DESTRUCT_LIMIT} km`, 5, mid + DESTRUCT_LIMIT * scale + 12);
}

function loop() {
  if (!destroyed) step();
  draw();
  requestAnimationFrame(loop);
}

restart();
loop();
</script>
</body>
</html>
