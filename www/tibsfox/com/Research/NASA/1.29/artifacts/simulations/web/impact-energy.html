<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranger 4 Impact Energy Calculator | v1.29</title>
<style>
  body { font-family: sans-serif; background: #0D1A0D; color: #E8E8E8; max-width: 600px; margin: 2rem auto; padding: 1rem; }
  h1 { font-size: 1.3rem; color: #FF8C00; border-bottom: 2px solid #CC6600; padding-bottom: 0.5rem; }
  label { display: block; margin: 0.8rem 0 0.3rem; color: #A8D8A8; font-size: 0.9rem; }
  input[type=range] { width: 100%; }
  .output { background: rgba(11,61,145,0.15); border: 1px solid rgba(11,61,145,0.3); border-radius: 6px; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 0.9rem; line-height: 1.6; }
  .highlight { color: #FF8C00; font-weight: bold; }
  .info { font-size: 0.8rem; color: #808080; margin-top: 1rem; }
</style>
</head>
<body>
<h1>Ranger 4 Impact Energy Calculator</h1>
<p>Adjust spacecraft mass and impact velocity to see the energy, TNT equivalent, and estimated crater size.</p>

<label>Spacecraft Mass: <span id="mass-display">331</span> kg</label>
<input type="range" id="mass" min="50" max="1000" value="331" oninput="calculate()">

<label>Impact Velocity: <span id="vel-display">2670</span> m/s</label>
<input type="range" id="velocity" min="500" max="5000" value="2670" oninput="calculate()">

<div class="output" id="results"></div>
<div class="info">
  Ranger 4 struck the far side of the Moon on April 26, 1962 at 12:49:53 UTC.<br>
  Impact coordinates: ~15.5°S, 130.7°W. No data returned. The crater persists.
</div>

<script>
function calculate() {
  const m = parseFloat(document.getElementById('mass').value);
  const v = parseFloat(document.getElementById('velocity').value);
  document.getElementById('mass-display').textContent = m;
  document.getElementById('vel-display').textContent = v;
  
  const E = 0.5 * m * v * v;
  const tnt = E / 4.184e6;
  const g_moon = 1.62;
  const rho = 1500;
  
  // Pi-group crater scaling (simplified)
  const D = 1.03 * Math.pow(m * v * v / (rho * g_moon), 1/3.22);
  
  const isRanger4 = (Math.abs(m - 331) < 10 && Math.abs(v - 2670) < 50);
  const marker = isRanger4 ? ' ← RANGER 4' : '';
  
  document.getElementById('results').innerHTML = 
    `<span class="highlight">Impact Energy:</span> ${E.toExponential(2)} J${marker}\n` +
    `<span class="highlight">TNT Equivalent:</span> ${tnt.toFixed(0)} kg (${(tnt/1000).toFixed(2)} tonnes)\n` +
    `<span class="highlight">Crater Diameter:</span> ~${D.toFixed(0)} m\n` +
    `<span class="highlight">Crater Depth:</span> ~${(D * 0.2).toFixed(0)} m (estimated)\n\n` +
    `At ${v} m/s, the ${m} kg spacecraft is destroyed in ~${(0.001).toFixed(3)}s.\n` +
    `The seismometer that was never deployed would have\n` +
    `detected this impact from the other side of the Moon.`;
}
calculate();
</script>
</body>
</html>
