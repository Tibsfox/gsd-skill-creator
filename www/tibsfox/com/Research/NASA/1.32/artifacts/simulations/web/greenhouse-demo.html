<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venus Greenhouse Effect — Interactive Demo</title>
<style>
  body { margin: 0; background: #000; color: #eee; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  canvas { border: 1px solid #333; margin: 1rem; }
  .controls { display: flex; gap: 2rem; align-items: center; margin: 1rem; }
  label { font-size: 13px; }
  input[type=range] { width: 200px; }
  .value { color: #FFD700; font-weight: bold; }
  h2 { color: #A8D8A8; margin-bottom: 0.5rem; }
  .note { font-size: 11px; color: #666; max-width: 600px; text-align: center; margin-top: 1rem; }
</style>
</head>
<body>
<h2>Venus Greenhouse Effect</h2>
<p>Adjust CO₂ to see how atmospheric opacity traps heat</p>
<canvas id="c" width="600" height="400"></canvas>
<div class="controls">
  <label>CO₂ Level: <span id="co2val" class="value">96.5%</span></label>
  <input type="range" id="co2" min="0" max="100" value="96" step="1">
  <label>Surface T: <span id="tempval" class="value">460°C</span></label>
</div>
<p class="note">
  At 0% CO₂: surface temp ≈ -46°C (equilibrium with no greenhouse).<br>
  At 96.5% CO₂ (Venus): surface temp ≈ 460°C (Mariner 2 measurement).<br>
  Earth is at 0.042% CO₂ with +33°C of greenhouse warming.
</p>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const co2Slider = document.getElementById('co2');
const co2Val = document.getElementById('co2val');
const tempVal = document.getElementById('tempval');

function lerp(a, b, t) { return a + (b - a) * t; }

function draw() {
  const co2 = parseFloat(co2Slider.value) / 100;
  const T_eq = 227; // K, no greenhouse
  const T_venus = 733; // K, full Venus greenhouse
  const T_surface = lerp(T_eq, T_venus, Math.pow(co2, 0.3));
  const T_celsius = T_surface - 273;

  co2Val.textContent = (co2 * 100).toFixed(1) + '%';
  tempVal.textContent = Math.round(T_celsius) + '°C';

  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);

  // Space
  ctx.fillStyle = '#000020';
  ctx.fillRect(0, 0, W, 80);

  // Cloud deck
  const cloudY = 80;
  const cloudH = 40;
  ctx.fillStyle = `rgba(232, 216, 160, ${0.3 + co2 * 0.5})`;
  ctx.fillRect(0, cloudY, W, cloudH);

  // Atmosphere (CO2 layers)
  const atmTop = cloudY + cloudH;
  const atmBot = H - 60;
  const opacity = co2 * 0.6;
  for (let y = atmTop; y < atmBot; y += 10) {
    const frac = (y - atmTop) / (atmBot - atmTop);
    ctx.fillStyle = `rgba(180, 120, 40, ${opacity * frac * 0.3})`;
    ctx.fillRect(0, y, W, 10);
  }

  // Surface
  const surfaceGlow = Math.min(1, (T_surface - 227) / 506);
  ctx.fillStyle = `rgb(${Math.round(50 + 200 * surfaceGlow)}, ${Math.round(20 + 30 * surfaceGlow)}, 0)`;
  ctx.fillRect(0, atmBot, W, H - atmBot);

  // Solar arrows (coming down — yellow)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  for (let x = 80; x < W; x += 120) {
    ctx.beginPath();
    ctx.moveTo(x, 10);
    ctx.lineTo(x, cloudY);
    ctx.stroke();
    // Arrow head
    ctx.beginPath();
    ctx.moveTo(x - 5, cloudY - 10);
    ctx.lineTo(x, cloudY);
    ctx.lineTo(x + 5, cloudY - 10);
    ctx.stroke();

    // Some get through clouds
    if (x % 240 === 80) {
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
      ctx.beginPath();
      ctx.moveTo(x, cloudY + cloudH);
      ctx.lineTo(x, atmBot);
      ctx.stroke();
      ctx.strokeStyle = '#FFD700';
    }
  }

  // IR arrows (going up — red, but blocked by CO2)
  ctx.strokeStyle = '#CC3300';
  for (let x = 120; x < W; x += 120) {
    ctx.beginPath();
    ctx.moveTo(x, atmBot);
    const blockHeight = atmBot - (atmBot - atmTop) * (1 - co2 * 0.8);
    ctx.lineTo(x, blockHeight);
    ctx.stroke();
    // Arrow head
    ctx.beginPath();
    ctx.moveTo(x - 5, blockHeight + 10);
    ctx.lineTo(x, blockHeight);
    ctx.lineTo(x + 5, blockHeight + 10);
    ctx.stroke();

    // Re-emission downward (trapped)
    if (co2 > 0.1) {
      ctx.strokeStyle = 'rgba(204, 51, 0, 0.3)';
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(x + 15, blockHeight + 20);
      ctx.lineTo(x + 15, atmBot);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = '#CC3300';
    }
  }

  // Labels
  ctx.fillStyle = '#E8E8E8';
  ctx.font = '12px monospace';
  ctx.fillText('SPACE', 10, 30);
  ctx.fillText('CLOUDS', 10, cloudY + 25);
  ctx.fillText(`CO₂ ATMOSPHERE (${(co2*100).toFixed(0)}%)`, 10, (atmTop + atmBot) / 2);
  ctx.fillText(`SURFACE: ${Math.round(T_celsius)}°C`, 10, atmBot + 30);

  ctx.fillStyle = '#FFD700';
  ctx.fillText('☀ Solar (visible — passes through)', W - 280, 30);
  ctx.fillStyle = '#CC3300';
  ctx.fillText('↑ IR (thermal — BLOCKED by CO₂)', W - 280, 50);

  // Mariner 2 reference
  if (co2 > 0.9) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('MARINER 2 CONFIRMED: 460°C', W/2 - 140, atmBot + 50);
    ctx.font = '11px monospace';
    ctx.fillText('December 14, 1962', W/2 - 70, atmBot + 50 + 16);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
