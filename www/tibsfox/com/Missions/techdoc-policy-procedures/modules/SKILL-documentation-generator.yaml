name: documentation-generator
description: >
  Generate policy, procedure, and SOP documents following the Technical
  Documentation P&P mission standards. Enforces M1 taxonomy, M4 compliance
  mapping, M5 AI guardrails, and M6 governance model requirements.
version: "1.0"
type: skill
activation:
  triggers:
    - "generate policy"
    - "generate procedure"
    - "generate SOP"
    - "create policy document"
    - "create procedure document"
    - "create SOP document"
    - "documentation generator"
    - "techdoc generate"
  context_patterns:
    - "writing a policy for"
    - "need a procedure for"
    - "create an SOP for"
    - "document the process for"
    - "draft a policy"
    - "draft a procedure"
inputs:
  document_type:
    type: enum
    values: [policy, procedure, sop]
    required: true
    description: "Type of document to generate (determines template, voice, and approval requirements)"
  title:
    type: string
    required: true
    description: "Document title (title case, under 80 characters)"
  domain:
    type: string
    required: true
    description: "Domain abbreviation (SEC, OPS, IT, ENG, PLT)"
  owner_role:
    type: string
    required: true
    description: "Owner role title (not a person name)"
  scope:
    type: string
    required: true
    description: "Explicit scope statement (what is in scope, what is excluded)"
  purpose:
    type: string
    required: true
    description: "One-sentence purpose statement"
  audience:
    type: array
    items: enum
    values: [senior_engineer, new_hire, compliance_auditor, operations_staff, product_manager]
    required: true
    description: "Target audience personas from the mission schema"
  framework_refs:
    type: array
    items: string
    required: false
    description: "Applicable framework references (e.g., nist-800-53 AC-1, iso-27001 A.5.15)"
  criticality:
    type: enum
    values: [critical, standard, reference]
    required: false
    default: standard
    description: "Document criticality classification (determines review cadence per M6)"
  ai_generation:
    type: boolean
    required: false
    default: false
    description: "Whether AI is generating the first draft (triggers additional labeling and review requirements per M5)"
outputs:
  document:
    type: file
    format: markdown
    description: "Complete document with frontmatter, all required sections, and compliance metadata"
validation_rules:
  - rule: "Document ID follows pattern: {TYPE_PREFIX}-{DOMAIN}-NNNN"
    type_prefixes:
      policy: POL
      procedure: PRC
      sop: SOP
  - rule: "Title is title case and under 80 characters"
  - rule: "Owner is a role title, not a person name"
  - rule: "All required template sections are present and non-empty"
  - rule: "Voice matches document type: third person for policy, second person for procedure/SOP"
  - rule: "Policy documents use 'must' or 'shall', never 'should' for obligations"
  - rule: "Procedure steps are numbered, one action per step, with expected results at decision points"
  - rule: "SOP includes Quality Checks and Records sections"
  - rule: "Safety rules SC-01 through SC-04 are satisfied"
  - rule: "If ai_generation is true, [PENDING REVIEW] label is applied per M5"
  - rule: "framework_refs entries match valid identifiers from the mission source_index"
  - rule: "review_cadence is set per M6 Section 5.1 based on document_type and criticality"
