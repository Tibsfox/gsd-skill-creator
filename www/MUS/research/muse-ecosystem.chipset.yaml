session_lifecycle:
  states:
  - DORMANT
  - INITIALIZING
  - ACTIVE
  - BOUNDARY_APPROACHED
  - WINDING_DOWN
  - BOUNDARY
  - HANDOFF
  state_transitions:
  - from: DORMANT
    to: INITIALIZING
    event: SessionStart
    recorder: session-start.ts
  - from: INITIALIZING
    to: ACTIVE
    event: session-cache-write
    recorder: session-observer.ts
  - from: ACTIVE
    to: BOUNDARY_APPROACHED
    event: cadence-shift-or-duration-signal
    detector: owl
  - from: BOUNDARY_APPROACHED
    to: WINDING_DOWN
    event: no-new-major-tasks
    detector: owl+hawk
  - from: WINDING_DOWN
    to: BOUNDARY
    event: SessionEnd
    recorder: session-end.ts
  - from: BOUNDARY
    to: HANDOFF
    event: Cedar-prev_hash-recorded
    recorder: event-store.ts
  - from: HANDOFF
    to: DORMANT
    event: next-session-not-yet-started
    persister: drift-monitor
  temporal_marker_schema: SessionBoundaryMarker { session_id, wave, session_number, pass, wall_clock_start, wall_clock_end,
    duration_minutes, epoch, prev_hash, own_hash, cadence, momentum_phase, completed[], deferred[], open_questions[], next_session_context,
    muse_states[], sync_points[] }
  marker_storage: 'Cedar EventStore.emit() into events.jsonl chain (category: events, type: session_boundary)'
  source: 06-session-boundary-map.md Parts 1-2
  wave_gates:
  - id: gate-0-1
    status: passed
    passed_at: '2026-03-08'
    opens_when: identity-map.md, function-binding.md, cross-validation.md all present and non-empty
    verification:
    - 01-identity-map.md present, non-empty, 6 groves, 7 trails
    - 02-function-binding.md present, >= 400 module cluster entries, disambiguation protocol
    - 03-cross-validation.md present, coherence > 90%, fatal contradictions = 0
    - all three mutually consistent
    - 'Cedar attestation: prev_hash chain from session 3 boundary marker'
    cedar_attestation: S3 session boundary marker prev_hash
    source: 09-verification-standards.md Part 4 Gate 0-1
  - id: gate-1-2
