    - '04-helper-teams.md: exactly 8 teams'
    - '05-cartridge-forest.md: exactly 15 cartridges'
    - '06-session-boundary-map.md: all 4 wave gates have initial structure'
    - '07-message-integration.md: present and non-empty'
    - T-01 through T-24 all passing (MUS-V1 through MUS-V6)
    lex_checks:
    - MuseId type mismatch blocker resolved (6/9 originally mismatched)
    - 5 UNRESOLVED items from S2 all resolved (T-07)
    - inter-team cycle detection run (T-19) and clean
    - dependency graph Kahn's run (T-16) and clean
