# muse-ecosystem.chipset.yaml
# MUS Muse Ecosystem Integration Chipset
# Version: 1.0.0
#
# Master chipset specification for the nine-muse gsd-skill-creator ecosystem.
# Derived from Waves 0-2 of the MUS Muse Ecosystem Integration mission.
# Every field is traceable to a specific research document.
#
# Source documents (pipeline order):
#   01-identity-map.md      - Wave 0 S1: Foxy  - six groves, seven trails
#   02-function-binding.md  - Wave 0 S2: Lex   - 538 module clusters, 1333 TypeScript files
#   03-cross-validation.md  - Wave 0 S3: Cedar - chain linking, Growth Rings prototype
#   04-helper-teams.md      - Wave 1 S4: Hawk  - 8 teams, 40 templates, 3-layer network
#   05-cartridge-forest.md  - Wave 1 S5: Sam   - 15 cartridges with hypotheses
#   06-session-boundary-map.md - Wave 1 S6: Owl   - lifecycle, temporal markers, wave gates
#   07-message-integration.md  - Wave 2 S7: Willow - 14 MessageTypes, greeting, routing
#   08-gpu-promotion-loop.md   - Wave 2 S8: Raven  - PromotionSource, GPU pipeline, B-6 fix
#   09-verification-standards.md - Wave 2 S9: Hemlock - 32 tests, 10 SC, wave gates
#
# Pipeline position: Wave 3, Session 10 - Chipset YAML (final deliverable)
# Branch: wasteland/skill-creator-integration
# Date: 2026-03-08
# Author: Lex (execution disciplinarian, theta=5deg, r=0.9)

chipset:
  name: muse-ecosystem
  version: 1.0.0
  archetype: agent-ecosystem
  description: 'Nine-muse adaptive learning layer for gsd-skill-creator. Encodes the complete Agent Identity Map (six groves,
    seven trails), Function Binding Table (538 module clusters across 1,333 TypeScript files), eight helper teams (three-layer
    network), fifteen cartridges with hypotheses, GPU promotion pipeline with PromotionSource interface, message integration
    (14 MessageTypes, greeting protocol, routing), session boundary lifecycle (seven states, temporal markers, wave gates),
    and 32 verification tests (6 safety-critical). Source: 01-identity-map.md through 09-verification-standards.md.'
  math_coprocessor:
    enabled: true
    role: deep-root
    description: 'The Math Co-Processor is the Deep Root system — invisible infrastructure sitting beneath all six groves.
      Measurable by the quality of outputs that depend on it. Source: 01-identity-map.md.'
    gpu: rtx-4060-ti
    vram_budget_mb: 8000
    chips:
    - fourier
    - gemm
    - symbex
    fourier_integration:
      target_module: src/platform/observation/drift-monitor.ts
      owner: raven
      mode: enhanced
      min_window_size: 20
      low_frequency_threshold: 5
      fallback: consecutive_counter
      source: 08-gpu-promotion-loop.md Part 7
