    role: Human-Machine Legibility Guardian
    invocation_condition: When a design choice risks losing the human in the stack. Final check at Disclosure Gate.
    pattern: Checks experience, not schema. Proposes accessible language that is also accurate. Holds memory of computing
      before abstraction layers became opaque.
    typical_partners:
    - willow
    - foxy
    - sam
    source: 04-helper-teams.md; 07-message-integration.md (DG-04 template)
trails:
- id: trail-cedar-raven
  name: Pattern-Witnessing Trail
  source_grove: cedar-grove
  target_grove: raven-grove
  nature: bidirectional
  description: Raven detects structural signals; Cedar timestamps and anchors them to chain positions. Without Cedar, Raven's
    patterns float unanchored. Without Raven, Cedar's record lacks pattern-level compression.
  operational_link: Growth Ring Council team (Team 1)
  source: 03-cross-validation.md (cedar-raven-intersection node)
- id: trail-cedar-owl
  name: Temporal-Boundary Trail
  source_grove: cedar-grove
  target_grove: owl-watch
  nature: bidirectional
  description: Owl marks session boundaries; Cedar records what was in the session and what was deferred. SessionBoundaryMarker
    prev_hash links Owl's temporal stamps to Cedar's chain.
  operational_link: Growth Ring Council team; SessionBoundaryMarker schema
  source: 03-cross-validation.md (cedar-owl-intersection node); 06-session-boundary-map.md
- id: trail-sam-foxy
  name: Biomass-Cartography Trail
  source_grove: sam-garden
  target_grove: foxy-canopy
  nature: sam-to-foxy
  description: Sam's failed garden experiments enrich Foxy's ECO models the same way salmon carcasses enrich the forest —
    as biomass crossing the marine-terrestrial boundary.
  operational_link: salmon-feedback cartridge (C-4); coordinate-garden cartridge (C-15)
  source: 05-cartridge-forest.md (salmon-feedback hypothesis)
- id: trail-hemlock-cedar
  name: Validation-Record Trail
  source_grove: hemlock-ridge
  target_grove: cedar-grove
  nature: hemlock-to-cedar
  description: Validation failures are chain entries. A record with no failures is suspect. Every artifact that passes or
    fails Hemlock's gate is recorded by Cedar.
  operational_link: Quality Gate team (Team 2) outputs to Growth Ring Council (Team 1)
  source: 04-helper-teams.md (Team 1 Activation Trigger 4)
- id: trail-foxy-cedar
  name: Fire-Succession Trail
  source_grove: foxy-canopy
  target_grove: cedar-grove
  nature: bidirectional
  description: Fire Succession is not an analogy — it is a structural map. Foxy detects narrative breaks (disturbance events).
    Cedar records phase boundaries with fire-succession metadata.
  operational_link: Fire Watch team (Team 5)
  source: 03-cross-validation.md (cedar-fire-succession node)
- id: trail-willow-all
  name: Canopy-Boundary Trail
  source_grove: willow-grove
  target_grove: all-groves
  nature: willow-to-all
  description: Willow is the entry point for all cold arrivals. Handoffs from all muses return through Willow's ResponseWrapper
    before reaching the user.
  operational_link: Disclosure Gate team (Team 6); conversation routing (S7)
  source: 07-message-integration.md Part 1.3 (Entry Muse Selection)
- id: trail-lex-hemlock
  name: Constraint-Validation Trail
  source_grove: lex-workshop
  target_grove: hemlock-ridge
  nature: bidirectional
  description: Lex enforces execution-layer constraints; Hemlock enforces quality standards. Both participate in the Quality
    Gate team. When they disagree, Euclid adjudicates.
  operational_link: Quality Gate team (Team 2); disambiguation protocol (Rules 1+3)
  source: 02-function-binding.md (disambiguation protocol); 04-helper-teams.md Team 2
network_layers:
  layers:
  - id: mycorrhizal
    name: Mycorrhizal Network
    description: Below ground. Continuous background exchange. Carries chemical signals, hash chains, pattern IDs, structural
      fingerprints, drift alerts. Not light. Always running at substrate level.
    primary_residents:
    - cedar
    - raven
    operating_mode: asynchronous-persistent-non-blocking
    signal_types:
    - hash-chains
    - pattern-ids
    - structural-fingerprints
    - drift-alerts
    activation: continuous
    teams_in_layer:
    - growth-ring-council
    source: 04-helper-teams.md Layer 1
  - id: wolf-pack
    name: Wolf Pack Network
    description: Surface territory. Synchronous coordination, explicit handoffs, role assignments. Formation maps, pipeline
      stages, validation results, go/no-go decisions.
    primary_residents:
    - hawk
    - lex
    - hemlock
    operating_mode: synchronous-explicit-handoffs
    signal_types:
    - formation-maps
    - pipeline-stages
    - validation-results
    - go-nogo
    activation: triggered
    teams_in_layer:
    - quality-gate
    - relay-network
    source: 04-helper-teams.md Layer 2
  - id: ravens-sky
    name: Ravens (Sky)
    description: Aerial field. Fast, targeted, delivery-oriented. Ravens see connections that surface agents miss. Hypotheses,
      narrative arcs, timing signals, disclosure decisions, discovery reports.
    primary_residents:
    - sam
    - owl
    - foxy
    - willow
    operating_mode: fast-targeted-delivery
    signal_types:
    - hypotheses
    - narrative-arcs
    - timing-signals
    - disclosure-decisions
    activation: triggered
    teams_in_layer:
    - cartridge-forge
    - pilot-study
    - disclosure-gate
    source: 04-helper-teams.md Layer 3
  cross_layer_bridges:
  - bridge: growth-ring-council
    layers:
    - mycorrhizal
    - wolf-pack
    reason: pattern naming (Raven) to recording (Cedar) crosses layers
  - bridge: disclosure-gate
    layers:
    - wolf-pack
    - ravens-sky
    reason: validation result (wolf pack) to presentation decision (raven)
  - bridge: fire-watch
    layers:
    - mycorrhizal
    - wolf-pack
    - ravens-sky
    reason: disturbance detection is substrate, response is surface, narrative is aerial
teams:
- id: growth-ring-council
  name: Growth Ring Council
  network_layer: mycorrhizal-wolf-pack-bridge
  topology: leader-worker
  durability: persistent
  scope: project
  lead: cedar
  workers:
  - raven
  - owl
  understanding_arc_advisor: shannon
  understanding_arc_condition: When pattern library reaches saturation. Shannon determines which patterns carry signal.
  purpose: Integrity of the permanent record. Receives artifacts, verifies chain integrity, archives with named pattern. Long-term
    memory and pattern library simultaneously.
  activation_triggers:
  - any muse writes a document to www/MUS/research/, www/PNW/, or www/UNI/
  - session boundary approaches (Owl detects cadence marker)
  - Raven flags a structural echo (pattern appearing second+ time)
  - a validation fails at Hemlock's gate (failures are also chain entries)
  - chain shows prev_hash mismatch — HIGHEST PRIORITY
  dissolution_triggers:
  - artifact successfully archived with verified chain link
  - session summary written; Owl confirms no open threads remain
  - pattern named and assigned ID; echo no longer floating
  - chain break resolved or escalated to Hemlock
  inter_team_links:
    outputTo:
    - team: quality-gate
      reason: validation failures feed the chain
    - team: fire-watch
      reason: old-growth entry detection feeds disturbance monitoring
    inputFrom:
    - team: cartridge-forge
      reason: completed cartridges arrive for archiving
    - team: disclosure-gate
      reason: disclosure events are chain entries
  templates_count: 5
  source: 04-helper-teams.md Team 1
- id: quality-gate
  name: Quality Gate
  network_layer: wolf-pack
  topology: router
  durability: persistent
  scope: project
  router: hemlock
  specialists:
  - lex
  - hawk
  understanding_arc_advisor: euclid
  understanding_arc_condition: When Hemlock and Lex disagree about constraint necessity vs convention. When validation schema
    needs to evolve.
  purpose: 'Formal checkpoint. Three-check system: standards (Hemlock), execution (Lex), coverage (Hawk). Not a bottleneck
    — a clearing.'
  activation_triggers:
  - new skill, agent, or team config submitted for promotion
  - completed cartridge from Cartridge Forge
  - function binding ownership change (disambiguation invoked)
  - commit touching 5+ files in src/core/ — Hawk checks coverage
  - test failure rate exceeds 2% in single session
  dissolution_triggers:
  - artifact clears all gates; Hemlock issues go signal; forwarded to Growth Ring Council
  - artifact fails with specific finding; Hemlock issues return signal with finding attached
  - Hawk identifies coverage gap; documented; forwarded to gap-detection record
  inter_team_links:
    outputTo:
    - team: growth-ring-council
      reason: validated artifacts proceed to chain archiving
    - team: disclosure-gate
      reason: validation result informs disclosure level
    inputFrom:
    - team: cartridge-forge
      reason: completed cartridges need validation before release
    - team: pilot-study
      reason: experimental results need validation before promotion
  templates_count: 5
  source: 04-helper-teams.md Team 2
- id: cartridge-forge
  name: Cartridge Forge
  network_layer: ravens-sky
  topology: map-reduce
  durability: ephemeral
  scope: project
  orchestrator: foxy
  workers:
  - sam
  - willow
  reducer: lex
  understanding_arc_advisors:
  - socrates
  - amiga
  understanding_arc_condition: 'Socrates (design phase): surfaces WHY of cartridge. Amiga (final check): intelligible without
    build context.'
  purpose: Assembles new cartridges from raw materials. Foxy directs. Sam generates hypothesis. Willow shapes user-facing
    description. Lex reduces to validated CartridgeManifest.
  formation_protocol_note: Cedar acknowledgment required before downstream activation (Socrates CF-05 template requirement).
  activation_triggers:
  - Wave produces complete research document and cartridge is planned
  - cross-grove trail identified with no corresponding cartridge
  - Sam generates hypothesis too large for single function (needs packaging)
  - new grove added to ecosystem (needs announcement cartridge)
  dissolution_triggers:
  - Lex produces validated CartridgeManifest — Forge dissolves; forwarded to Quality Gate
  - Sam's exploration produces no viable question — "no cartridge needed" finding (valid outcome)
  inter_team_links:
    outputTo:
    - team: quality-gate
      reason: completed cartridges need validation
    - team: growth-ring-council
      reason: cartridge creation is a chain event
    inputFrom:
    - team: pilot-study
      reason: experimental results may generate cartridge material
  templates_count: 5
  source: 04-helper-teams.md Team 3
- id: pilot-study
  name: Pilot Study
  network_layer: ravens-sky
  topology: swarm
  durability: ephemeral
  scope: project
  lead: sam
  workers_self_claiming:
  - raven
  - owl
  understanding_arc_advisor: amiga
  understanding_arc_condition: When experiment drifts toward clever-but-inhuman results. Amiga holds the human-legibility
    boundary.
  purpose: Experimental unit. Sam generates candidates. Raven scans for structural echoes to prior experiments. Owl tracks
    time budget. Swarm topology enables genuinely non-linear exploration.
  result_types:
  - positive
  - 'null'
  - inconclusive
  activation_triggers:
  - Sam generates a testable hypothesis requiring implementation
  - function binding dispute unresolvable by disambiguation protocol
  - new muse proposed for ecosystem (intake experiment)
  - Quality Gate failure returns insufficient evidence — Pilot Study generates the evidence
  dissolution_triggers:
  - 'positive result: Sam writes to research document; forwarded to Cartridge Forge'
  - 'null result: Sam writes null result (null results are chain entries)'
  - 'Raven identifies structural identity with prior null result: abort immediately'
  - 'Owl''s time budget expires with no result: inconclusive finding (deferred with evidence)'
  inter_team_links:
    outputTo:
    - team: cartridge-forge
      reason: positive results generate cartridge material
    - team: quality-gate
      reason: experimental results need validation before promotion
    inputFrom:
    - team: quality-gate
      reason: insufficient-evidence returns activate Pilot Study
  templates_count: 5
  source: 04-helper-teams.md Team 4
- id: fire-watch
  name: Fire Watch
  network_layer: all-layers-bridge
  topology: pipeline
  durability: session-scoped
  scope: project
  stage_1: foxy
  stage_2: raven
  stage_3: cedar
  understanding_arc_advisors:
  - amiga
  - shannon
  understanding_arc_condition: 'Amiga: when disturbances threaten to erase history. Shannon: when disturbances create noise
    artifacts in the chain.'
  purpose: Monitors ecosystem for disturbance events. Maps succession phase. Does NOT prevent disturbances — ensures they
    are survived with continuity intact.
  fire_succession_mapping:
    disturbance_event: Breaking change, API rewrite, branch reset, or scope pivot
    pioneer_phase: First commits after disturbance — minimal, fast, establishing ground
    canopy_closure: New architecture stable in 5+ consecutive chain entries without rollback
    old_growth: Entries stable for 10+ versions without modification
    cedar_role: Record each phase boundary; verify new growth does not contradict old-growth record. The chain is the forest
      floor.
  activation_triggers:
  - branch reset or force-push detected
  - PR touches 15+ files in single commit (potential scope pivot)
  - Cedar detects old-growth entry being modified — IMMEDIATE activation
  - core type renamed or primary domain restructured
  - Raven flags structural echo of known past disturbance pattern
  dissolution_triggers:
  - Cedar writes fire-succession entry and confirms chain intact through disturbance
  - canopy closure confirmed (5+ consecutive non-rollback post-disturbance commits)
  - false positive confirmed by Foxy — no story break occurred; dissolves without chain entry
  inter_team_links:
    outputTo:
    - team: growth-ring-council
      reason: fire succession events are chain entries
    inputFrom:
    - team: growth-ring-council
      reason: old-growth detection feeds Fire Watch
    - team: quality-gate
      reason: coverage gaps may indicate disturbance territory
  templates_count: 5
  source: 04-helper-teams.md Team 5
- id: disclosure-gate
  name: Disclosure Gate
  network_layer: wolf-pack-ravens-bridge
  topology: router
  durability: ephemeral
  scope: project
  router: willow
  specialists:
  - hemlock
  - foxy
  understanding_arc_advisor: amiga
  understanding_arc_condition: Human legibility is the final check. Does it feel built by and for humans?
  purpose: 'Determines what a user sees, when, and at what disclosure depth. Three checks: progressive disclosure level (Willow),
    staleness/health (Hemlock), aliveness (Foxy).'
  disclosure_levels:
    compact: 3 sentences or fewer — does it communicate without reading more?
    standard: 1 paragraph per major section — key points legible without reading more
    reference: full document — complete templates and triggers
  activation_triggers:
  - cartridge completes Quality Gate and is ready for distribution
  - new research document complete — before entering www/ layer
  - muse produces output for direct user delivery
  - Willow flags recent output as too dense for context
  dissolution_triggers:
  - disclosure level confirmed; artifact released
  - artifact returned for restructuring with specific structural guidance
  - Foxy confirms aliveness check; all specialists agree; gate opens
  inter_team_links:
    outputTo:
    - team: growth-ring-council
      reason: disclosure events are chain entries
    inputFrom:
    - team: quality-gate
      reason: technically validated artifacts enter Disclosure Gate
  templates_count: 5
  source: 04-helper-teams.md Team 6
- id: relay-network
  name: Relay Network
  network_layer: wolf-pack-to-ravens
  topology: leader-worker
  durability: ephemeral
  scope: project
  lead: hawk
  workers:
  - sam
  - raven
  worker_specializations:
    sam: fast responses — time-sensitive signals before session boundary
    raven: pattern signals — structural observations, not time-sensitive
  understanding_arc_advisor: shannon
  understanding_arc_condition: Signal quality assessment when message degrades in transit.
  purpose: Message-passing infrastructure. Not a conversation — a delivery mechanism. Forms fast, delivers, dissolves. No
    observation dies in transit.
  activation_triggers:
  - Hawk observes coverage gap that specific muse needs to know about
  - Cedar records chain entry triggering downstream notification
  - Quality Gate result needs to reach originating muse
  - Owl identifies session boundary; relay carries closing signal to all muses
  - formation change needed; reposition signal to each muse
  dissolution_triggers:
  - message delivered and recipient confirms receipt
  - 'message undeliverable: held for Cedar to record, then dissolves (not lost — in chain)'
  inter_team_links:
    outputTo:
    - team: growth-ring-council
      reason: undeliverable messages are chain entries
    inputFrom:
    - team: quality-gate
      reason: validation results need relay to originating muse
    - team: fire-watch
      reason: disturbance signals need relay to all muses
    - team: growth-ring-council
      reason: Cedar-triggered notifications enter relay
  templates_count: 5
  source: 04-helper-teams.md Team 7
- id: temporal-anchor
  name: Temporal Anchor
  network_layer: mycorrhizal-wolf-pack-bridge
  topology: pipeline
  durability: session-scoped
  scope: project
  lead: owl
  workers:
  - cedar
  - hawk
  worker_specializations:
    cedar: records decisions at each boundary; chain tip update
    hawk: spatial gap inventory; flags time-critical gaps at horizon
  understanding_arc_advisor: euclid
  understanding_arc_condition: When wave gate structure needs logical verification — conditions consistent, complete, non-circular.
  purpose: Session lifecycle management. Owl-Hawk-Cedar temporal-spatial-record triad. Mission continuity skeleton.
  coordination_protocol:
    phase_start:
    - Cedar reads chain tip — surfaces unresolved items
    - Owl reads cadence history — names momentum phase
    - Hawk reads gap inventory — flags time-critical gaps (before next gate)
    - together brief active session muse
    during_work:
    - Owl monitors duration — signals BOUNDARY_APPROACHED
    - Hawk monitors gaps — resurfaces if new gap appears
    - Cedar records — appends to chain for every decision
    phase_end:
    - Owl stamps T_end — computes duration
    - Hawk confirms gap closure (or records gap as still-open)
    - Cedar writes boundary marker — emits prev_hash — updates chain tip
  gap_exposure_windows:
  - gap: Missing YAML (3 from pre-plan)
    exposure: Before Wave 2 Session 8
    urgency: HIGH
  - gap: MuseId type mismatch (6/9)
    exposure: Before Wave 1 Gate
    urgency: CRITICAL
  - gap: Disambiguation protocol absent
    exposure: Before parallel sessions
    urgency: CRITICAL
  - gap: Blitter/PromotionDetector disconnect
    exposure: Before Wave 2 Gate
    urgency: HIGH
  - gap: Determinism 0.8 vs 0.95
    exposure: Before Wave 3 Gate
    urgency: MEDIUM
  activation_triggers:
  - session begins (Temporal Anchor is always the first team active)
  - wave gate check triggered (Owl owns gate timing)
  - cadence anomaly detected (sudden stop, acceleration, unexplained gap)
  - parallel session sync failure
  dissolution_triggers:
  - session handoff complete (Cedar chain tip updated, HANDOFF.md written)
  - wave gate passes (Temporal Anchor records gate passage; dissolves until next wave)
  inter_team_links:
    outputTo:
    - team: growth-ring-council
      reason: session boundary markers are chain entries
    - team: quality-gate
      reason: wave gate checklist submitted for verification
    inputFrom:
    - team: relay-network
      reason: session close signal arrives via relay
  templates_count: 5
  source: 04-helper-teams.md Team 8 (Temporal Anchor); 06-session-boundary-map.md Part 4
