      parallel sessions receive same sync_baseline. If any session''s baseline differs at close: SYNC FAILURE -> halt, re-read,
      retry.'
    merge_marker: After all parallel sessions complete, Cedar produces merge_marker whose prev_hash is the last completed
      parallel session's hash.
    source: 06-session-boundary-map.md Part 3 (Parallel Session Sync Protocol)
promotion_pipeline:
  description: 'Full promotion loop from observation substrate through quality gate to kernel execution and Centercamp return.
    Resolves B-6 blocker: Blitter.Promoter (static declarations) and PromotionDetector (empirical observations) were disconnected
    pipelines. PromotionSource interface is the convergence point.'
  promotion_source_interface:
    fields:
      operationId: string — stable deterministic key for DriftMonitor tracking
      toolName: 'string — Blitter side: scriptType; Observation side: toolName'
      source: declaration | observation | converged
      determinism: number or null — null for declaration-only candidates
      compositeScore: number or null — null for declaration-only candidates
      observationCount: number — 0 for declarations before any observations
      script: string or null — declared script or ScriptGenerator output
      skillName: string or null — null for observation-only candidates
      identifiedAt: string — ISO 8601
      cedarHash: string or null — chain position at identification
    convergence_algorithm:
      step_1: collect declaration candidates from Blitter.Promoter
      step_2: collect observation candidates from PromotionDetector
      step_3: match by toolName (normalized) + script content hash
      step_4: matched pairs become source='converged' (observation data preferred)
      step_5: pass all sources to PromotionGatekeeper
      step_6: 'approved: Kernel Promotion; rejected: Cedar audit trail, re-evaluation queue'
    source: 08-gpu-promotion-loop.md Part 3
  gate_thresholds:
    G1:
      name: Determinism
      default: 0.8
      mus_target: 0.95
      delta: +0.15 — Session 10 responsible
      blocking: true
    G2:
      name: Composite Score
      default: 0.85
      mus_target: 0.85
      formula: (0.4 * determinism) + (0.35 * frequencyNorm) + (0.25 * tokenSavingsNorm)
      blocking: true
    G3:
      name: Observation Count
      default: 5
      mus_target: 5
      rationale: 5 observations minimum for non-noisy determinism ratio
      blocking: true
    G35:
      name: Script Match
      applies_to: converged candidates only
      blocking: false
    G_DECL:
      name: Empirical Required
      applies_to: declaration-only candidates
      blocking: true
      rationale: declarations enter 'pending validation' queue — not promoted until >= G3 observations
    source: 08-gpu-promotion-loop.md Part 4
  pipeline_stages:
  - stage: observation-substrate
    description: SequenceRecorder stores ToolExecutionPair[] to PatternStore executions
    owner: raven
    continuous: true
  - stage: determinism-analysis
    description: DeterminismAnalyzer.classify() produces ClassifiedOperation[]
    module: src/platform/observation/determinism-analyzer.ts
    owner: raven
  - stage: promotion-detection
    description: PromotionDetector.detect() produces PromotionCandidate[] sorted by compositeScore
    module: src/platform/observation/promotion-detector.ts
    owner: raven
  - stage: declaration-substrate
    description: Blitter.Promoter.detectPromotable() + extractOffloadOps() produces OffloadOperation[]
    module: src/services/chipset/blitter/promoter.ts
    owner: lex
    mode: static
  - stage: convergence
    description: PromotionOrchestrator matches declaration + observation, produces PromotionSource[]
    module: src/services/chipset/blitter/promotion-orchestrator.ts
    co_owners:
    - raven
    - lex
    new_module: true
  - stage: quality-gate
    description: PromotionGatekeeper.evaluate() — 6 gates, all checked exhaustively. All results persisted to PatternStore
      decisions.
    module: src/platform/observation/promotion-gatekeeper.ts
    owner: hemlock
  - stage: script-generation
    description: ScriptGenerator.generate() produces bash script from approved PromotionCandidate
    module: src/platform/observation/script-generator.ts
    owner: lex
  - stage: kernel-promotion
    description: OffloadKernel execution — promoted script replaces live tool call
    module: src/services/chipset/exec/kernel.ts
  - stage: signal-bus
    description: SignalBus.emit(signal, promotion) — NEW event type connecting to promotion lifecycle
    module: src/services/chipset/blitter/signals.ts
    note: 'B-6 gap: SignalBus did not emit promotion signals before this fix'
  - stage: drift-monitoring
    description: DriftMonitor.check() — consecutive mismatch counter, cross-session persistence. Fourier-enhanced when fourier-drift
      cartridge loaded.
    module: src/platform/observation/drift-monitor.ts
    owner: raven
    fourier_enhanced: true
  - stage: centercamp-return
    description: 'PromotionReturnReporter — reports every promotion/demotion event to chain + SignalBus. Events: promoted,
      demoted, promotion-failed, drift-detected.'
    module: src/services/chipset/blitter/promotion-return-reporter.ts
    co_owners:
    - raven
    - cedar
    - willow
    new_module: true
  centercamp_return_path:
    dashboard_owner: willow
    disclosure_levels:
      level_1: counts only (Active, Pending, Demoted, Drift Alerts)
      level_2: per-operation table (operationId, skill, source, determinism, mismatches, status)
      level_3: gate reasoning strings
    source: 08-gpu-promotion-loop.md Part 6
message_integration:
  description: The protocol by which the nine muses speak to users (greeting), route messages (routing), deliver ambient tips
    (mycorrhizal layer), and extend the existing console MessageType union for muse-typed messages.
  message_types:
    existing:
    - text
    - warning
    - error
    - success
    - info
    - progress
    - prompt
    - setting-change
    muse_extensions:
    - muse-greeting
    - muse-tip
    - muse-response
    - muse-handoff
    - muse-pattern
    - muse-boundary
    total_count: 14
    h8_resolution: true
    source: 07-message-integration.md (H-8 fix)
  greeting_protocol:
    structural_principles:
      G1: Match the audience — familiarity level before capability
      G2: One voice at a time — entry muse greets, others acknowledge when conversation routes
      G3: Offer, do not instruct — invitations create possibility; instructions create obligation
    familiarity_levels:
      first:
        signal: No prior session record or --newcomer flag
        disclosure_mode: glance (<=80 chars)
      returning:
        signal: 1-20 prior sessions or last session > 7 days ago
        disclosure_mode: scan (<=500 chars)
      veteran:
        signal: 21+ prior sessions or --veteran flag
        disclosure_mode: read (full)
    session_count_source: Cedar event store — count SessionBoundaryMarker entries
    entry_muse_mapping:
      www/MUS/index.html: willow
      www/PNW/COL/: willow
      www/PNW/CAS/: hemlock
      www/PNW/ECO/: foxy
      www/PNW/GDN/: sam
      www/UNI/: lex
      www/MUS/: cedar
      cli_session_start: willow
      gsd_skill_creator_help: lex
      error_recovery_disturbance: foxy
    source: 07-message-integration.md Part 1
  tip_delivery:
    layer: mycorrhizal
    relevance_formula: relevance = (domainMatch * 0.40) + (recencyInverse * 0.25) + (momentumFit * 0.20) + (familiarityFit
      * 0.15)
    delivery_threshold: 0.65
    threshold_rationale: 'Shannon: where tip''s information content exceeds cost of interrupting attention'
    frequency_rules:
      max_one_tip_per_exchange: true
      raven_exception: pattern observations may accompany any message
      cross_muse_spacing_exchanges: 2
      session_opening_grace_exchanges: 3
      veteran_suppression: familiarity:first tips permanently suppressed for veterans
      user_silencing: tips:off in console config (setting-change message type)
    catalog_location: data/muse-tips.yaml
    source: 07-message-integration.md Parts 2.1-2.4
  conversation_routing:
    intent_categories:
    - intent: how-does-it-work
      primary: willow
      secondary: null
    - intent: can-you-show-me
      primary: willow
      secondary: sam
    - intent: validate-this
      primary: hemlock
      secondary: lex
    - intent: what-pattern-is-this
      primary: raven
      secondary: cedar
    - intent: what-happened
      primary: cedar
      secondary: owl
    - intent: run-this
      primary: lex
      secondary: hemlock
    - intent: what-comes-next
      primary: owl
      secondary: hawk
    - intent: find-the-gap
      primary: hawk
      secondary: raven
    - intent: explore-this
      primary: sam
      secondary: foxy
    - intent: draw-the-map
      primary: foxy
      secondary: willow
    - intent: understanding-deep
      primary: socrates
      secondary: euclid
    - intent: structure-proof
      primary: euclid
      secondary: lex
    - intent: information-theory
      primary: shannon
      secondary: raven
    - intent: human-machine
      primary: amiga
      secondary: willow
    disambiguation_source: 02-function-binding.md (5-rule disambiguation protocol)
    ambiguity_resolution:
      hawk_tiebreakers:
        1: Grove location priority
        2: Recency priority (last 3 exchanges)
        3: Disclosure priority (familiarity:first — Willow wins)
        4: Explicit offer (last resort only)
    handoff_recorded_by: cedar
    source: 07-message-integration.md Parts 3.1-3.6
