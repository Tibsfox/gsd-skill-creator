<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Unison Language Research</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .loading { text-align: center; padding: 4rem; color: var(--text-light); }
    .md-content img { max-width: 100%; }
    .md-content hr { border: none; border-top: 2px solid var(--mist); margin: 2rem 0; }
    .toc { background: white; border: 1px solid var(--mist); border-radius: 6px; padding: 1rem 1.5rem; margin: 1.5rem 0; }
    .toc h3 { margin: 0 0 0.5rem; font-size: 0.95rem; color: var(--primary); }
    .toc ul { list-style: none; padding-left: 0; }
    .toc li { margin: 0.2rem 0; font-size: 0.88rem; font-family: system-ui, sans-serif; }
    .toc li a { color: var(--text); }
    .toc li a:hover { color: var(--secondary); }
    .toc .depth-3 { padding-left: 1.2rem; }
    .toc .depth-4 { padding-left: 2.4rem; font-size: 0.82rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-family: system-ui, sans-serif; font-size: 0.88rem; }
  </style>
</head>
<body>
  <header>
    <h1>The Unison Language</h1>
    <div class="subtitle">Content-Addressed Code from the Future &mdash; A Deep Research Study</div>
    <nav>
      <a href="index.html">Overview</a>
      <a href="page.html?doc=language-core">Language Core</a>
      <a href="page.html?doc=type-system">Type System</a>
      <a href="page.html?doc=tooling">Tooling</a>
      <a href="page.html?doc=distributed">Distributed</a>
      <a href="page.html?doc=ecosystem">Ecosystem</a>
      <a href="page.html?doc=synthesis">Synthesis</a>
      <a href="page.html?doc=schemas">Schemas</a>
      <a href="page.html?doc=sources">Sources</a>
    </nav>
  </header>

  <main>
    <a href="index.html" class="back-link">&larr; Back to overview</a>
    <div id="content" class="md-content">
      <div class="loading">Loading document...</div>
    </div>
  </main>

  <footer>
    <p>Unison Language Research &middot; 2026-03-08 &middot; gsd-skill-creator</p>
  </footer>

  <script>
    function mdToHtml(md) {
      let html = '';
      const lines = md.split('\n');
      let inTable = false;
      let inList = false;
      let inCode = false;
      let listType = '';
      let tableRows = [];

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function inlineFormat(text) {
        text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        text = text.replace(/ -- /g, ' &mdash; ');
        text = text.replace(/--/g, '&ndash;');
        return text;
      }

      function flushTable() {
        if (tableRows.length === 0) return;
        html += '<table>';
        tableRows.forEach((row, i) => {
          const cells = row.split('|').filter(c => c.trim() !== '');
          if (i === 0) {
            html += '<thead><tr>' + cells.map(c => '<th>' + inlineFormat(c.trim()) + '</th>').join('') + '</tr></thead><tbody>';
          } else if (i > 1) {
            html += '<tr>' + cells.map(c => '<td>' + inlineFormat(c.trim()) + '</td>').join('') + '</tr>';
          }
        });
        html += '</tbody></table>';
        tableRows = [];
      }

      function closeList() {
        if (inList) {
          html += listType === 'ul' ? '</ul>' : '</ol>';
          inList = false;
        }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) { html += '</pre>'; inCode = false; }
          else { closeList(); flushTable(); inCode = true; html += '<pre>'; }
          continue;
        }
        if (inCode) { html += escHtml(line) + '\n'; continue; }

        if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
          closeList();
          tableRows.push(line.trim());
          if (i + 1 >= lines.length || !(lines[i+1].trim().startsWith('|') && lines[i+1].trim().endsWith('|'))) {
            flushTable();
          }
          continue;
        } else if (tableRows.length > 0) { flushTable(); }

        if (line.trim() === '') { closeList(); continue; }

        const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
        if (headingMatch) {
          closeList();
          const level = headingMatch[1].length;
          const text = inlineFormat(headingMatch[2]);
          const id = headingMatch[2].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          html += '<h' + level + ' id="' + id + '">' + text + '</h' + level + '>';
          continue;
        }

        if (line.trim().match(/^[-*_]{3,}$/)) { closeList(); html += '<hr>'; continue; }
        if (line.trim().startsWith('> ')) {
          closeList();
          html += '<blockquote>' + inlineFormat(line.trim().substring(2)) + '</blockquote>';
          continue;
        }

        if (line.trim().match(/^[-*]\s/)) {
          if (!inList || listType !== 'ul') { closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
          html += '<li>' + inlineFormat(line.trim().replace(/^[-*]\s/, '')) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList || listType !== 'ol') { closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        closeList();
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      closeList(); flushTable();
      if (inCode) html += '</pre>';
      return html;
    }

    function buildToc(html) {
      const headings = [];
      const re = /<h([23])\s+id="([^"]*)">(.*?)<\/h[23]>/g;
      let match;
      while ((match = re.exec(html)) !== null) {
        headings.push({ level: parseInt(match[1]), id: match[2], text: match[3].replace(/<[^>]+>/g, '') });
      }
      if (headings.length < 3) return '';
      let toc = '<div class="toc"><h3>Contents</h3><ul>';
      headings.forEach(h => {
        toc += '<li class="depth-' + h.level + '"><a href="#' + h.id + '">' + h.text + '</a></li>';
      });
      toc += '</ul></div>';
      return toc;
    }

    var docs = {
      'language-core': { file: '01-language-core.md', title: 'Module 1: Language Core — Content-Addressed Code' },
      'type-system':   { file: '02-type-system-abilities.md', title: 'Module 2: Type System & Abilities' },
      'tooling':       { file: '03-tooling-workflow.md', title: 'Module 3: Tooling & Developer Workflow' },
      'distributed':   { file: '04-distributed-computing.md', title: 'Module 4: Distributed Computing & Unison Cloud' },
      'ecosystem':     { file: '05-ecosystem-adoption.md', title: 'Module 5: Ecosystem, Community & Adoption' },
      'synthesis':     { file: '06-synthesis.md', title: 'Cross-Module Synthesis & Implications' },
      'schemas':       { file: '00-shared-schemas.md', title: 'Document Conventions & Schemas' },
      'sources':       { file: '00-source-index.md', title: 'Source Index' }
    };

    var params = new URLSearchParams(window.location.search);
    var doc = params.get('doc') || 'language-core';
    var info = docs[doc] || { file: doc + '.md', title: doc };

    document.title = info.title + ' — Unison Language Research';

    document.querySelectorAll('header nav a').forEach(function(a) {
      if (a.href.includes('doc=' + doc)) a.classList.add('active');
    });

    fetch('research/' + info.file)
      .then(function(r) {
        if (!r.ok) throw new Error('Document not found');
        return r.text();
      })
      .then(function(md) {
        var html = mdToHtml(md);
        var toc = buildToc(html);
        document.getElementById('content').innerHTML = toc + html;
      })
      .catch(function(err) {
        document.getElementById('content').innerHTML =
          '<p style="color:#c62828">Error loading document: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
