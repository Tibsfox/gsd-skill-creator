# pnw-ecosystem.chipset.yaml
# PNW Living Systems Research Chipset — Derived from Taxonomy
# Version: 1.0.0
#
# This chipset is derived directly from the completed PNW Living Systems Taxonomy.
# Each chip corresponds to a taxonomy module. Each bus route corresponds to an
# ecological pathway. Each clock domain corresponds to an elevation band.
# The taxonomy IS the chipset.
#
# Source documents:
#   - cross-module-merge.md (Phase 628 — unified taxonomy)
#   - silicon.yaml (Phase 620 — math co-processor engines)
#   - shared-attributes.md (Phase 621 — attribute layers)
#   - ecological-networks.md (Phase 626 — bus route definitions)
#   - heritage-bridge.md (Phase 627 — cultural safety boundaries)
#
# Pipeline position: Pass 3 of 4 (Math Co-Processor → Taxonomy Map-Reduce → [Chipset Derivation] → Engineering Optimization)

chipset:
  name: pnw-living-systems
  version: 1.0.0
  archetype: research-taxonomy
  description: >
    PNW ecosystem research chipset derived from taxonomy. Each major taxonomic
    group becomes a specialized chip, each ecological relationship becomes a bus
    route, each habitat type becomes a memory bank, each ecological role becomes
    an instruction type, and each elevation band becomes a clock domain. 6 chips,
    5 bus routes, 6 clock domains, 189 species registers, 31 hub routing entries.

  math_coprocessor:
    enabled: true
    config: silicon.yaml
    gpu: rtx-4060-ti
    engines: 5
    vram_budget: 5200 MB
    capabilities:
      - elevation_gradient    # Engine 1: elevation → Y mapping, lapse rates
      - watershed_topology    # Engine 2: river network graph, flow accumulation
      - population_dynamics   # Engine 3: Lotka-Volterra, RK45 ODE solver
      - fractal_geometry      # Engine 4: L-systems for branching structures
      - spatial_projection    # Engine 5: lat/lon → Minecraft block coordinates

  minecraft:
    world_name: "Tahoma — Salish — Living Systems"
    scale_factor: 40.05  # ft per block
    sea_level_y: -41
    summit_y: 319        # Mt. Rainier (14,410 ft)
    bedrock_y: -64       # Puget Sound floor (-930 ft)
    total_blocks: 383
    biome_mapping: elevation-band-driven
    entity_spawning: taxonomy-accurate
    redstone_systems:
      - salmon_run_indicator       # Seasonal pulse signal (salmon_nutrient bus)
      - mycorrhizal_signal_network # Persistent underground redstone (mycorrhizal_network bus)
      - tidal_cycle_clock          # Daylight sensor + repeater chain (intertidal clock)

# ===========================================================================
# CHIPS — One per taxonomy module
# ===========================================================================

chips:

  # -------------------------------------------------------------------------
  # Chip 1: Flora (Producers)
  # -------------------------------------------------------------------------
  - name: flora
    agent: CRAFT-FLORA
    skills: [botany, ethnobotany, forest-ecology]
    version: 1.0.0
    description: >
      Vascular plants, bryophytes, and marine macroalgae of the PNW bioregion.
      41 species across all 8 elevation bands — from alpine cushion plants on
      Tahoma's summit to deep-water kelp forests in the Salish Sea.

    register_file:
      count: 41
      prefix: "F-"
      range: [F-01, F-41]
      esa_species: [F-04, F-08]  # Whitebark pine (T), Alaska yellow cedar (T)

    memory_banks:
      - HAB-OLD-GROWTH        # 22 species — Douglas-fir, cedar, hemlock dominated
      - HAB-SECOND-GROWTH     # 15 species — alder, maple, young conifers
      - HAB-ALPINE-MEADOW     # 5 species — cushion plants, alpine herbs
      - HAB-SUBALPINE-PARKLAND # 7 species — subalpine fir, meadow herbs
      - HAB-RIPARIAN          # 7 species — alder, cottonwood, salmonberry
      - HAB-OAK-PRAIRIE       # 3 species — Oregon white oak, camas
      - HAB-WETLAND           # 3 species — wapato, skunk cabbage
      - HAB-KELP              # 1 species — bull kelp
      - HAB-EELGRASS          # 1 species — eelgrass
      - HAB-ROCKY-INTERTIDAL  # 3 species — rockweed, sea lettuce, surfgrass
      - HAB-VOLCANIC          # 2 species — alpine phlox, snow algae

    instruction_set:
      - ROLE-PRIMARY-PRODUCER   # All 41 species
      - ROLE-FOUNDATION         # 10 species (conifers, kelp, eelgrass, oak)
      - ROLE-NURSE              # 4 species (alder, lupine, maple, cottonwood)

    clock_domains: [alpine, subalpine, montane, lowland, intertidal, marine]

    bus_connections:
      - mycorrhizal_network    # Primary: 38 cross-refs to fungi
      - salmon_nutrient        # Riparian trees receive marine-derived N
      - watershed              # All plants participate in hydrology
      - predator_prey          # Food source for herbivores
      - cultural_ecological    # Cedar, camas, huckleberry, devil's club

  # -------------------------------------------------------------------------
  # Chip 2: Fauna-Terrestrial (Consumers — Land)
  # -------------------------------------------------------------------------
  - name: fauna_terrestrial
    agent: CRAFT-FAUNA
    skills: [wildlife-ecology, ornithology, herpetology]
    version: 1.0.0
    description: >
      Terrestrial vertebrates: 28 mammals, 32 birds, 16 amphibians, 10 reptiles.
      86 species across all elevation bands. Includes apex predators, keystone
      engineers, indicator species, and ESA-listed species.

    register_file:
      count: 86
      prefix: "T-"
      range: [T-01, T-86]
      esa_species: [T-02, T-05, T-27, T-29, T-36, T-53, T-60, T-73]  # 8 ESA species

    memory_banks:
      - HAB-OLD-GROWTH        # 38 species — spotted owl, murrelet, fisher
      - HAB-SECOND-GROWTH     # 35 species — deer, squirrels, songbirds
      - HAB-ALPINE-MEADOW     # 8 species — pika, marmot, ptarmigan
      - HAB-SUBALPINE-PARKLAND # 14 species — marten, goshawk, grouse
      - HAB-RIPARIAN          # 18 species — otter, beaver, heron, dipper
      - HAB-STREAM            # 12 species — dipper, salamanders, tailed frog
      - HAB-WETLAND           # 14 species — frogs, turtles, cranes
      - HAB-OAK-PRAIRIE       # 10 species — bluebird, lark, fence lizard
      - HAB-LAKE              # 6 species — loon, osprey, newts
      - HAB-URBAN             # 8 species — raccoon, Anna's hummingbird, tree frog
      - HAB-ROCKY-INTERTIDAL  # 2 species — oystercatcher, peregrine
      - HAB-VOLCANIC          # 5 species — rosy-finch, pika, marmot

    instruction_set:
      - ROLE-APEX              # 7 species (cougar, wolf, eagles, great horned owl)
      - ROLE-MESOPREDATOR      # 15 species (fox, bobcat, marten, fisher, weasels, snakes)
      - ROLE-PRIMARY-CONSUMER  # 16 species (elk, deer, goat, hare, squirrels, grouse)
      - ROLE-SECONDARY-CONSUMER # 35 species (bears, owls, herons, salamanders)
      - ROLE-KEYSTONE          # 1 species (beaver)
      - ROLE-ECOSYSTEM-ENGINEER # 3 species (beaver, woodpecker, mountain beaver)
      - ROLE-SEED-DISPERSER    # 7 species (bear, jays, chipmunks, squirrels)
      - ROLE-POLLINATOR        # 2 species (hummingbirds)
      - ROLE-INDICATOR         # 6 species (pika, dipper, spotted owl, salamanders)
      - ROLE-DECOMPOSER        # 1 species (flying squirrel — truffle dispersal)

    clock_domains: [alpine, subalpine, montane, lowland, intertidal]

    bus_connections:
      - predator_prey          # Primary: 48 cross-refs to eco-nets
      - salmon_nutrient        # Bear, eagle, otter, mink, raven
      - mycorrhizal_network    # Flying squirrel, spotted owl (truffle link)
      - watershed              # Beaver, dipper, riparian species
      - cultural_ecological    # Mountain goat wool, eagle feathers, elk

  # -------------------------------------------------------------------------
  # Chip 3: Fauna-Marine (Consumers — Water)
  # -------------------------------------------------------------------------
  - name: fauna_marine
    agent: CRAFT-FAUNA
    skills: [marine-biology, fisheries-science, cetology]
    version: 1.0.0
    description: >
      Aquatic and marine vertebrates and invertebrates: 8 salmonids, 4 freshwater
      fish, 8 marine mammals, 6 marine fish, 13 invertebrates. 39 species from
      glacial headwaters to deep Puget Sound basins.

    register_file:
      count: 39
      prefix: "M-"
      range: [M-01, M-39]
      esa_species: [M-01, M-02, M-03, M-05, M-06, M-07, M-10, M-13, M-17, M-18]  # 10 ESA

    memory_banks:
      - HAB-STREAM            # 12 species — salmon, trout, lamprey, sturgeon
      - HAB-RIPARIAN          # 12 species — salmon spawning, eulachon
      - HAB-PELAGIC           # 26 species — whales, salmon (ocean), sharks
      - HAB-ROCKY-INTERTIDAL  # 12 species — sea stars, mussels, crabs, urchins
      - HAB-KELP              # 6 species — urchins, rockfish, otter
      - HAB-EELGRASS          # 4 species — herring, crab, oyster
      - HAB-SANDY-BEACH       # 3 species — razor clam, geoduck
      - HAB-DEEP-BASIN        # 5 species — glass sponge, sixgill, octopus
      - HAB-ESTUARY           # 4 species — cutthroat, herring, oyster
      - HAB-LAKE              # 3 species — sockeye, bull trout, mudminnow

    instruction_set:
      - ROLE-KEYSTONE          # 6 species (all 5 salmon + ochre star)
      - ROLE-APEX              # 5 species (orca, bull trout, lingcod, sixgill, octopus)
      - ROLE-SECONDARY-CONSUMER # 28 species (whales, seals, fish, crabs)
      - ROLE-PRIMARY-CONSUMER  # 5 species (mussels, urchins, clams, chiton, sponge)
      - ROLE-ECOSYSTEM-ENGINEER # 0 (beaver in fauna_terrestrial)
      - ROLE-INDICATOR         # 0 (indicators in fauna_terrestrial)

    clock_domains: [montane, lowland, intertidal, marine]

    bus_connections:
      - salmon_nutrient        # Primary: salmon lifecycle drives this bus
      - predator_prey          # Orca-salmon, otter-urchin-kelp, predator-prey
      - watershed              # Salmon migration, estuary dynamics
      - cultural_ecological    # Salmon treaty rights, whale hunting, shellfish

  # -------------------------------------------------------------------------
  # Chip 4: Fungi/Microbiome (Connectors)
  # -------------------------------------------------------------------------
  - name: fungi_microbiome
    agent: CRAFT-MYCO
    skills: [mycology, soil-science, microbial-ecology]
    version: 1.0.0
    description: >
      Mycorrhizal networks, decomposers, lichens, and soil/marine microbiome.
      20 species + 3 community profiles. The biological equivalent of the bus
      architecture — fungi are the wires that connect the forest.

    register_file:
      count: 23  # 20 species + 3 communities
      prefix: "K-"
      range: [K-01, K-C3]
      esa_species: []  # No ESA-listed fungi

    memory_banks:
      - HAB-OLD-GROWTH        # 14 species — ECM fungi, saprophytes, lichens
      - HAB-SECOND-GROWTH     # 12 species — chanterelle, matsutake, morels
      - HAB-SUBALPINE-PARKLAND # 4 species — Suillus, Cortinarius, fly agaric
      - HAB-RIPARIAN          # 3 species — oyster mushroom, turkey tail
      - HAB-DEEP-BASIN        # 1 community — marine microbiome

    instruction_set:
      - ROLE-DECOMPOSER        # 17 species (ECM, saprophytes, pathogens)
      - ROLE-PRIMARY-PRODUCER  # 3 species (lichens — photobiont component)
      - ROLE-INDICATOR         # 2 species (lung lichen, old man's beard — air quality)
      - ROLE-NURSE             # 1 community (Frankia N-fixation)

    clock_domains: [subalpine, montane, lowland]

    bus_connections:
      - mycorrhizal_network    # Primary: fungi ARE this bus
      - salmon_nutrient        # Decompose carcasses, redistribute MDN via network
      - watershed              # Soil microbiome water retention
      - cultural_ecological    # Chanterelle/matsutake harvest, agarikon spiritual

  # -------------------------------------------------------------------------
  # Chip 5: Ecological Networks (Bus Architecture)
  # -------------------------------------------------------------------------
  - name: ecological_networks
    agent: CRAFT-ECO
    skills: [systems-ecology, network-analysis, nutrient-cycling]
    version: 1.0.0
    description: >
      Cross-cutting ecological relationships that connect the taxonomy into a
      functioning ecosystem. 5 major pathways documented with species nodes,
      nutrient currencies, and citations. This chip defines the bus architecture
      that the other chips use — it is the network topology.

    register_file:
      count: 0  # No unique species — all referenced from other chips
      prefix: "NET-"
      hub_species: 31  # Species requiring cross-chip routing

    memory_banks:
      # Networks store pathway state, not habitat data
      - NET-SALMON-NUTRIENT-STATE    # MDN flux rates, isotope signatures
      - NET-PREDATOR-PREY-STATE      # Population equilibria, trophic levels
      - NET-MYCORRHIZAL-STATE        # Network connectivity, resource flow
      - NET-WATERSHED-STATE          # Discharge, sediment load, temperature
      - NET-CULTURAL-STATE           # Nation-species relationship registry

    instruction_set:
      # Network operations rather than ecological roles
      - ROUTE          # Route query to appropriate chip via bus
      - MERGE          # Combine results from multiple chips
      - VALIDATE       # Check cross-reference integrity
      - SYNTHESIZE     # Generate cross-module analysis

    clock_domains: [alpine, subalpine, montane, lowland, intertidal, marine]
    # Networks span all domains — they ARE the connections between domains

    bus_connections:
      - salmon_nutrient        # Defines this bus
      - predator_prey          # Defines this bus
      - mycorrhizal_network    # Defines this bus
      - watershed              # Defines this bus
      - cultural_ecological    # Defines this bus

  # -------------------------------------------------------------------------
  # Chip 6: Heritage Bridge (Safety Warden)
  # -------------------------------------------------------------------------
  - name: heritage_bridge
    agent: CRAFT-HERITAGE
    skills: [ethnobotany, cultural-ecology, heritage-skills]
    version: 1.0.0
    description: >
      Cultural-ecological integration following OCAP/CARE/UNDRIP protocols.
      17+ nations documented with species relationships and cultural significance
      categories. This chip enforces safety boundaries SC-1 through SC-6 on
      all bus traffic involving cultural content.

    register_file:
      count: 0  # No unique species — all referenced from other chips
      prefix: "HER-"
      nations: 17  # Documented nation groups

    memory_banks:
      # Organized by nation group rather than habitat
      - HER-COAST-SALISH      # Lummi, Saanich, Tulalip, Muckleshoot, Puyallup, Nisqually, etc.
      - HER-MAKAH             # Olympic Peninsula tip — whale, halibut, seal
      - HER-NUU-CHAH-NULTH    # West Vancouver Island — whale, herring, cedar
      - HER-PLATEAU           # Yakama, Warm Springs, Umatilla, Nez Perce
      - HER-KALAPUYA          # Willamette Valley — fire, camas, wapato, oak
      - HER-NORTHERN-COAST    # Tlingit, Haida, Kwakwaka'wakw
      - HER-OLYMPIC-COAST     # Quinault, Quileute, Hoh

    instruction_set:
      - CULT-MATERIAL          # Tools, textiles, construction
      - CULT-FOOD-MEDICINE     # Consumption, health applications
      - CULT-SPIRITUAL         # Sacred, ceremonial significance
      - CULT-TEK               # Traditional Ecological Knowledge
      - CULT-MANAGEMENT        # Active cultural landscape management

    clock_domains: [subalpine, montane, lowland, intertidal, marine]
    # Cultural practices span seasonal rounds across multiple domains

    bus_connections:
      - cultural_ecological    # Primary: heritage IS this bus
      - salmon_nutrient        # First Salmon Ceremony, treaty rights
      - watershed              # Fire management, stream management

    safety:
      framework: [OCAP, CARE, UNDRIP]
      mandatory_tests: [SC-1, SC-2, SC-3, SC-4, SC-5, SC-6]
      rules:
        - id: SC-1
          description: "No GPS coordinates for ESA species nest/den/spawn sites"
          enforcement: BLOCK
        - id: SC-2
          description: "Every cultural reference uses specific nation name"
          enforcement: BLOCK
        - id: SC-3
          description: "OCAP/CARE/UNDRIP applied to all Heritage Bridge content"
          enforcement: BLOCK
        - id: SC-4
          description: "Potlatch Prohibition (1884-1951) noted where potlatch discussed"
          enforcement: BLOCK
        - id: SC-5
          description: "Legal approach distances cited for marine mammals"
          enforcement: BLOCK
        - id: SC-6
          description: "Treaty harvest rights distinguished from recreational"
          enforcement: BLOCK

# ===========================================================================
# BUS ROUTES — Ecological pathways connecting chips
# ===========================================================================

buses:

  - name: salmon_nutrient
    type: ecological-pathway
    direction: bidirectional
    bandwidth: high
    signal: seasonal-pulse
    description: >
      Marine-derived nutrient transport via Pacific salmon lifecycle. Ocean →
      river → carcass → soil → tree → mycorrhizal network. The arterial system
      of the PNW.
    elevation_span: [ELEV-DEEP-MARINE, ELEV-MONTANE]
    minecraft_y_span: [-64, 84]
    connects: [fauna_marine, fauna_terrestrial, flora, fungi_microbiome]
    hub_species:
      - M-01   # Chinook salmon (super-hub)
      - M-02   # Coho salmon
      - M-03   # Sockeye salmon
      - M-04   # Pink salmon
      - M-05   # Chum salmon
      - T-28   # American black bear
      - T-31   # Bald eagle
      - T-10   # River otter
      - F-21   # Red alder (N-fixing riparian)
    nutrient_currency: [nitrogen-15, phosphorus, carbon-13, sulfur]
    math_engine: population_dynamics  # silicon.yaml Engine 3
    citations:
      - "Naiman et al. (2002) — marine-derived nutrient quantification"
      - "Helfield & Naiman (2001) — riparian tree growth response"
      - "Cederholm et al. (1999) — 137 species benefiting from salmon carcasses"
      - "Ben-David et al. (1998) — stable isotope tracing in bears"

  - name: predator_prey
    type: ecological-pathway
    direction: top-down  # with bottom-up feedbacks
    bandwidth: medium
    signal: continuous
    description: >
      Trophic cascade regulation across all elevation bands. Apex predators
      control prey populations, which controls vegetation structure, which
      controls habitat quality. Includes the kelp-otter-urchin cascade as
      a marine sub-cascade.
    elevation_span: [ELEV-DEEP-MARINE, ELEV-ALPINE]
    minecraft_y_span: [-64, 319]
    connects: [fauna_terrestrial, fauna_marine, flora]
    sub_cascades:
      - name: wolf-elk-riparian
        species: [T-02, T-13, F-32]  # Wolf → elk → cottonwood
      - name: otter-urchin-kelp
        species: [M-18, M-33, F-34]  # Otter → urchin → bull kelp
      - name: owl-squirrel-truffle
        species: [T-29, T-18, K-04]  # Spotted owl → flying squirrel → Rhizopogon
      - name: salmon-orca
        species: [M-01, M-13]         # Chinook → Southern Resident orca
    math_engine: population_dynamics   # silicon.yaml Engine 3
    citations:
      - "Ripple & Beschta (2006) — trophic cascades in PNW"
      - "Estes et al. (2011) — global trophic downgrading"
      - "Forsman et al. (2011) — spotted owl population dynamics"

  - name: mycorrhizal_network
    type: ecological-pathway
    direction: bidirectional
    bandwidth: high
    signal: persistent-infrastructure
    description: >
      Underground fungal hyphal networks connecting tree root systems — the
      "Wood Wide Web." Carbon, phosphorus, nitrogen, water, and defense signals
      flow through ECM fungi linking every tree in the forest. The biological
      equivalent of the GSD bus architecture.
    elevation_span: [ELEV-LOWLAND, ELEV-SUBALPINE]
    minecraft_y_span: [-29, 196]
    connects: [flora, fungi_microbiome, fauna_terrestrial]
    hub_species:
      - F-16   # Douglas-fir (super-hub, mother tree)
      - F-17   # Western red cedar (super-hub)
      - F-19   # Western hemlock
      - K-04   # Rhizopogon (truffle, primary connector)
      - K-05   # Cortinarius (100+ species)
      - K-06   # Russula
      - T-18   # Northern flying squirrel (spore disperser)
    resource_currency: [carbon, phosphorus, nitrogen, water, defense-signals]
    math_engine: fractal_geometry      # silicon.yaml Engine 4 (L-system hyphal networks)
    citations:
      - "Simard et al. (1997) — net transfer of carbon between tree species"
      - "Beiler et al. (2010) — architecture of the wood-wide web"
      - "Maser et al. (1978) — fungal-small mammal-tree symbiosis"

  - name: watershed
    type: ecological-pathway
    direction: downstream-dominant
    bandwidth: high
    signal: continuous
    description: >
      Water as the physical template for all other networks. Gravitational
      flow from glacier to ocean, carrying nutrients, sediment, temperature
      signals, and organisms. Beaver as the primary flow engineer.
    elevation_span: [ELEV-ALPINE, ELEV-DEEP-MARINE]
    minecraft_y_span: [319, -64]
    connects: [flora, fauna_terrestrial, fauna_marine, fungi_microbiome, ecological_networks, heritage_bridge]
    hub_species:
      - T-16   # Beaver (ecosystem engineer, flow regulator)
      - M-01   # Chinook salmon (migrate against flow)
      - F-21   # Red alder (bank stabilization, N-fixing)
      - T-48   # American dipper (stream quality indicator)
    resource_currency: [water, sediment, temperature, dissolved-oxygen, dissolved-nutrients]
    math_engine: watershed_topology    # silicon.yaml Engine 2
    citations:
      - "Montgomery (2000) — geomorphic template for salmon habitat"
      - "Naiman et al. (2000) — riparian ecology"
      - "Stanford et al. (2005) — floodplain ecology"

  - name: cultural_ecological
    type: ecological-pathway
    direction: bidirectional
    bandwidth: medium
    signal: persistent-intergenerational
    description: >
      Cultural-ecological relationships between PNW species and Indigenous
      nations. Intergenerational knowledge transmission. OCAP/CARE/UNDRIP
      frameworks enforced on all traffic. Safety-critical bus.
    elevation_span: [ELEV-SHALLOW-MARINE, ELEV-SUBALPINE]
    minecraft_y_span: [-46, 196]
    connects: [heritage_bridge, flora, fauna_terrestrial, fauna_marine, fungi_microbiome]
    hub_species:
      - F-17   # Western red cedar ("Tree of Life")
      - M-01   # Chinook salmon (First Salmon Ceremony)
      - F-28   # Camas (cultural food staple)
      - F-26   # Huckleberry (gathering traditions)
    governance:
      framework: [OCAP, CARE, UNDRIP]
      safety_tests: [SC-1, SC-2, SC-3, SC-4, SC-5, SC-6]
      attribution: nation-specific-required
    citations:
      - "Boldt Decision (1974) — tribal treaty fishing rights"
      - "Turner (2005) — The Earth's Blanket: ethnobotany"
      - "Suttles (1990) — Handbook of North American Indians, Northwest Coast"

# ===========================================================================
# CLOCK DOMAINS — Elevation-based ecological tempo
# ===========================================================================

clock_domains:

  - id: alpine
    elevation_ft: [9500, 14410]
    minecraft_y: [196, 319]
    clock_hz: 0.1
    description: "Glacial, periglacial, fellfield. Millennial glacial cycles, extreme diurnal swings."
    species_count: 13
    active_chips: [flora, fauna_terrestrial]
    dominant_bus: watershed

  - id: subalpine
    elevation_ft: [5000, 9500]
    minecraft_y: [84, 196]
    clock_hz: 0.25
    description: "Subalpine meadows, krummholz, deep snowpack. 3-4 month growing season."
    species_count: 25
    active_chips: [flora, fauna_terrestrial, fungi_microbiome]
    dominant_bus: mycorrhizal_network

  - id: montane
    elevation_ft: [3000, 5000]
    minecraft_y: [34, 84]
    clock_hz: 0.5
    description: "Dense conifer forest, snow-driven hydrology, peak mycorrhizal density."
    species_count: 65
    active_chips: [flora, fauna_terrestrial, fauna_marine, fungi_microbiome]
    dominant_bus: mycorrhizal_network

  - id: lowland
    elevation_ft: [0, 3000]
    minecraft_y: [-41, 34]
    clock_hz: 1.0
    description: "Old-growth forest, riparian corridors, urban interface. Maximum biodiversity crossroads."
    species_count: 144
    active_chips: [flora, fauna_terrestrial, fauna_marine, fungi_microbiome]
    dominant_bus: salmon_nutrient

  - id: intertidal
    elevation_ft: [-15, 0]
    minecraft_y: [-41, -41]
    clock_hz: tidal  # Driven by lunar tidal cycle, not fixed Hz
    description: "Rocky intertidal, sandy beach, eelgrass margin. Diurnal tidal rhythm."
    species_count: 12
    active_chips: [flora, fauna_terrestrial, fauna_marine]
    dominant_bus: predator_prey

  - id: marine
    elevation_ft: [-930, -15]
    minecraft_y: [-64, -41]
    clock_hz: 0.001  # Deep marine; 0.01 for shallow
    description: "Kelp forests, pelagic, deep basins. Decadal to centennial timescales."
    species_count: 40
    active_chips: [flora, fauna_marine]
    dominant_bus: predator_prey

# ===========================================================================
# TOKEN BUDGET — Estimated execution costs
# ===========================================================================

token_budget:
  total: 200000
  per_chip: 30000
  shared_layers: 30000
  synthesis: 20000
  minecraft_layer: 20000
  breakdown:
    flora: 30000
    fauna_terrestrial: 35000
    fauna_marine: 30000
    fungi_microbiome: 25000
    ecological_networks: 25000
    heritage_bridge: 25000
    shared_attributes: 30000

# ===========================================================================
# VALIDATION — Chipset integrity checks
# ===========================================================================

validation:
  checks:
    - id: CF-8
      description: "Chipset YAML parses without error"
      type: core
      status: PASS

    - id: INT-1
