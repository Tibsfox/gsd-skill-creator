<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Clean Air, Water & Food</title>
  <link rel="stylesheet" href="../../brand.css">
  <link rel="stylesheet" href="style.css">
  <script src="../series.js" defer></script>
  <style>
    .loading { text-align: center; padding: 4rem; color: var(--text-light); }
    .md-content img { max-width: 100%; }
    .md-content hr { border: none; border-top: 2px solid var(--mist); margin: 2rem 0; }
    .toc { background: white; border: 1px solid var(--mist); border-radius: 6px; padding: 1rem 1.5rem; margin: 1.5rem 0; }
    .toc h3 { margin: 0 0 0.5rem; font-size: 0.95rem; color: var(--leaf); }
    .toc ul { list-style: none; padding-left: 0; margin: 0; }
    .toc li { margin: 0.2rem 0; font-size: 0.88rem; font-family: system-ui, sans-serif; }
    .toc li a { color: var(--text); text-decoration: none; display: block; padding: 0.1rem 0.4rem; border-radius: 3px; transition: background 0.2s, color 0.2s; }
    .toc li a:hover { color: var(--water); background: rgba(0,0,0,0.04); text-decoration: none; }
    .toc li a.active { color: var(--water); background: rgba(21,101,192,0.08); font-weight: 600; }
    .toc .depth-3 { padding-left: 1.2rem; }
    .toc .depth-4 { padding-left: 2.4rem; font-size: 0.82rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-family: system-ui, sans-serif; font-size: 0.88rem; }
    .toc-search { width: 100%; padding: 0.35rem 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--mist); border-radius: 4px; font-size: 0.82rem; font-family: system-ui, sans-serif; outline: none; background: var(--cream, #f5f8f5); }
    .toc-search:focus { border-color: var(--water, #1565c0); }
    h2:hover .anchor, h3:hover .anchor { opacity: 1; }
    .anchor { opacity: 0; margin-left: 0.3em; text-decoration: none; color: var(--text-light, #616161); transition: opacity 0.2s; font-weight: 400; font-size: 0.85em; }
    .anchor:hover { color: var(--water, #1565c0); text-decoration: none; }
    @media (min-width: 1024px) {
      .page-grid { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start; }
      .page-grid .toc { position: sticky; top: 0; max-height: 100vh; overflow-y: auto; margin: 0; scrollbar-width: thin; }
      .page-grid .toc::-webkit-scrollbar { width: 4px; }
      .page-grid .toc::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 2px; }
      .page-grid .md-body { min-width: 0; scroll-behavior: smooth; }
    }
  </style>
</head>
<body class="project-awf">
  <header>
    <h1>Clean Air, Water & Food</h1>
    <div class="subtitle">Living Systems Research &mdash; Purification &middot; Ecology &middot; Pollinators &middot; Forest Restoration</div>
    <nav>
      <a href="index.html">Overview</a>
      <a href="page.html?doc=01-air-purification">Air</a>
      <a href="page.html?doc=02-water-filtration">Water</a>
      <a href="page.html?doc=03-food-safety">Food</a>
      <a href="page.html?doc=04-pollinator-health">Pollinators</a>
      <a href="page.html?doc=05-wildlife-habitat">Habitat</a>
      <a href="page.html?doc=06-forest-conservation">Forest</a>
      <a href="page.html?doc=07-cross-domain-nexus">Nexus</a>
      <a href="page.html?doc=09-verification-matrix">Verification</a>
    </nav>
  </header>

  <main>
    <a href="index.html" class="back-link">&larr; Back to overview</a>
    <div id="content" class="md-content">
      <div class="loading">Loading document...</div>
    </div>
  </main>

  <footer>
    <p>Clean Air, Water & Food &middot; Living Systems Research &middot; gsd-skill-creator</p>
  </footer>

  <script>
    function mdToHtml(md) {
      let html = '';
      const lines = md.split('\n');
      let inTable = false;
      let inList = false;
      let inCode = false;
      let listType = '';
      let tableRows = [];

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function inlineFormat(text) {
        text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        text = text.replace(/ -- /g, ' &mdash; ');
        text = text.replace(/--/g, '&ndash;');
        return text;
      }

      function flushTable() {
        if (tableRows.length === 0) return;
        html += '<table>';
        tableRows.forEach((row, i) => {
          const cells = row.split('|').filter(c => c.trim() !== '');
          if (i === 0) {
            html += '<thead><tr>' + cells.map(c => '<th>' + inlineFormat(c.trim()) + '</th>').join('') + '</tr></thead><tbody>';
          } else if (i > 1) {
            html += '<tr>' + cells.map(c => '<td>' + inlineFormat(c.trim()) + '</td>').join('') + '</tr>';
          }
        });
        html += '</tbody></table>';
        tableRows = [];
      }

      function closeList() {
        if (inList) {
          html += listType === 'ul' ? '</ul>' : '</ol>';
          inList = false;
        }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) { html += '</pre>'; inCode = false; }
          else { closeList(); flushTable(); inCode = true; html += '<pre>'; }
          continue;
        }
        if (inCode) { html += escHtml(line) + '\n'; continue; }

        if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
          closeList();
          tableRows.push(line.trim());
          if (i + 1 >= lines.length || !(lines[i+1].trim().startsWith('|') && lines[i+1].trim().endsWith('|'))) {
            flushTable();
          }
          continue;
        } else if (tableRows.length > 0) { flushTable(); }

        if (line.trim() === '') { closeList(); continue; }

        const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
        if (headingMatch) {
          closeList();
          const level = headingMatch[1].length;
          const text = inlineFormat(headingMatch[2]);
          const id = headingMatch[2].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          html += `<h${level} id="${id}">${text}</h${level}>`;
          continue;
        }

        if (line.trim().match(/^[-*_]{3,}$/)) { closeList(); html += '<hr>'; continue; }
        if (line.trim().startsWith('> ')) {
          closeList();
          html += '<blockquote>' + inlineFormat(line.trim().substring(2)) + '</blockquote>';
          continue;
        }

        if (line.trim().match(/^[-*]\s/)) {
          if (!inList || listType !== 'ul') { closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
          html += '<li>' + inlineFormat(line.trim().replace(/^[-*]\s/, '')) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList || listType !== 'ol') { closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        closeList();
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      closeList(); flushTable();
      if (inCode) html += '</pre>';
      return html;
    }

    function buildToc(html) {
      const headings = [];
      const re = /<h([23])\s+id="([^"]*)">(.*?)<\/h[23]>/g;
      let match;
      while ((match = re.exec(html)) !== null) {
        headings.push({ level: parseInt(match[1]), id: match[2], text: match[3].replace(/<[^>]+>/g, '') });
      }
      if (headings.length < 3) return '';
      let toc = '<div class="toc"><h3>Contents</h3>';
      toc += '<input type="text" class="toc-search" placeholder="Filter sections...">';
      toc += '<ul>';
      headings.forEach(h => {
        toc += `<li class="depth-${h.level}"><a href="#${h.id}">${h.text}</a></li>`;
      });
      toc += '</ul></div>';
      return toc;
    }

    function enhanceNavigation() {
      var toc = document.querySelector('.toc');
      var content = document.getElementById('content');
      if (!toc || !content) return;
      var grid = document.createElement('div');
      grid.className = 'page-grid';
      content.parentNode.insertBefore(grid, content);
      grid.appendChild(toc);
      var body = document.createElement('div');
      body.className = 'md-body';
      while (content.firstChild) body.appendChild(content.firstChild);
      content.appendChild(grid);
      grid.appendChild(body);
      body.querySelectorAll('h2[id], h3[id]').forEach(function(h) {
        var a = document.createElement('a');
        a.className = 'anchor';
        a.href = '#' + h.id;
        a.textContent = '#';
        a.setAttribute('aria-label', 'Link to this section');
        h.appendChild(a);
      });
      var tocLinks = toc.querySelectorAll('a[href^="#"]');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            tocLinks.forEach(function(a) { a.classList.remove('active'); });
            var link = toc.querySelector('a[href="#' + entry.target.id + '"]');
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -80% 0px' });
      body.querySelectorAll('h2[id], h3[id]').forEach(function(h) { observer.observe(h); });
      tocLinks.forEach(function(a) {
        a.addEventListener('click', function(e) {
          var target = document.getElementById(a.getAttribute('href').slice(1));
          if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); history.replaceState(null, '', a.getAttribute('href')); }
        });
      });
      var searchInput = toc.querySelector('.toc-search');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          var query = this.value.toLowerCase();
          toc.querySelectorAll('li').forEach(function(li) {
            var text = li.textContent.toLowerCase();
            li.style.display = (!query || text.indexOf(query) !== -1) ? '' : 'none';
          });
        });
      }
    }

    const titles = {
      '00-source-index': 'Source Index',
      '00-sensitivity-protocol': 'Sensitivity Protocol',
      '01-air-purification': 'Air Purification Systems',
      '02-water-filtration': 'Water Purification Technologies',
      '03-food-safety': 'Clean Food Supply',
      '04-pollinator-health': 'Pollinator Health & Bee Conservation',
      '05-wildlife-habitat': 'Wildlife Habitat & Natural Food Sources',
      '06-forest-conservation': 'Forest Conservation & Rainforest Ecology',
      '07-cross-domain-nexus': 'Cross-Domain Nexus',
      '08-bibliography': 'Bibliography',
      '09-verification-matrix': 'Verification Matrix'
    };

    const params = new URLSearchParams(window.location.search);
    const doc = params.get('doc') || '00-source-index';

    document.title = (titles[doc] || doc) + ' — Clean Air, Water & Food';

    document.querySelectorAll('header nav a').forEach(a => {
      if (a.href.includes('doc=' + doc)) a.classList.add('active');
    });

    fetch('research/' + doc + '.md')
      .then(r => {
        if (!r.ok) throw new Error('Document not found');
        return r.text();
      })
      .then(md => {
        const html = mdToHtml(md);
        const toc = buildToc(html);
        document.getElementById('content').innerHTML = toc + html;
        enhanceNavigation();
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p style="color:#c62828">Error loading document: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
