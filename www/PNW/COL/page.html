<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — PNW Rainforest Biodiversity</title>
  <link rel="stylesheet" href="style.css">
  <script src="../series.js" defer></script>
  <style>
    .loading { text-align: center; padding: 4rem; color: var(--text-light); }
    .md-content img { max-width: 100%; }
    .md-content hr { border: none; border-top: 2px solid var(--mist); margin: 2rem 0; }
    .toc { background: white; border: 1px solid var(--mist); border-radius: 6px; padding: 1rem 1.5rem; margin: 1.5rem 0; }
    .toc h3 { margin: 0 0 0.5rem; font-size: 0.95rem; color: var(--forest); }
    .toc ul { list-style: none; padding-left: 0; margin: 0; }
    .toc li { margin: 0.2rem 0; font-size: 0.88rem; font-family: system-ui, sans-serif; }
    .toc li a { color: var(--text); text-decoration: none; display: block; padding: 0.1rem 0.4rem; border-radius: 3px; transition: background 0.2s, color 0.2s; }
    .toc li a:hover { color: var(--water); background: rgba(0,0,0,0.04); text-decoration: none; }
    .toc li a.active { color: var(--water); background: rgba(42,100,150,0.08); font-weight: 600; }
    .toc .depth-3 { padding-left: 1.2rem; }
    .toc .depth-4 { padding-left: 2.4rem; font-size: 0.82rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-family: system-ui, sans-serif; font-size: 0.88rem; }
    .toc-search { width: 100%; padding: 0.35rem 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--mist); border-radius: 4px; font-size: 0.82rem; font-family: system-ui, sans-serif; outline: none; background: var(--cream, #faf8f0); }
    .toc-search:focus { border-color: var(--water, #2a6496); }
    h2:hover .anchor, h3:hover .anchor { opacity: 1; }
    .anchor { opacity: 0; margin-left: 0.3em; text-decoration: none; color: var(--text-light, #5a5a5a); transition: opacity 0.2s; font-weight: 400; font-size: 0.85em; }
    .anchor:hover { color: var(--water, #2a6496); text-decoration: none; }
    @media (min-width: 1024px) {
      .page-grid { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start; }
      .page-grid .toc { position: sticky; top: 0; max-height: 100vh; overflow-y: auto; margin: 0; scrollbar-width: thin; }
      .page-grid .toc::-webkit-scrollbar { width: 4px; }
      .page-grid .toc::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 2px; }
      .page-grid .md-body { min-width: 0; scroll-behavior: smooth; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Pacific Northwest Rainforest Biodiversity</h1>
    <div class="subtitle">Columbia River Region — Research Document Browser</div>
    <nav>
      <a href="index.html">Overview</a>
      <a href="page.html?doc=publication">Publication</a>
      <a href="page.html?doc=flora">Flora</a>
      <a href="page.html?doc=fauna">Fauna</a>
      <a href="page.html?doc=fungi">Fungi</a>
      <a href="page.html?doc=aquatic">Aquatic</a>
      <a href="page.html?doc=synthesis">Synthesis</a>
      <a href="page.html?doc=schemas">Schemas</a>
      <a href="page.html?doc=verification">Verification</a>
      <a href="mission.html">Mission Pack</a>
    </nav>
  </header>

  <main>
    <a href="index.html" class="back-link">&larr; Back to overview</a>
    <div id="content" class="md-content">
      <div class="loading">Loading document...</div>
    </div>
  </main>

  <footer>
    <p>PNW Rainforest Biodiversity Research &middot; v1.49.22 &middot; gsd-skill-creator</p>
  </footer>

  <script>
    // Lightweight markdown to HTML converter
    function mdToHtml(md) {
      let html = '';
      const lines = md.split('\n');
      let inTable = false;
      let inList = false;
      let inCode = false;
      let listType = '';
      let tableRows = [];

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function inlineFormat(text) {
        // Bold+italic
        text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
        // Bold
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Italic (including *Genus species*)
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Links
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        // Em dash
        text = text.replace(/ -- /g, ' &mdash; ');
        text = text.replace(/--/g, '&ndash;');
        return text;
      }

      function flushTable() {
        if (tableRows.length === 0) return;
        html += '<table>';
        tableRows.forEach((row, i) => {
          const cells = row.split('|').filter(c => c.trim() !== '');
          if (i === 0) {
            html += '<thead><tr>' + cells.map(c => '<th>' + inlineFormat(c.trim()) + '</th>').join('') + '</tr></thead><tbody>';
          } else if (i > 1) { // skip separator row
            html += '<tr>' + cells.map(c => '<td>' + inlineFormat(c.trim()) + '</td>').join('') + '</tr>';
          }
        });
        html += '</tbody></table>';
        tableRows = [];
      }

      function closeList() {
        if (inList) {
          html += listType === 'ul' ? '</ul>' : '</ol>';
          inList = false;
        }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code blocks
        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '</pre>';
            inCode = false;
          } else {
            closeList();
            flushTable();
            inCode = true;
            html += '<pre>';
          }
          continue;
        }
        if (inCode) {
          html += escHtml(line) + '\n';
          continue;
        }

        // Table rows
        if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
          closeList();
          tableRows.push(line.trim());
          // Check if next line is also a table row
          if (i + 1 >= lines.length || !(lines[i+1].trim().startsWith('|') && lines[i+1].trim().endsWith('|'))) {
            flushTable();
          }
          continue;
        } else if (tableRows.length > 0) {
          flushTable();
        }

        // Empty line
        if (line.trim() === '') {
          closeList();
          continue;
        }

        // Headings
        const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
        if (headingMatch) {
          closeList();
          const level = headingMatch[1].length;
          const text = inlineFormat(headingMatch[2]);
          const id = headingMatch[2].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          html += `<h${level} id="${id}">${text}</h${level}>`;
          continue;
        }

        // Horizontal rule
        if (line.trim().match(/^[-*_]{3,}$/)) {
          closeList();
          html += '<hr>';
          continue;
        }

        // Blockquote
        if (line.trim().startsWith('> ')) {
          closeList();
          html += '<blockquote>' + inlineFormat(line.trim().substring(2)) + '</blockquote>';
          continue;
        }

        // Unordered list
        if (line.trim().match(/^[-*]\s/)) {
          if (!inList || listType !== 'ul') {
            closeList();
            html += '<ul>';
            inList = true;
            listType = 'ul';
          }
          html += '<li>' + inlineFormat(line.trim().replace(/^[-*]\s/, '')) + '</li>';
          continue;
        }

        // Ordered list
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList || listType !== 'ol') {
            closeList();
            html += '<ol>';
            inList = true;
            listType = 'ol';
          }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        // Paragraph
        closeList();
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      closeList();
      flushTable();
      if (inCode) html += '</pre>';

      return html;
    }

    // Build table of contents from headings
    function buildToc(html) {
      const headings = [];
      const re = /<h([23])\s+id="([^"]*)">(.*?)<\/h[23]>/g;
      let match;
      while ((match = re.exec(html)) !== null) {
        headings.push({ level: parseInt(match[1]), id: match[2], text: match[3].replace(/<[^>]+>/g, '') });
      }
      if (headings.length < 3) return '';
      let toc = '<div class="toc"><h3>Contents</h3>';
      toc += '<input type="text" class="toc-search" placeholder="Filter sections...">';
      toc += '<ul>';
      headings.forEach(h => {
        toc += `<li class="depth-${h.level}"><a href="#${h.id}">${h.text}</a></li>`;
      });
      toc += '</ul></div>';
      return toc;
    }

    // Enhance navigation after content is rendered
    function enhanceNavigation() {
      var toc = document.querySelector('.toc');
      var content = document.getElementById('content');
      if (!toc || !content) return;

      // Wrap TOC + content in grid layout
      var grid = document.createElement('div');
      grid.className = 'page-grid';
      content.parentNode.insertBefore(grid, content);
      grid.appendChild(toc);
      var body = document.createElement('div');
      body.className = 'md-body';
      while (content.firstChild) body.appendChild(content.firstChild);
      content.appendChild(grid);
      grid.appendChild(body);

      // Inject anchor links into h2 and h3 elements
      body.querySelectorAll('h2[id], h3[id]').forEach(function(h) {
        var a = document.createElement('a');
        a.className = 'anchor';
        a.href = '#' + h.id;
        a.textContent = '#';
        a.setAttribute('aria-label', 'Link to this section');
        h.appendChild(a);
      });

      // Active heading tracking with IntersectionObserver
      var tocLinks = toc.querySelectorAll('a[href^="#"]');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            tocLinks.forEach(function(a) { a.classList.remove('active'); });
            var link = toc.querySelector('a[href="#' + entry.target.id + '"]');
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -80% 0px' });
      body.querySelectorAll('h2[id], h3[id]').forEach(function(h) { observer.observe(h); });

      // Smooth scroll on TOC click
      tocLinks.forEach(function(a) {
        a.addEventListener('click', function(e) {
          var target = document.getElementById(a.getAttribute('href').slice(1));
          if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); history.replaceState(null, '', a.getAttribute('href')); }
        });
      });

      // TOC search filter
      var searchInput = toc.querySelector('.toc-search');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          var query = this.value.toLowerCase();
          toc.querySelectorAll('li').forEach(function(li) {
            var text = li.textContent.toLowerCase();
            li.style.display = (!query || text.indexOf(query) !== -1) ? '' : 'none';
          });
        });
      }
    }

    // Document titles
    const titles = {
      publication: 'Final Publication',
      flora: 'Flora Survey — Plant Biodiversity',
      fauna: 'Fauna Survey — Animal Biodiversity',
      fungi: 'Fungi Survey — Mycological Biodiversity',
      aquatic: 'Aquatic Analysis — Salmon as Keystone',
      synthesis: 'Network Synthesis — Ecological Cascades',
      schemas: 'Foundation Schemas & Source Index',
      verification: 'Verification Report'
    };

    // Load and render
    const params = new URLSearchParams(window.location.search);
    const doc = params.get('doc') || 'publication';

    document.title = (titles[doc] || doc) + ' — PNW Rainforest Biodiversity';

    // Highlight active nav
    document.querySelectorAll('header nav a').forEach(a => {
      if (a.href.includes('doc=' + doc)) a.classList.add('active');
    });

    fetch('research/' + doc + '.md')
      .then(r => {
        if (!r.ok) throw new Error('Document not found');
        return r.text();
      })
      .then(md => {
        const html = mdToHtml(md);
        const toc = buildToc(html);
        document.getElementById('content').innerHTML = toc + html;
        enhanceNavigation();
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p style="color:var(--salmon)">Error loading document: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
