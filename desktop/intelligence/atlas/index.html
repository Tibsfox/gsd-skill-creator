<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSD Code Atlas</title>
    <link rel="stylesheet" href="atlas.css" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary, #1a1b26);
      }
      #atlas-root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="atlas-root"></div>
    <script type="module">
      import { createAtlas, attachToHashRouting } from './index.js';
      const atlas = createAtlas(document.getElementById('atlas-root'));
      attachToHashRouting(atlas.coordinator);
    </script>
  </body>
</html>
