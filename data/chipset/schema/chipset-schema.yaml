# .chipset/schema/chipset-schema.yaml
# JSON Schema (draft-07) in YAML format for chipset configuration files.
# Validates the complete skill/agent/team assembly.

$schema: "http://json-schema.org/draft-07/schema#"
title: "GSD Chipset Configuration"
description: "Defines the complete skill/agent/team stack for a GSD project"
type: object
required:
  - schema_version
  - chipset
  - skills
  - agents
  - teams
  - routing
  - budget
properties:
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    description: "Schema version (semver major.minor)"
  chipset:
    type: object
    required: [name, description, version, project]
    properties:
      name:
        type: string
        minLength: 1
      description:
        type: string
      version:
        type: string
      project:
        type: string
        description: "Project identifier this chipset belongs to"
      created:
        type: string
        format: date
      updated:
        type: string
        format: date
  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, source, token_budget, priority, team]
      properties:
        name:
          type: string
          pattern: "^[a-z0-9-]+$"
        source:
          type: string
          description: "Path to SKILL.md file"
        token_budget:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?%$"
        priority:
          type: integer
          minimum: 1
          maximum: 100
          description: "Loading priority (higher = loaded first)"
        team:
          type: string
          description: "Team this skill belongs to"
        agents:
          type: array
          items:
            type: string
          description: "Agents that compose this skill"
        plan_origin:
          type: string
        phase_origin:
          type: string
        enabled:
          type: boolean
          default: true
        dependencies:
          type: array
          items:
            type: string
          description: "Other skill names this skill depends on"
  agents:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, description, skills, team, model]
      properties:
        name:
          type: string
          pattern: "^[a-z0-9-]+$"
        description:
          type: string
        skills:
          type: array
          items:
            type: string
          minItems: 1
        team:
          type: string
        model:
          type: string
          enum: [haiku, sonnet, opus, inherit]
        tools:
          type: string
          description: "Comma-separated tool list"
        permission_mode:
          type: string
          enum: [default, acceptEdits, dontAsk, bypassPermissions, plan]
  teams:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, description, topology, lead_agent, members]
      properties:
        name:
          type: string
          pattern: "^[a-z0-9-]+$"
        description:
          type: string
        topology:
          type: string
          enum: [leader-worker, pipeline, swarm, router, map-reduce, custom]
        lead_agent:
          type: string
        members:
          type: array
          items:
            type: string
          minItems: 1
        resource_locks:
          type: array
          items:
            type: string
          description: "File glob patterns this team exclusively owns"
        sync_points:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
              action:
                type: string
        message_bus:
          type: string
          description: "Path for inter-team filesystem messages"
  routing:
    type: object
    required: [rules, default_team, disambiguation]
    properties:
      rules:
        type: array
        minItems: 1
        items:
          type: object
          required: [intent_pattern, team, agents]
          properties:
            intent_pattern:
              type: string
              description: "Regex pattern matching user intent"
            team:
              type: string
            agents:
              type: array
              items:
                type: string
            skills:
              type: array
              items:
                type: string
            priority:
              type: integer
              minimum: 1
              maximum: 100
            description:
              type: string
      default_team:
        type: string
        description: "Fallback team when no routing rule matches"
      disambiguation:
        type: array
        items:
          type: object
          required: [patterns, strategy, winner]
          properties:
            patterns:
              type: array
              items:
                type: string
            strategy:
              type: string
              enum: [priority, specificity, context]
            winner:
              type: string
            rationale:
              type: string
  budget:
    type: object
    required: [ceiling_percent, headroom_percent, skill_budgets, team_budgets]
    properties:
      ceiling_percent:
        type: number
        maximum: 40
        description: "Maximum total skill token budget"
      headroom_percent:
        type: number
        description: "Reserved headroom within ceiling"
      skill_budgets:
        type: object
        description: "Per-skill budget allocations"
        additionalProperties:
          type: string
      team_budgets:
        type: object
        description: "Per-team aggregate budgets"
        additionalProperties:
          type: string
      loading_order:
        type: array
        items:
          type: string
        description: "Priority-ordered skill loading sequence"
      total_allocated:
        type: string
        pattern: "^[0-9]+(\\.[0-9]+)?%$"
