[display]
viewport=1920x1080

[gource]
seconds-per-day=0.5
auto-skip-seconds=1
file-idle-time=0
highlight-users=true
highlight-all-users=true
hide=mouse,progress
camera-mode=overview
multi-sampling=true
bloom-multiplier=1.0
bloom-intensity=0.75
user-scale=1.5
user-font-size=18
font-size=22
stop-at-end=true
output-framerate=60
key=true
