  signage: "oak_sign, oak_wall_sign"
  glass: "glass, glass_pane"
  error_path: "red_concrete, red_glazed_terracotta"
  foundations: "smooth_stone, polished_andesite"
  roofing: "dark_oak_slab, dark_oak_stairs"
  enrichment: "bookshelf, lectern"
