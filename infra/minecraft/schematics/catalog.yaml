# GSD Knowledge World Schematic Catalog
# Authoritative index of all schematics in the library.
# Every .litematic file MUST have an entry here.
#
# Naming convention: category-name-version.litematic
#   category: template | architecture | education | amiga | community
#   name: lowercase-hyphenated descriptive name
#   version: semantic version with dashes (1-0, 1-1, 2-0)

catalog_version: "1.0"
naming_convention: "category-name-version.litematic"
generated_at: null  # Updated when validate-schematics.sh runs

categories:
  templates:
    description: "Reusable building templates for Knowledge World construction"
    directory: "templates/"
  architecture:
    description: "System architecture visualizations (pipelines, topologies, schemas)"
    directory: "architecture/"
  education:
    description: "Concept-teaching builds from the educational curriculum"
    directory: "education/"
  amiga:
    description: "Amiga-inspired designs and pixel art recreations"
    directory: "amiga/"
  community:
    description: "User-contributed schematics"
    directory: "community/"

schematics:
