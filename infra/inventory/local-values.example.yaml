# Local Values Example: 64GB Generous Workstation
#
# Generated by generate-local-values.sh from hardware-capabilities.yaml + resource-budget.yaml
# This is an EXAMPLE showing the complete output schema for a 64GB generous-tier machine.
#
# Run `infra/scripts/generate-local-values.sh` to produce the actual
# local-values.yaml for your machine at infra/local/local-values.yaml
#
# Downstream consumers:
#   Phase 171 (kickstart)        -- reads system section
#   Phase 172 (VM provisioning)  -- reads resources section
#   Phase 173-175 (Minecraft)    -- reads minecraft section (JVM, server, mods)
#   Phase 170-171 (PXE/kickstart)-- reads network section
#   Phase 182 (UAE/Amiga)        -- reads gpu + audio sections
#   Phase 180 (hypervisor)       -- reads hypervisor section
#   Phase 179 (distro)           -- reads distro section
#   All phases (feature gating)  -- reads capabilities section

# --- System Identity (Phase 171: kickstart) ---
# Used by kickstart templates to set hostname, domain, and timezone
system:
  tier: generous                   # minimal (16GB) | comfortable (32GB) | generous (64GB+)
  hostname_prefix: gsd             # Base hostname for provisioned VMs
  domain: gsd.local                # DNS domain for the GSD network
  timezone: UTC                    # System timezone (UTC recommended for servers)

# --- Resource Allocation (Phase 172: VM provisioning) ---
# Drives VM sizing in provision.sh and vm-ctl.sh
resources:
  host_reserved:
    ram_gb: 4                      # Non-negotiable host OS floor
    cores: 2                       # Non-negotiable host OS floor
  minecraft_vm:
    ram_gb: 16                     # Minecraft VM allocation (capped at 16GB)
    cores: 7                       # Minecraft VM allocation (capped at 8)
    storage_gb: 50                 # Base storage allocation for Minecraft VM
  unallocated:
    ram_gb: 44                     # Available for additional VMs
    cores: 7                       # Available for additional VMs

# --- Minecraft Server (Phase 173-175: server foundation/config) ---
# Configures JVM flags, server.properties, and mod settings
minecraft:
  jvm:
    heap_min_mb: 4096              # Minimum JVM heap (tier-adaptive)
    heap_max_mb: 15872             # Maximum JVM heap = (mc_ram_gb * 1024) - 512
    gc_type: ZGC                   # ZGC for generous (>= 8GB heap), G1GC otherwise
    gc_flags: "-XX:+UseZGC -XX:+ZGenerational"
    extra_flags: "-XX:+ParallelRefProcEnabled -XX:+DisableExplicitGC -XX:+AlwaysPreTouch"
  server:
    view_distance: 24              # Chunks: 10 (minimal) | 16 (comfortable) | 24 (generous)
    simulation_distance: 12        # Chunks: 6 (minimal) | 10 (comfortable) | 12 (generous)
    max_players: 20                # Players: 5 (minimal) | 10 (comfortable) | 20 (generous)
    network_compression_threshold: 256
    entity_broadcast_range: 150    # Blocks: 50 (minimal) | 100 (comfortable) | 150 (generous)
  mods:
    syncmatica_max_schematic_size: 1000000  # 100K (minimal) | 500K (comfortable) | 1M (generous)

# --- Network (Phase 170-171: PXE/kickstart) ---
# Configures dnsmasq PXE ranges, game ports, and network interface selection
network:
  management_interface: enp3s0     # First ethernet interface with state=up
  pxe_dhcp_range_start: 192.168.122.200
  pxe_dhcp_range_end: 192.168.122.250
  game_port: 25565                 # Minecraft server port
  rcon_port: 25575                 # RCON remote management port
  has_bridge_support: true         # Whether bridge interfaces are available

# --- GPU Configuration (Phase 182: UAE) ---
# From assess-gpu.sh classification of hardware-capabilities.yaml
gpu:
  compute_capable: true            # NVIDIA CUDA or AMD compute available
  compute_level: advanced          # none | basic (Intel) | standard (AMD) | advanced (NVIDIA CUDA)
  rendering_capable: true          # GPU with working driver available
  rendering_backend: nvidia        # nvidia | amdgpu | mesa | none
  passthrough_viable: true         # IOMMU + discrete GPU + KVM available
  vram_tier: high                  # none | low (1-4GB) | medium (4-8GB) | high (8GB+)
  uae_display: vulkan              # vulkan (modern) | opengl (older) | software (no GPU)

# --- Audio Configuration (Phase 182: UAE) ---
# From assess-audio.sh classification of hardware-capabilities.yaml
audio:
  usable: true                     # Audio output available
  server: pipewire                 # pipewire | pulseaudio | none
  routing_method: pipewire         # pipewire | pulse | direct_alsa | none
  uae_audio_backend: sdl           # sdl (sound server) | alsa (direct) | none
  uae_midi_backend: alsa           # alsa (universal Linux MIDI) | none
  recommended_sample_rate: 48000   # 48000 (PipeWire native) | 44100 (PulseAudio/ALSA)
  recommended_buffer_size: 256     # 256 (PipeWire) | 512 (PulseAudio) | 1024 (ALSA)

# --- Hypervisor (Phase 172/180: VM provisioning/abstraction) ---
# Determines which VM backend to use and container fallback availability
hypervisor:
  preferred: kvm                   # kvm (preferred) | vmware | virtualbox | container | none
  container_runtime: podman        # podman (preferred) | docker | none
  can_nested_virtualize: true      # Nested virtualization support

# --- Distribution (Phase 179: distro abstraction) ---
# Drives package manager and firewall abstraction layer selection
distro:
  id: centos                       # OS identifier from /etc/os-release
  package_manager: dnf             # dnf | apt | pacman | unknown
  firewall: firewalld              # firewalld | ufw | none
  tier: 1                          # 1 (fully supported) | 2 (community)
  selinux: enforcing               # enforcing | permissive | disabled | absent

# --- Capabilities Summary (feature gating for all phases) ---
# Boolean flags consumed by every phase for conditional feature activation
capabilities:
  can_run_vms: true                # Hardware virtualization available
  can_passthrough_gpu: true        # GPU passthrough to VMs possible
  has_audio_output: true           # Audio playback available
  has_midi: true                   # MIDI hardware detected
  has_ethernet: true               # Wired network available
  has_bridge_support: true         # Network bridge interfaces available
  has_usb3: true                   # USB 3.0+ controllers available
  is_tier1_distro: true            # Tier 1 supported distribution
