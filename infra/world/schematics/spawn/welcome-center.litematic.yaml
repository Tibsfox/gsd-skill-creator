  dimensions:
    x: 18    # 16 + 2 buffer
    y: 9     # Floor prep through roof
    z: 18

  origin:
    x: 14    # 1 block buffer west of building
    y: 63    # 1 block below floor for foundation
    z: -9    # 1 block buffer north

  description: "Welcome center with 4 information panels: Knowledge World intro, Litematica guide, district map, server rules"

  tags: ["spawn", "welcome", "orientation", "information"]

  dependencies:
