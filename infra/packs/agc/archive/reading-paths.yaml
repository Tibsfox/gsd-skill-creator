# AGC Documentation Archive -- Reading Paths
# Curated learning sequences for different study depths
# Generated: 2026-02-18

metadata:
  version: 1
  generated: "2026-02-18"
  catalog_ref: "infra/packs/agc/archive/catalog.yaml"

paths:
  quick_start:
    name: "Quick Start"
    description: "Essential AGC orientation -- 10 documents covering hardware, software, and operations basics"
    target_audience: "New learners wanting AGC overview in 2-4 hours of reading"
    document_count: 10
    estimated_reading_time: "3-4 hours"
    sequence:
      - order: 1
        doc_id: "agc-arch-010"
        why: "Modern hardware overview written for contemporary engineers. Provides the big picture of all GNC components before diving into details."
        reading_notes: "Focus on the AGC section and DSKY description. Skim IMU/optics for now."

      - order: 2
        doc_id: "agc-arch-005"
        why: "Block II architecture overview -- the actual flight computer. Establishes memory model, register set, and execution architecture."
        reading_notes: "Understand fixed vs erasable memory distinction and the 15-bit word length."

      - order: 3
        doc_id: "agc-arch-004"
        why: "The instruction set that ran on the Moon. Without understanding the ISA, source code listings are opaque."
        reading_notes: "Focus on basic instructions (TC, CA, AD, MASK). Extra-codes come later."

      - order: 4
        doc_id: "agc-iface-002"
        why: "The DSKY was the astronaut's only interface to the AGC. Understanding verb-noun interaction is key to understanding operations."
        reading_notes: "Learn the verb-noun paradigm and how the electroluminescent display works."

      - order: 5
        doc_id: "agc-soft-007"
        why: "The guidance equations that landed on the Moon. The mathematical core of what the AGC actually computed during descent."
        reading_notes: "Focus on P63 (braking) and P66 (manual landing) sections. Math-heavy but foundational."

      - order: 6
        doc_id: "agc-soft-003"
        why: "The actual Apollo 11 LM source code. Seeing real flight software grounds everything learned so far in concrete code."
        reading_notes: "Browse the module structure and comments. Do not try to read linearly -- use as reference."

      - order: 7
        doc_id: "agc-ops-003"
        why: "What actually happened on Apollo 11. Documents the 1202/1201 alarms and real GNC performance."
        reading_notes: "Focus on the GNC section and program alarm analysis. Cross-reference with guidance equations."

      - order: 8
        doc_id: "agc-mgmt-001"
        why: "Tindallgrams capture the human side -- decisions, debates, tradeoffs. Software engineering before the term existed."
        reading_notes: "Start with the Apollo 11 alarm memos and software priority discussions."

      - order: 9
        doc_id: "agc-arch-009"
        why: "Zero in-flight failures across 17 computers. Understanding why requires understanding the reliability engineering approach."
        reading_notes: "Focus on the reliability statistics and design-for-reliability philosophy."

      - order: 10
        doc_id: "agc-edu-005"
        why: "The Virtual AGC project portal -- your gateway to everything else. Bookmark this for ongoing study."
        reading_notes: "Explore the document library, source code listings, and simulator downloads."

