chipset_preview:
  description: |
    Preview of the AGC educational chipset configuration. This follows the
    GSD-OS chipset schema (.chipset/schema/chipset-schema.yaml) and will be
    finalized in Phase 222 (AGC GSD-OS Integration). The preview defines
    skills, agents, and teams for the AGC educational module.
  name: "agc-educational"
  version: "0.1.0"
  project: "gsd-skill-creator"

  skills:
    - name: "agc-assembler"
      description: "AGC assembly language reference and assistance"
      source: "infra/packs/agc/skills/agc-assembler/SKILL.md"
      token_budget: "1.5%"
      priority: 60
      team: "agc-education"

    - name: "agc-debugger"
      description: "AGC program debugging assistance using register/memory inspection"
      source: "infra/packs/agc/skills/agc-debugger/SKILL.md"
      token_budget: "1.0%"
      priority: 55
      team: "agc-education"

    - name: "agc-architecture-reference"
      description: "AGC hardware and software architecture reference (from catalog)"
      source: "infra/packs/agc/skills/agc-architecture-reference/SKILL.md"
      token_budget: "2.0%"
      priority: 70
      team: "agc-education"

    - name: "agc-dsky-commands"
      description: "DSKY VERB/NOUN command reference and guidance"
      source: "infra/packs/agc/skills/agc-dsky-commands/SKILL.md"
      token_budget: "0.5%"
      priority: 50
      team: "agc-education"

    - name: "agc-executive-guide"
      description: "AGC Executive scheduler educational guide"
      source: "infra/packs/agc/skills/agc-executive-guide/SKILL.md"
      token_budget: "1.0%"
      priority: 65
      team: "agc-education"

  agents:
    - name: "agc-simulator"
      description: "Manages AGC simulation execution: loading programs, running, stepping, breakpoints"
      skills: ["agc-assembler", "agc-debugger"]
      team: "agc-education"
      model: "opus"

    - name: "agc-study-guide"
      description: "Guides learners through AGC concepts using the architecture mapping and catalog"
      skills: ["agc-architecture-reference", "agc-executive-guide"]
      team: "agc-education"
      model: "opus"

    - name: "agc-exercise-runner"
      description: "Manages educational exercises: presents challenges, validates solutions, provides hints"
      skills: ["agc-assembler", "agc-dsky-commands", "agc-executive-guide"]
      team: "agc-education"
      model: "opus"

  teams:
    - name: "agc-education"
      description: "Apollo Guidance Computer educational simulation team"
      agents: ["agc-simulator", "agc-study-guide", "agc-exercise-runner"]
      coordination: "sequential"
      lead: "agc-study-guide"

  routing:
    description: "Trigger routing for AGC educational skills"
    triggers:
      - pattern: "agc|apollo|guidance computer"
        skill: "agc-architecture-reference"
        confidence: 0.9
      - pattern: "assemble|assembly|instruction"
        skill: "agc-assembler"
        confidence: 0.7
      - pattern: "debug|breakpoint|register|step"
        skill: "agc-debugger"
        confidence: 0.8
      - pattern: "verb|noun|dsky|display"
        skill: "agc-dsky-commands"
        confidence: 0.8
      - pattern: "executive|scheduler|waitlist|core set|bailout|1202"
        skill: "agc-executive-guide"
        confidence: 0.85
