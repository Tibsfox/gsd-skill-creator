# Knowledge Pack Chipset Definition
# Defines KP- prefixed agents, skills, teams, and token budget
# for the GSD Foundational Knowledge Pack system.
# Phase 244 - Chipset & Agent Definitions

name: knowledge-packs
description: >
  Agent infrastructure for generating, validating, and reviewing
  35 foundational knowledge packs across 3 tiers (Core Academic,
  Applied, Specialized). Uses map-reduce coordination for parallel
  content generation with merge validation.

prefix: KP
prefix_convention: "highway numbering (KP-01 through KP-06)"

agents:
  - id: KP-01
    name: kp-coordinator
    role: coordinator
    description: >
      Orchestrates the 35-pack content generation pipeline.
      Manages batch scheduling (7 batches of 5 packs), tracks
      completion state, resolves cross-pack dependency ordering,
      and triggers validation after each batch.
    skills: [kp-pipeline-orchestration]
    tools: "Read, Glob, Grep"

  - id: KP-02
    name: kp-core-author
    role: content-generator
    description: >
      Generates Core Academic tier packs (PACK-01 through PACK-15).
      Creates vision documents, modules YAML, activities JSON,
      assessment frameworks, and resource catalogs for foundational
      subjects: math, science, technology, engineering, physics,
      chemistry, reading, critical thinking, problem solving,
      communication, history, geography, materials, business, statistics.
    skills: [kp-content-authoring, kp-core-academic-domain]
    tools: "Read, Write, Glob, Grep"
    pack_assignments:
      - MATH-101
      - SCI-101
      - TECH-101
      - ENGR-101
      - PHYS-101
      - CHEM-101
      - READ-101
      - CRIT-101
      - PROB-101
      - COMM-101
      - HIST-101
      - GEO-101
      - MFAB-101
      - BUS-101
      - STAT-101

  - id: KP-03
    name: kp-applied-author
    role: content-generator
    description: >
      Generates Applied & Practical tier packs (PACK-16 through PACK-25).
      Creates full content suites for practical skills: coding,
      data science, languages, psychology, environmental science,
      nutrition, economics, writing, logic, digital literacy.
    skills: [kp-content-authoring, kp-applied-domain]
    tools: "Read, Write, Glob, Grep"
    pack_assignments:
      - CODE-101
      - DATA-101
      - LANG-101
      - PSYCH-101
      - ENVR-101
      - NUTR-101
      - ECON-101
      - WRIT-101
      - LOG-101
      - DIGLIT-101

  - id: KP-04
    name: kp-specialized-author
    role: content-generator
    description: >
      Generates Specialized & Deepening tier packs (PACK-26 through PACK-35).
      Creates full content suites for deepening subjects: philosophy,
      theology, physical education, nature studies, home economics,
      visual arts, music, trades, astronomy, learning to learn.
    skills: [kp-content-authoring, kp-specialized-domain]
    tools: "Read, Write, Glob, Grep"
    pack_assignments:
      - PHILO-101
      - THEO-101
      - PE-101
      - NATURE-101
      - DOMESTIC-101
      - ART-101
      - MUSIC-101
      - TRADE-101
      - ASTRO-101
      - LEARN-101

  - id: KP-05
    name: kp-validator
    role: quality-assurance
    description: >
      Validates pack content against runtime schemas. Checks
      .skillmeta YAML against KnowledgePackSchema, modules YAML
      against ModulesFileSchema, activities JSON against
      PackActivitySchema. Verifies cross-pack dependency references
      resolve and learning outcome codes are unique.
    skills: [kp-content-validation]
    tools: "Read, Bash, Glob, Grep"

  - id: KP-06
    name: kp-reviewer
    role: quality-assurance
    description: >
      Reviews pack quality: educational accuracy, grade-level
      appropriateness, accessibility compliance, learning pathway
      coherence, and assessment alignment with stated outcomes.
      Checks parallel instruction patterns for token caching
      optimization across packs.
    skills: [kp-quality-review]
    tools: "Read, Glob, Grep"

skills:
  - name: kp-pipeline-orchestration
    skill_file: "infra/packs/knowledge/skills/kp-pipeline-orchestration/SKILL.md"
    token_budget: "1.0%"
    description: "Pack generation pipeline coordination and batch scheduling"

  - name: kp-content-authoring
    skill_file: "infra/packs/knowledge/skills/kp-content-authoring/SKILL.md"
    token_budget: "2.0%"
    description: "Pack content generation: vision docs, modules, activities, assessments, resources"
    shared_by: [KP-02, KP-03, KP-04]

  - name: kp-core-academic-domain
    skill_file: "infra/packs/knowledge/skills/kp-core-academic-domain/SKILL.md"
    token_budget: "1.0%"
    description: "Domain knowledge for 15 core academic subjects"

  - name: kp-applied-domain
    skill_file: "infra/packs/knowledge/skills/kp-applied-domain/SKILL.md"
    token_budget: "1.0%"
    description: "Domain knowledge for 10 applied & practical subjects"

  - name: kp-specialized-domain
    skill_file: "infra/packs/knowledge/skills/kp-specialized-domain/SKILL.md"
    token_budget: "1.0%"
    description: "Domain knowledge for 10 specialized & deepening subjects"

  - name: kp-content-validation
    skill_file: "infra/packs/knowledge/skills/kp-content-validation/SKILL.md"
    token_budget: "1.0%"
    description: "Schema validation, cross-pack reference checking, uniqueness enforcement"

  - name: kp-quality-review
    skill_file: "infra/packs/knowledge/skills/kp-quality-review/SKILL.md"
    token_budget: "1.0%"
    description: "Educational quality, accessibility, and caching pattern review"

token_budget_summary:
  total: "8.0%"
  ecosystem_ceiling: "40%"
  utilization: "20% of ceiling"
  breakdown:
    kp-pipeline-orchestration: "1.0%"
    kp-content-authoring: "2.0%"
    kp-core-academic-domain: "1.0%"
    kp-applied-domain: "1.0%"
    kp-specialized-domain: "1.0%"
    kp-content-validation: "1.0%"
    kp-quality-review: "1.0%"
  note: >
    kp-content-authoring is shared across 3 author agents (KP-02, KP-03, KP-04)
    and loaded once per session. Domain skills are agent-specific and loaded
    only when the respective tier's packs are being generated.

teams:
  - name: kp-content-pipeline
    team_file: "infra/packs/knowledge/teams/kp-content-pipeline.yaml"
    description: "Map-reduce pipeline for parallel pack content generation"
    topology: map-reduce
    agents: [KP-01, KP-02, KP-03, KP-04, KP-05, KP-06]

