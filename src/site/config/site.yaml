# Site configuration — customize these values for your deployment
title: "My Site"
description: "Educational resources, essays, and open knowledge for curious minds"
url: https://example.com
author: "Site Author"
language: en

agent:
  llms_txt: true
  llms_full: true
  agents_md: true
  schema_org: true
  markdown_mirror: true

wordpress:
  url: https://example.com/wp
  api: https://example.com/wp/wp-json/wp/v2
  comments_enabled: true
  comments_moderation: true

deploy:
  method: ftp
  host: ftp.example.com
  user: "${DEPLOY_USER}"
  path: /public_html
  exclude:
    - "*.map"
    - ".DS_Store"
