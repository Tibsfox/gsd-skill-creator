# Cross-Module Competencies

cross_module_competencies:
  - name: "Philosophical Questioning"
    description: "Ability to ask probing questions that reveal assumptions and open new lines of inquiry"
    assessed_in: ["PHILO-101-M1", "PHILO-101-M2", "PHILO-101-M3", "PHILO-101-M4", "PHILO-101-M5"]

  - name: "Logical Reasoning"
    description: "Ability to construct, evaluate, and critique arguments using valid reasoning"
    assessed_in: ["PHILO-101-M1", "PHILO-101-M2", "PHILO-101-M3", "PHILO-101-M4"]

  - name: "Perspective-Taking"
    description: "Ability to understand and engage seriously with viewpoints different from one's own"
    assessed_in: ["PHILO-101-M1", "PHILO-101-M3", "PHILO-101-M4", "PHILO-101-M5"]

  - name: "Intellectual Honesty"
    description: "Commitment to following arguments where they lead, even when conclusions are uncomfortable"
    assessed_in: ["PHILO-101-M1", "PHILO-101-M2", "PHILO-101-M3", "PHILO-101-M4", "PHILO-101-M5"]

  - name: "Reflective Judgment"
    description: "Ability to make reasoned judgments under conditions of uncertainty and genuine disagreement"
    assessed_in: ["PHILO-101-M3", "PHILO-101-M4", "PHILO-101-M5"]

# Progression Pathways

progression_pathways:
  - name: "Linear Pathway"
    description: "M1 -> M2 -> M3 -> M4 -> M5"
    rationale: "Wonder and questioning are foundational; logic enables deeper work in ethics and epistemology; aesthetics builds on all prior modules"

  - name: "Ethics-First Pathway"
    description: "M1 -> M3 -> M2 -> M4 -> M5"
    rationale: "For learners drawn to moral questions; ethics motivates learning logic and epistemology as tools for better moral reasoning"

  - name: "Knowledge-Focused Pathway"
    description: "M1 -> M2 -> M4 -> M3 -> M5"
    rationale: "For learners interested in science and truth; logic and epistemology before ethics and aesthetics"

  - name: "Creative-Contemplative Pathway"
    description: "M1 -> M5 -> M3 -> M4 -> M2"
    rationale: "For learners drawn to art, beauty, and meaning; aesthetics motivates deeper inquiry into ethics, knowledge, and logic"

