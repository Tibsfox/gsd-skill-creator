# Difficulty Rating

difficulty:
  conceptual_demand: high
  technical_demand: low
  prerequisites_required: low
  notes: "Philosophy demands deep thinking but requires no special tools or technical knowledge. Difficulty lies in reasoning, not prerequisites. Foundation activities are concrete and discussion-based; advanced activities engage with abstract concepts and primary texts."

# Content Flags

content_flags:
  - flag: "existential_questions"
    description: "Modules on meaning and consciousness may raise existential concerns (death, purpose, suffering)"
    mitigation: "Age-appropriate framing; focus on constructive exploration; parent guidance provided; connections to support resources if needed"

  - flag: "moral_disagreement"
    description: "Ethics module intentionally presents dilemmas where reasonable people disagree"
    mitigation: "Emphasis on reasoning quality, not arriving at particular conclusions; respect for diverse moral traditions; no indoctrination"

  - flag: "religious_intersection"
    description: "Some philosophical questions overlap with religious concerns (existence of God, nature of reality, morality)"
    mitigation: "Pack teaches philosophical methods (reason, argument, evidence), not religious doctrines; respects all traditions while maintaining philosophical rigor"

