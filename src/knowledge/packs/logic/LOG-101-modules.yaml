# Standards Alignment
standards_alignment:
  - framework: "Common Core Mathematics Standards"
    version: 2010
    alignments:
      MP3: "Construct viable arguments and critique the reasoning of others"
      MP7: "Look for and make use of structure"

  - framework: "C3 Framework (Civics, Government, Economics)"
    version: 2013
    alignments:
      "Dimension 3": "Evaluate sources and use evidence"
      "Dimension 4": "Construct and defend claims using evidence"

# Content Flags
content_flags:
  - flag: abstraction_leap
    description: "Transition from concrete (sorting games) to abstract (symbolic notation) can be challenging for some learners"
    mitigation: "Scaffold carefully. Use multiple modalities. Revisit key concepts at higher levels."

  - flag: math_anxiety_trigger
    description: "Formal notation (∧, ∨, ¬) may trigger math anxiety in some learners"
    mitigation: "Introduce notation gradually. Emphasize that it's shorthand for English ideas, not new concepts."

# Related Packs
related_packs:
  - id: MATH-101
    relationship: "Logic is the foundation of mathematical proof"

  - id: CODE-101
    relationship: "Boolean logic and algorithms are applied logic"

  - id: CRIT-101
    relationship: "Critical thinking builds on fallacy recognition and argument analysis"

