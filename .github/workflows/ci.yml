name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  private-files:
    name: Block private files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for .planning files
        run: |
          if git ls-tree -r --name-only HEAD | grep -q '^\.planning/'; then
            echo "::error::.planning/ files detected — these are private and must not be pushed"
            git ls-tree -r --name-only HEAD | grep '^\.planning/'
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Check for HIGH and CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # v1.49.923: macos-latest folded into this matrix as a STAGED `continue-on-error`
    # non-blocking leg — per-push cross-platform signal without ship-blocking power.
    # v1.49.928: FLIPPED TO LOAD-BEARING. The `continue-on-error` line (gated on
    # `matrix.os == 'macos-latest'`) was deleted after 3 consecutive green macOS
    # pushes accumulated ACROSS ORGANIC CHURN (`node tools/ci/macos-flip-readiness.mjs`
    # -> READY 3/3, the deliberate flip gate). Both legs now contribute to the
    # run-level conclusion the pre-tag-gate ci-gate (tools/pre-tag-gate.sh step 4)
    # reads, so a macOS-only failure blocks a ship exactly like an ubuntu failure.
    # The flip was paired with the mandatory update to tests/integration/
    # ci-matrix-parity.test.ts (the #10461 drift-guard) — a silent flip fails it.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Build the dist/ tree before tests — several tests (e.g.
      # src/intelligence/__tests__/c12-write-briefing.test.ts, the
      # intelligence-investigator skill harness, dashboard generator
      # smoke tests) import compiled artifacts from dist/intelligence/.
      # Added at v1.49.597 ship-pipeline; closes the silent "test depends
      # on dist/ but CI doesn't build" gap that surfaced as 4 c12-write-
      # briefing failures.
      - run: npm run build
      - name: Generate Grove arena snapshot (fixture for grove-migration-live tests)
        run: |
          npx tsx tools/import-filesystem-skills.ts \
            --skills .claude/skills \
            --skills examples/skills \
            --agents .claude/agents \
            --agents examples/agents/gsd \
            --teams examples/teams \
            --chipsets data/chipset
      - run: npx vitest run
      # v1.49.914: tools/+scripts/ suite is NOT covered by the main vitest config
      # (vitest.config.ts scopes to src/ .college/ tests/ www/). Enforce it in CI too,
      # not just at pre-tag-gate (closes the v1.49.913 OPENED single-enforcement-point gap).
      - run: npx vitest run --config vitest.tools.config.mjs
      # node:test files (Node built-in runner; vitest can't execute them)
      - run: node tools/check-tools-test-coverage.mjs --run-node-test
