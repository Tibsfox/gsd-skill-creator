name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  private-files:
    name: Block private files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check for .planning files
        run: |
          if git ls-tree -r --name-only HEAD | grep -q '^\.planning/'; then
            echo "::error::.planning/ files detected — these are private and must not be pushed"
            git ls-tree -r --name-only HEAD | grep '^\.planning/'
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - name: Check for HIGH and CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # v1.49.923: macos-latest folded into this matrix as a STAGED `continue-on-error`
    # non-blocking leg — per-push cross-platform signal without ship-blocking power.
    # v1.49.928: FLIPPED TO LOAD-BEARING. The `continue-on-error` line (gated on
    # `matrix.os == 'macos-latest'`) was deleted after 3 consecutive green macOS
    # pushes accumulated ACROSS ORGANIC CHURN (`node tools/ci/macos-flip-readiness.mjs`
    # -> READY 3/3, the deliberate flip gate). Both legs now contribute to the
    # run-level conclusion the pre-tag-gate ci-gate (tools/pre-tag-gate.sh step 4)
    # reads, so a macOS-only failure blocks a ship exactly like an ubuntu failure.
    # The flip was paired with the mandatory update to tests/integration/
    # ci-matrix-parity.test.ts (the #10461 drift-guard) — a silent flip fails it.
    # v1.49.985 (Phase 4): windows-latest folded in as a STAGED `continue-on-error`
    # leg, mirroring the v1.49.923 macOS staging — per-push cross-platform signal
    # WITHOUT ship-blocking power while the suite's Unix assumptions (path separators,
    # ESM import URLs, cmd.exe shell quoting, unix-only spawns) were driven out.
    # Phase 4 rung 3 (2026-06-06): FLIPPED TO LOAD-BEARING. The `continue-on-error`
    # line (gated on `matrix.os == 'windows-latest'`) was deleted after 3 consecutive
    # green windows pushes accumulated ACROSS ORGANIC CHURN (`node tools/ci/windows-
    # flip-readiness.mjs` -> READY 3/3, the deliberate flip gate). All three legs now
    # contribute to the run-level conclusion the pre-tag-gate ci-gate reads, so a
    # windows-only failure blocks a ship exactly like an ubuntu failure. The flip was
    # paired with the mandatory ci-matrix-parity.test.ts update (#10461 drift-guard) —
    # a silent flip fails it. The job-level `defaults.run.shell: bash` keeps the multi-
    # line run steps (the Grove fixture-gen prelude) + npm/npx invocations on Git Bash
    # on the windows runner instead of PowerShell, so all three legs run identical
    # step scripts.
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      # Build the dist/ tree before tests — several tests (e.g.
      # src/intelligence/__tests__/c12-write-briefing.test.ts, the
      # intelligence-investigator skill harness, dashboard generator
      # smoke tests) import compiled artifacts from dist/intelligence/.
      # Added at v1.49.597 ship-pipeline; closes the silent "test depends
      # on dist/ but CI doesn't build" gap that surfaced as 4 c12-write-
      # briefing failures.
      - run: npm run build
      - name: Generate Grove arena snapshot (fixture for grove-migration-live tests)
        run: |
          npx tsx tools/import-filesystem-skills.ts \
            --skills .claude/skills \
            --skills examples/skills \
            --agents .claude/agents \
            --agents examples/agents/gsd \
            --teams examples/teams \
            --chipsets data/chipset
      - run: npx vitest run
      # v1.49.914: tools/+scripts/ suite is NOT covered by the main vitest config
      # (vitest.config.ts scopes to src/ .college/ tests/ www/). Enforce it in CI too,
      # not just at pre-tag-gate (closes the v1.49.913 OPENED single-enforcement-point gap).
      - run: npx vitest run --config vitest.tools.config.mjs
      # node:test files (Node built-in runner; vitest can't execute them)
      - run: node tools/check-tools-test-coverage.mjs --run-node-test

  cargo:
    name: Cargo Test (no-default-features)
    runs-on: ubuntu-latest
    # v1.49.936 (CF4a): STAGED non-blocking cargo lane — the FIRST CI job that compiles
    # the Rust/Tauri crate (src-tauri/). Followed the v1.49.923 macOS staging pattern
    # (#10463): a job-level `continue-on-error: true` kept a cargo failure from blocking a
    # ship while the lane proved itself across an N-green window.
    # v1.49.939: FLIPPED TO LOAD-BEARING. The `continue-on-error: true` line was DELETED
    # after the cargo flip-readiness gate (`node tools/ci/cargo-flip-readiness.mjs`)
    # reached READY 3/3. That gate uses a LANE-STABILITY model (not the macOS organic-churn
    # model): every push fully recompiles the crate, so consecutive green cargo runs on
    # commits that did not modify the lane definition ARE the track record. The cargo job
    # is an INDEPENDENT leaf (no `needs:`), so with `continue-on-error` gone its failure
    # now folds into the RUN-LEVEL conclusion the pre-tag-gate ci-gate (tools/pre-tag-gate.sh
    # step 4) reads — a cargo failure blocks a ship exactly like an ubuntu test failure.
    # The flip was paired with the mandatory inversion of the STAGED assertion in
    # tests/integration/ci-matrix-parity.test.ts (the #10461 drift-guard) — a silent flip
    # fails it. Cargo's promotion is a two-rung sequence (staged v1.49.936 -> load-bearing
    # v1.49.939; no decoupled-nightly first rung, unlike the macOS v920->v923->v928 arc).
    # `--no-default-features` keeps the build minimal + explicit; the GPU-only `cuda`
    # and DB-bound `postgres` features are `optional` and already off (there is no
    # `[features] default` list), so they stay excluded either way (GH runners have
    # neither a GPU nor a DB). Local baseline at introduction: 848 passed / 0 failed
    # / 1 ignored (verified headless, from a clean `cargo clean -p gsd-os`).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      # Tauri 2.x links webkit2gtk-4.1 on Linux; the GH ubuntu image does not ship it.
      # Deps per README.md "Build from source (Ubuntu/Debian)", plus pkg-config (the
      # webkit2gtk-sys build probe; preinstalled on GH runners but listed for self-containment).
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential pkg-config curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      # GH ubuntu-latest ships a stable Rust toolchain (rustup); no setup action needed.
      - name: cargo test (no default features)
        run: cargo test --no-default-features --manifest-path src-tauri/Cargo.toml
