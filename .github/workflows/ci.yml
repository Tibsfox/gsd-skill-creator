name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  private-files:
    name: Block private files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for .planning files
        run: |
          if git ls-tree -r --name-only HEAD | grep -q '^\.planning/'; then
            echo "::error::.planning/ files detected — these are private and must not be pushed"
            git ls-tree -r --name-only HEAD | grep '^\.planning/'
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Check for HIGH and CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Build the dist/ tree before tests — several tests (e.g.
      # src/intelligence/__tests__/c12-write-briefing.test.ts, the
      # intelligence-investigator skill harness, dashboard generator
      # smoke tests) import compiled artifacts from dist/intelligence/.
      # Added at v1.49.597 ship-pipeline; closes the silent "test depends
      # on dist/ but CI doesn't build" gap that surfaced as 4 c12-write-
      # briefing failures.
      - run: npm run build
      - name: Generate Grove arena snapshot (fixture for grove-migration-live tests)
        run: |
          npx tsx tools/import-filesystem-skills.ts \
            --skills .claude/skills \
            --skills examples/skills \
            --agents .claude/agents \
            --agents examples/agents/gsd \
            --teams examples/teams \
            --chipsets data/chipset
      # Install project-claude hooks (closes v1.49.634 self-mod-guard gap).
      # Hardened at v1.49.638 W1B.T2 v2: verbose mode (no --quiet) + post-install
      # invariant. The v1 attempt used --local --quiet which silently no-op'd on
      # the GitHub Actions runner — install reported success but
      # .claude/hooks/self-mod-guard.js was never written. The `test -f` invariant
      # fails CI immediately if the install doesn't actually install, so any
      # future regression is loud rather than silent.
      - name: Install project-claude hooks
        run: |
          node project-claude/install.cjs --local
          test -f .claude/hooks/self-mod-guard.js || { echo "FATAL: self-mod-guard.js not installed after install.cjs --local"; ls -la .claude/hooks/ 2>&1 || true; exit 1; }
          echo "Install verified: .claude/hooks/self-mod-guard.js present"
      - run: npx vitest run
