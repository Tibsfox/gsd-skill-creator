name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  private-files:
    name: Block private files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for .planning files
        run: |
          if git ls-tree -r --name-only HEAD | grep -q '^\.planning/'; then
            echo "::error::.planning/ files detected — these are private and must not be pushed"
            git ls-tree -r --name-only HEAD | grep '^\.planning/'
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Check for HIGH and CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Build the dist/ tree before tests — several tests (e.g.
      # src/intelligence/__tests__/c12-write-briefing.test.ts, the
      # intelligence-investigator skill harness, dashboard generator
      # smoke tests) import compiled artifacts from dist/intelligence/.
      # Added at v1.49.597 ship-pipeline; closes the silent "test depends
      # on dist/ but CI doesn't build" gap that surfaced as 4 c12-write-
      # briefing failures.
      - run: npm run build
      - name: Generate Grove arena snapshot (fixture for grove-migration-live tests)
        run: |
          npx tsx tools/import-filesystem-skills.ts \
            --skills .claude/skills \
            --skills examples/skills \
            --agents .claude/agents \
            --agents examples/agents/gsd \
            --teams examples/teams \
            --chipsets data/chipset
      # v1.49.638 C4 — install project-claude hooks so self-mod-guard.js is
      # present at .claude/hooks/. Closes v1.49.634 carry-forward chain
      # (.634/.635/.636/.637): the v1-49-634-meta-test C4 self-mod-guard
      # assertions skip-guard on existsSync(.claude/hooks/self-mod-guard.js)
      # and were previously never exercised in CI. With this install step,
      # HOOK_AVAILABLE=true and both BLOCK/ALLOW assertions run.
      - name: Install project-claude hooks (closes v1.49.634 C4 CI gap)
        run: node project-claude/install.cjs --local --quiet
      - run: npx vitest run
