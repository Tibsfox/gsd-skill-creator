  - id: ca-014
    section: Runtime Behavior > Lazy Agent Activation
    claim: 'Specialist agents are defined but only forked when matching work arrives (lazy activation), with lifecycle: dormant
      > active > idle > dormant'
    verification: code-review
    status: fail
    notes: ExecScheduler has ready/sleeping states, ExecKernel has idle/running/stopped, but no dormant > active > idle >
      dormant lifecycle exists. No lazy activation triggered by matching work.
    tier: T2
    depends_on:
    - ca-001
    evidence: ExecScheduler at src/chipset/exec/scheduler.ts implements TeamState = ready | running | sleeping | removed with
      sleep()/wake() transitions. ExecKernel at src/chipset/exec/kernel.ts implements KernelState = idle | running | stopped.
      Neither implements the claimed dormant > active > idle > dormant 4-state lifecycle. The scheduler sleep/wake is closest
      (sleeping = excluded from scheduling, wake = return to ready), but there is no dormant state distinct from sleeping,
      no work-matching trigger that lazily activates agents (sleep/wake are explicit API calls), and no idle timeout that
      returns agents to dormant. GSD execute-phase spawns agents based on plan wave configuration, not chipset-defined lazy
      activation. The lazy agent activation lifecycle described in the vision is unimplemented.
