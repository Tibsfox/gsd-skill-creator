  - id: agc-002
    section: Part 3 > Module Architecture > simulator/cpu/registers.ts
    claim: The register module implements A, L, Q, Z, EBANK, FBANK, BB registers with correct 15-bit ones-complement representation
    verification: unit-test
    status: pass
    notes: 'File: src/agc/registers.ts, test: src/agc/__tests__/registers.test.ts'
    tier: T2
    depends_on:
    - agc-001
    evidence: 30 tests pass. All 7 registers (A, L, Q, Z, EBANK, FBANK, BB) implemented with correct bit widths (A=16-bit
      with overflow, L/Q/Z=15-bit, EBANK=3-bit, FBANK=5-bit, BB=composite). BB<->EBANK/FBANK synchronization tested. 15-bit
      ones-complement masking via WORD15_MASK verified.
  - id: agc-003
    section: Part 3 > Module Architecture > simulator/cpu/memory.ts
    claim: The memory module implements erasable memory (2K words), fixed memory (36K words), and bank switching through EBANK
      and FBANK registers
    verification: unit-test
    status: pass
    notes: 'File: src/agc/memory.ts, test: src/agc/__tests__/memory.test.ts. AGC purely functional state: all operations return
      new state objects.'
    tier: T2
    depends_on:
    - agc-001
    evidence: 26 tests pass. Erasable memory 2048 words (8 banks of 256), fixed memory 36864 words (36 banks of 1024). Bank
      switching via EBANK (switched erasable 0o0400-0o0777) and FBANK (switched fixed 0o4000-0o7777) with superbank support
      for FBANK>=0o30. Fixed-fixed banks 02/03 always visible. Immutable state model verified (writeMemory/loadFixed return
      new state objects).
  - id: agc-004
    section: Part 3 > Module Architecture > simulator/cpu/alu.ts
    claim: The ALU implements ones-complement arithmetic with overflow detection
    verification: unit-test
    status: pass
    notes: 'File: src/agc/alu.ts, test: src/agc/__tests__/alu.test.ts'
    tier: T2
    depends_on:
    - agc-001
    evidence: '52 tests pass. Full ones-complement ALU: add, subtract, negate, increment, decrement, diminish, multiply (double-precision),
      divide (double/single), doubleAdd. Overflow detection via 16-bit A register sign-bit disagreement (bits 15,14: 00=pos-ok,
      11=neg-ok, 01=pos-overflow, 10=neg-overflow). overflowCorrect extracts 15-bit value using 0o37777 mask for lower 14
      bits. Counter overflow at sign-bit boundary (0o37777) verified in counters.test.ts. Positive/negative zero semantics
      correctly handled (+0=0o00000, -0=0o77777).'
  - id: agc-005
    section: Part 3 > Module Architecture > simulator/cpu/instructions.ts
    claim: Full Block II instruction set is implemented covering all AGC opcodes
    verification: unit-test
    status: pass
    notes: 'File: src/agc/instructions.ts, test: src/agc/__tests__/instructions.test.ts. Known issue: TC Q does not work as
      subroutine return (TC overwrites Q before fetch).'
    tier: T2
    depends_on:
    - agc-001
    evidence: '50 tests pass covering all 38 Block II opcodes: TC, CCS, TCF, CA, CS, AD, MASK, LXCH, INCR, ADS, INDEX, DXCH,
      TS, XCH, DAS, EXTEND, READ, WRITE, RAND, WAND, ROR, WOR, RXOR, DV, BZF, MSU, QXCH, AUG, DIM, DCA, DCS, SU, BZMF, MP,
      INHINT, RELINT, NOOP, RESUME. Each opcode has dedicated test(s) verifying register/memory effects. TS overflow skip
      behavior verified. Immutability test confirms no input state mutation. Known limitation: TC Q does not work as subroutine
      return (TC overwrites Q before fetch).'
  - id: agc-006
    section: Part 3 > Module Architecture > simulator/cpu/interrupts.ts
    claim: The interrupt system implements involuntary counters and interrupt handling
    verification: unit-test
    status: pass
    notes: 'File: src/agc/interrupts.ts, test: src/agc/__tests__/interrupts.test.ts'
    tier: T2
    depends_on:
    - agc-001
    evidence: '25 tests pass. All 10 AGC interrupts defined with correct vector addresses. Priority ordering (lowest number
