  - id: wtm-010
    section: Running as a Service > systemd
    claim: Wetty can run as a systemd service with Restart=on-failure for persistent availability
    verification: code-review
    status: amended
    amendment: "Architectural divergence: GSD-OS runs as Tauri desktop application, not Wetty as systemd service. Application lifecycle managed by OS/desktop environment."
    notes: No wetty.service unit file exists. GSD-OS runs as Tauri desktop app, not systemd service.
    tier: T3
    depends_on: []
    evidence: Glob for wetty.service and *.service returned zero Wetty-related systemd units. GSD-OS runs as Tauri desktop
      application, not systemd-managed server. Claim describes server-side deployment inapplicable to native desktop architecture.
  - id: wtm-011
    section: Troubleshooting > Session disconnects after idle period
    claim: tmux sessions persist across browser disconnections -- reconnecting re-attaches to the existing session
    verification: manual-test
    status: pass
    notes: tmux sessions persist across disconnections by design; GSD-OS uses native PTY attached to tmux
    tier: T2
    depends_on: []
    evidence: 'tmux sessions inherently persist across browser/PTY disconnections - this is a core tmux feature. GSD-OS attaches
      PTY sessions to tmux via tmux_ensure_session which creates detached sessions (tmux new-session -d). When the PTY or
      browser disconnects, the tmux session continues running. Reconnecting calls tmux_ensure_session again, which finds the
      existing session (has_session returns true) and returns attach args. src-tauri/src/tmux/session.rs list_sessions() can
      enumerate surviving sessions. Architecture note: GSD-OS uses native PTY (portable-pty) attached to tmux, not Wetty,
      but the persistence guarantee is the same.'
