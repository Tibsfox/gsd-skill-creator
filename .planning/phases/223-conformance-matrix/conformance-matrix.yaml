      from bayes-classifier.ts, (3.5) SemanticMatcher from semantic-matcher.ts as fallback when Bayes confidence is low, (4)
      confidence resolution via threshold+gap analysis, (5) extractArguments() from argument-extractor.ts. 34 classifier tests
