    - sc-010
    evidence: CoActivationTracker (src/agents/co-activation-tracker.ts) detects skill pairs from SessionObservation data with
      configurable minCoActivations (default 3 for raw detection). ClusterDetector (src/agents/cluster-detector.ts) filters
      with DEFAULT_CLUSTER_CONFIG.minCoActivations=5 and stabilityDays=7, matching the 5+/7+ claim. AgentSuggestionManager
      orchestrates tracker.analyze() -> detector.detect() -> agent suggestion pipeline. AgentGenerator writes composite agents
      to .claude/agents/. 33 tests pass across co-activation-tracker and cluster-detector test files.
  - id: sc-005
