- id: wetty-tmux
  file: wetty-tmux-guide.md
  checkpoint_count: 12
  checkpoints:
  - id: wtm-001
    section: 'Basic Usage > Option 2: Direct Command Mode'
    claim: 'tmux sessions can be auto-attached or created via the pattern: tmux attach -t <name> || tmux new -s <name>'
    verification: manual-test
    status: pass
    notes: tmux attach-or-create pattern implemented natively via Tauri commands
    tier: T2
    depends_on: []
    evidence: 'tmux_ensure_session (src-tauri/src/commands/tmux.rs:40) implements the attach-or-create pattern: checks has_session(name),
      creates via create_session(name) if not exists, returns attach_command(name) = ["tmux", "attach-session", "-t", name].
      session.rs implements: has_session() via tmux has-session -t, create_session() via tmux new-session -d -s, attach_command()
      returns the tmux attach args. This is the native PTY equivalent of the tmux attach -t || tmux new -s pattern described
      in the checkpoint. Tests verify format.'
  - id: wtm-002
    section: tmux Integration Patterns > Dedicated Development Session
    claim: 'A dev-session.sh script creates a tmux session with predefined layout: editor, server, git, and test windows'
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: GSD-OS uses native PTY (Tauri+portable-pty+xterm.js) instead of Wetty. dev-session.sh with predefined tmux layouts is deferred. tmux_ensure_session provides attach-or-create pattern."
    notes: No dev-session.sh script exists. tmux session management is via Tauri commands without predefined layouts.
    tier: T3
    depends_on: []
    evidence: Glob for dev-session.sh and *session*.sh returned zero matches. tmux integration in src-tauri/src/commands/tmux.rs
      creates sessions via tmux_ensure_session without predefined window layouts (editor, server, git, test). GSD-OS uses
      single-session native PTY attachment.
  - id: wtm-003
    section: tmux Integration Patterns > Multiple Named Sessions
    claim: Multiple Wetty instances can serve different tmux sessions on different base paths (e.g., /dev, /logs)
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: GSD-OS uses native PTY, not multiple Wetty instances on different base paths. tmux sessions serve the equivalent multi-session purpose natively."
    notes: No Wetty installation exists. GSD-OS uses native PTY, not Wetty base path routing.
    tier: T3
    depends_on: []
    evidence: No Wetty binary, npm package, or configuration in the codebase. GSD-OS uses Tauri + portable-pty for terminal
      access. tmux_ensure_session supports named sessions but routing is via Tauri IPC, not Wetty URL base paths. Architectural
      divergence from Wetty to native PTY noted in Phase 225.
  - id: wtm-004
    section: tmux Integration Patterns > Read-Only Session Sharing
    claim: tmux sessions support read-only sharing via tmux attach -t <session> -r flag
    verification: manual-test
    status: pass
    notes: Standard tmux feature. GSD-OS tmux sessions support read-only attachment natively via -r flag.
    tier: T3
    depends_on: []
    evidence: tmux attach -t <session> -r is a standard tmux feature. GSD-OS tmux integration (src-tauri/src/tmux/session.rs)
      uses standard tmux commands (has-session, new-session, attach-session) which inherently support -r flag. attach_command()
      returns ["tmux", "attach-session", "-t", name] and -r is a client-side flag choice. The project tmux sessions are compatible
      with read-only sharing.
  - id: wtm-005
    section: Why Wetty
    claim: Wetty provides browser-based terminal access with full xterm-compatible rendering that handles tmux without issues
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: xterm.js v5.5.x in Tauri webview provides full xterm-compatible rendering with tmux support. Native PTY replaces browser-based Wetty approach."
    notes: 'CONFLICT: GSD-OS uses native PTY via Tauri + portable-pty + xterm.js, not Wetty.'
    tier: T3
    depends_on: []
    evidence: GSD-OS uses xterm.js v5.5.x (desktop/src/terminal/) for terminal rendering in the Tauri webview, connected to
      portable-pty 0.9.0 via Tauri IPC. No Wetty package exists. xterm.js handles tmux rendering correctly but this is the
      native PTY approach, not Wetty browser-server approach.
  - id: wtm-006
    section: 'Basic Usage > Option 1: SSH Mode'
    claim: Wetty SSH mode connects to localhost via SSH providing authenticated browser terminal access
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: terminal access via Tauri IPC commands, not Wetty SSH mode. Authentication handled by desktop application session, not SSH keys."
    notes: No Wetty exists. Terminal access uses direct PTY via Tauri IPC, not SSH-authenticated browser terminal.
    tier: T3
    depends_on: []
    evidence: No Wetty binary or configuration exists. Terminal access via Tauri IPC commands (desktop/src/terminal/ -> src-tauri/src/commands/pty.rs
      -> portable-pty). Local-only channel within Tauri trust boundary, not SSH-authenticated.
  - id: wtm-007
    section: 'Basic Usage > Option 2: Direct Command Mode'
    claim: Wetty direct command mode (--command flag) skips SSH and launches straight into a specified command (e.g., tmux)
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: GSD-OS launches commands via portable-pty spawn, not Wetty --command flag. Equivalent functionality via native PTY."
    notes: No Wetty exists. GSD-OS launches commands via portable-pty spawn, not Wetty --command.
    tier: T3
    depends_on: []
    evidence: No Wetty binary or --command flag usage. GSD-OS launches commands via portable-pty spawn (src-tauri/src/pty/)
      which executes shell commands without SSH. Functionally similar to Wetty --command but uses native PTY API, not HTTP
      server.
