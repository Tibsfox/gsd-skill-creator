    claim: Wetty behind nginx reverse proxy requires WebSocket upgrade headers (Upgrade, Connection) for proper real-time
      operation; without them falls back to polling
    verification: code-review
    status: amended
    amendment: "Architectural divergence: no nginx reverse proxy needed for native desktop app. WebSocket is Tauri IPC, not HTTP upgrade."
    notes: No nginx configuration for Wetty exists. GSD-OS uses direct PTY, no reverse proxy needed.
    tier: T3
    depends_on: []
    evidence: No nginx configuration files exist in the codebase (glob for *nginx* returns zero matches). No Wetty server
      to proxy. GSD-OS terminal uses Tauri IPC for PTY communication, which is a native inter-process channel, not an HTTP
      connection requiring reverse proxy or WebSocket upgrade headers.
