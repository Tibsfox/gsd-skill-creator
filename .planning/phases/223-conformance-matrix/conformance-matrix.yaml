    notes: No Wetty exists. Terminal embedded in Tauri webview, not mounted at a URL subpath.
    tier: T3
    depends_on: []
    evidence: No Wetty server or --base flag configuration. Terminal rendered in Tauri desktop application via xterm.js (desktop/src/terminal/),
      not at a URL subpath. URL-based routing inapplicable to native app.
  - id: wtm-009
    section: Embedding in a Dashboard
    claim: Wetty supports iframe embedding via --allow-iframe flag for integration into local dev dashboards
    verification: manual-test
    status: amended
    amendment: "Architectural divergence: dashboard integrates terminal directly as native xterm.js component, not Wetty with --allow-iframe. Tighter integration than iframe approach."
