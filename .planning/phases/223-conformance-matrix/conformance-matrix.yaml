  - id: sc-001
    section: Part 1 > Pattern Capture > Skill Codification
    claim: SessionObserver captures patterns and SuggestionManager proposes skills when patterns repeat 3+ times
    verification: unit-test
    status: pass
    notes: Core learning loop entry point
    tier: T0
    depends_on: []
    evidence: SessionObserver at src/observation/session-observer.ts captures session events via onSessionStart/onSessionEnd,
      parses transcripts, summarizes patterns, and stores to JSONL. SuggestionManager at src/detection/suggestion-manager.ts
      runs detection via PatternAnalyzer which uses configurable threshold (DEFAULT_DETECTION_CONFIG.threshold=3) to propose
      skills only when patterns repeat 3+ times. 35 tests pass across observation/ and detection/ modules.
  - id: sc-002
    section: Part 1 > Token Budget Management
    claim: 6-stage skill loading pipeline (Score > Resolve > ModelFilter > CacheOrder > Budget > Load) enforces configurable
      2-5% token budget ceiling
    verification: unit-test
    status: pass
    notes: All 6 stages implemented and connected; budget configurable per-agent
    tier: T0
    depends_on: []
    evidence: '6-stage pipeline at src/application/: ScoreStage, ResolveStage, ModelFilterStage, CacheOrderStage, BudgetStage,
      LoadStage assembled in SkillApplicator constructor (skill-applicator.ts:71-112). BudgetStage enforces tiered budget
      with configurable budgetPercent (DEFAULT_CONFIG=3%, agent profiles 5-6%) and hardCeilingPercent (8-10%). Skills exceeding
      budget are dropped to budgetSkipped array. 73 tests pass across 6 test files in src/application/.'
  - id: sc-003
    section: Part 1 > Skill Scoping Aligned to GSD's Model
    claim: Skill-creator supports user-level (~/.claude/) and project-level (.claude/) skill scoping, with project-level taking
      precedence
    verification: unit-test
    status: pass
    notes: Scope system implemented with explicit precedence logic
    tier: T0
    depends_on: []
    evidence: 'SkillScope type (''user''|''project'') at src/types/scope.ts with getSkillsBasePath returning ~/.claude/skills
      or .claude/skills. resolveSkill() at src/cli/commands/resolve.ts implements precedence: checks project first, marks
      user as shadowed. listAllScopes() at src/storage/skill-index.ts loads both scopes with hasConflict flags. list-skills-workflow.ts
      displays project first with "[!] = Same name exists at other scope (project takes precedence)".'
