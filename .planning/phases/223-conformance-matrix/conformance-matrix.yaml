      to ~/.claude). Watermark-based change detection skips already-processed sessions. Supports project exclusion (allowlist/blocklist),
      force rescan, and dry-run modes. 15 tests pass in corpus-scanner.test.ts covering scan, rescan, exclusion, and watermark
      persistence.
  - id: sc-006
    section: Part 1 > Discovery System for Historical Sessions
