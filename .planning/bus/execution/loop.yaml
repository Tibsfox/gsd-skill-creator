name: execution
description: "Execution loop coordinating the plan-execute-verify cycle for all mission tasks"
priority: 2
direction: bidirectional
participants:
  - role: PLAN
    direction: send
    message_types: [task-assignment, phase-plan]
  - role: EXEC
    direction: send-and-receive
    message_types: [execution-report, task-request]
  - role: VERIFY
    direction: send-and-receive
    message_types: [verification-result, verification-request]

config:
  cycle_pattern: "PLAN -> EXEC -> VERIFY"
  parallel_exec_allowed: true
  verification_independence: true
  verify_cannot_read_exec_context: true

routing:
  pattern: "pipeline"
  description: "Sequential flow: PLAN assigns task, EXEC executes, VERIFY validates. EXEC cannot proceed to next task until current VERIFY completes."
  cycle_completion: "VERIFY result delivered to PLAN and FLIGHT"
