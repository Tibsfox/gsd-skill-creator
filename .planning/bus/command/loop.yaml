name: command
description: "Command loop between FLIGHT director and all Tier 2-3 roles for directives and status reporting"
priority: 1
direction: bidirectional
participants:
  - role: FLIGHT
    direction: send
    message_types: [directive, halt, phase-transition]
  - role: "all Tier 2-3"
    direction: receive-and-respond
    message_types: [status-report, acknowledgment]

config:
  delivery_guarantee: "all-or-none"
  max_delivery_cycles: 1
  acknowledgment_required: true

routing:
  pattern: "broadcast"
  description: "FLIGHT broadcasts to all active agents; each must acknowledge within 1 cycle"
  tier_2_roles: [PLAN, EXEC, VERIFY, INTEG, CAPCOM, TOPO, SURGEON]
  tier_3_roles: [CRAFT, SCOUT, BUDGET, LOG, GUARD, ANALYST, RETRO, PAO]
