name: budget
description: "Budget loop tracking token consumption with warnings and blocks at threshold limits"
priority: 3
direction: bidirectional
participants:
  - role: BUDGET
    direction: receive-and-send
    message_types: [budget-warning, budget-block]
  - role: "all agents"
    direction: send
    message_types: [consumption-report]
  - role: FLIGHT
    direction: receive
    message_types: [budget-warning, budget-block]

config:
  tracking_unit: "tokens"
  warning_threshold_percent: 90
  block_threshold_percent: 95
  reporting_interval_seconds: 120
  block_behavior: "prevent new EXEC task assignments"
  block_exceptions: ["HALT processing", "VERIFY in progress"]

routing:
  pattern: "hub-and-spoke"
  description: "BUDGET agent collects consumption reports from all agents. At 90%, sends warning to FLIGHT. At 95%, sends block signal that prevents new EXEC task assignments. Does not interrupt in-progress VERIFY operations."
  block_action: "BUDGET sends budget-block to FLIGHT and PLAN. PLAN stops issuing new task-assignments. EXEC agents complete current task then idle."
