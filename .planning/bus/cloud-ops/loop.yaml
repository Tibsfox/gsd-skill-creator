name: cloud-ops
description: "Cloud operations loop polling OpenStack API endpoints and routing events to SURGEON and GUARD"
priority: 2
direction: bidirectional
participants:
  - role: SURGEON
    direction: receive
    message_types: [api-health-check, status-change]
  - role: GUARD
    direction: receive
    message_types: [event-notification, security-event]
  - role: "OpenStack APIs"
    direction: send
    message_types: [api-health-check, event-notification, status-change]

config:
  polling_interval_seconds: 60
  api_endpoints:
    - service: keystone
      endpoint: "/v3/auth/tokens"
      method: POST
      healthy_status: [200, 201]
    - service: nova
      endpoint: "/v2.1/os-hypervisors"
      method: GET
      healthy_status: [200]
    - service: neutron
      endpoint: "/v2.0/networks"
      method: GET
      healthy_status: [200]
    - service: cinder
      endpoint: "/v3/volumes"
      method: GET
      healthy_status: [200]
    - service: glance
      endpoint: "/v2/images"
      method: GET
      healthy_status: [200]
    - service: swift
      endpoint: "/info"
      method: GET
      healthy_status: [200]
    - service: heat
      endpoint: "/v1/stacks"
      method: GET
      healthy_status: [200]
    - service: horizon
      endpoint: "/"
      method: GET
      healthy_status: [200, 302]
  status_change_detection: true
  consecutive_failures_before_alert: 3

routing:
  pattern: "poll-and-dispatch"
  description: "Polls each OpenStack API endpoint at configured interval. Health results go to SURGEON. Security events go to GUARD. Status changes trigger immediate notification regardless of poll cycle."
